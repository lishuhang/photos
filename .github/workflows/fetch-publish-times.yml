name: Fetch WeChat Publish Times

on:
  workflow_dispatch:
    inputs:
      max_per_run:
        description: 'Max files to process (0 = all)'
        required: false
        default: '0'

jobs:
  fetch:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Download pending files JSON
        run: |
          curl -sL -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
            -H "Accept: application/vnd.github.raw" \
            "https://api.github.com/repos/${{ github.repository }}/contents/_tools/pending_files.json" \
            -o pending_files.json
          if [ ! -s pending_files.json ]; then
            echo "ERROR: pending_files.json not found or empty"
            exit 1
          fi
          echo "Pending files: $(python3 -c 'import json; print(len(json.load(open("pending_files.json"))))')"

      - name: Fetch publish times and update repo
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          INPUT_FILE: pending_files.json
          RESULTS_FILE: results.json
          BRANCH: main
          MAX_PER_RUN: ${{ github.event.inputs.max_per_run || '0' }}
        run: |
          python3 _tools/fetch_publish_times.py

      - name: Upload results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: results
          path: results.json
          retention-days: 30
