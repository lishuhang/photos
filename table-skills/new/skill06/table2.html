<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=450,initial-scale=1">
<title>AI招聘动机分类</title>
<style>
@font-face { font-family:'AlibabaPuHuiTi'; src:url('../assets/AlibabaPuHuiTi-3-35-Thin.woff') format('woff'); font-weight:100; }
@font-face { font-family:'AlibabaPuHuiTi'; src:url('../assets/AlibabaPuHuiTi-3-55-Regular.woff') format('woff'); font-weight:400; }
@font-face { font-family:'AlibabaPuHuiTi'; src:url('../assets/AlibabaPuHuiTi-3-65-Medium.woff') format('woff'); font-weight:500; }
@font-face { font-family:'AlibabaPuHuiTi'; src:url('../assets/AlibabaPuHuiTi-3-85-Bold.woff') format('woff'); font-weight:700; }
@font-face { font-family:'AlibabaPuHuiTi'; src:url('../assets/AlibabaPuHuiTi-3-115-Black.woff') format('woff'); font-weight:900; }

* { margin:0; padding:0; box-sizing:border-box; }

body {
  background: #0a0e27;
  display: flex;
  justify-content: center;
  align-items: center;
  min-height: 100vh;
  font-family: 'AlibabaPuHuiTi', sans-serif;
  color: #fff;
}

.canvas-wrap {
  position: relative;
  width: 450px;
  height: 800px;
  background: #0a0e27;
  overflow: hidden;
}

.content {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  width: calc(450px * 0.85);
}

.title {
  font-size: 22px;
  font-weight: 700;
  text-align: center;
  margin-bottom: 6px;
  animation: fadeIn 0.8s ease-out both;
}

.subtitle {
  font-size: 13px;
  font-weight: 400;
  text-align: center;
  color: rgba(255,255,255,0.5);
  margin-bottom: 22px;
  animation: fadeIn 0.8s ease-out 0.2s both;
}

@keyframes fadeIn {
  from { opacity: 0; transform: translateY(-10px); }
  to { opacity: 1; transform: translateY(0); }
}

@keyframes slideUp {
  from { transform: translateY(30px); opacity: 0; }
  to { transform: translateY(0); opacity: 1; }
}

@keyframes popIn {
  from { transform: scale(0); }
  to { transform: scale(1); }
}

.card {
  background: rgba(255,255,255,0.04);
  border-radius: 10px;
  padding: 14px 16px;
  margin-bottom: 10px;
  border-left: 4px solid var(--card-color);
  animation: slideUp 0.6s ease-out both;
}

.card:nth-child(1) { animation-delay: 0.3s; }
.card:nth-child(2) { animation-delay: 0.5s; }
.card:nth-child(3) { animation-delay: 0.7s; }
.card:nth-child(4) { animation-delay: 0.9s; }
.card:nth-child(5) { animation-delay: 1.1s; }

.card-type {
  font-size: 15px;
  font-weight: 700;
  margin-bottom: 6px;
  color: var(--card-color);
}

.card-pressure {
  font-size: 12px;
  color: rgba(255,255,255,0.55);
  margin-bottom: 6px;
  line-height: 1.5;
}

.card-pressure::before {
  content: '痛点：';
  color: rgba(255,255,255,0.35);
}

.card-focus {
  font-size: 12px;
  color: rgba(255,255,255,0.7);
  margin-bottom: 8px;
  line-height: 1.5;
}

.card-focus::before {
  content: 'AI方向：';
  color: rgba(255,255,255,0.35);
}

.card-tags {
  display: flex;
  gap: 6px;
  flex-wrap: wrap;
}

.tag {
  display: inline-block;
  padding: 3px 10px;
  border-radius: 20px;
  font-size: 11px;
  font-weight: 500;
  background: rgba(255,255,255,0.06);
  border: 1px solid rgba(255,255,255,0.1);
  animation: popIn 0.4s cubic-bezier(0.34,1.56,0.64,1) both;
}

.card:nth-child(1) .tag:nth-child(1) { animation-delay: 0.9s; }
.card:nth-child(1) .tag:nth-child(2) { animation-delay: 1.0s; }
.card:nth-child(1) .tag:nth-child(3) { animation-delay: 1.1s; }
.card:nth-child(2) .tag:nth-child(1) { animation-delay: 1.1s; }
.card:nth-child(2) .tag:nth-child(2) { animation-delay: 1.2s; }
.card:nth-child(2) .tag:nth-child(3) { animation-delay: 1.3s; }
.card:nth-child(2) .tag:nth-child(4) { animation-delay: 1.4s; }
.card:nth-child(3) .tag:nth-child(1) { animation-delay: 1.3s; }
.card:nth-child(4) .tag:nth-child(1) { animation-delay: 1.5s; }
.card:nth-child(4) .tag:nth-child(2) { animation-delay: 1.6s; }
.card:nth-child(5) .tag:nth-child(1) { animation-delay: 1.7s; }
.card:nth-child(5) .tag:nth-child(2) { animation-delay: 1.8s; }

.card:nth-child(1) { --card-color: #FF6B6B; }
.card:nth-child(1) .tag { color: #FF6B6B; border-color: rgba(255,107,107,0.3); }
.card:nth-child(2) { --card-color: #FFA940; }
.card:nth-child(2) .tag { color: #FFA940; border-color: rgba(255,169,64,0.3); }
.card:nth-child(3) { --card-color: #00D4AA; }
.card:nth-child(3) .tag { color: #00D4AA; border-color: rgba(0,212,170,0.3); }
.card:nth-child(4) { --card-color: #7B68EE; }
.card:nth-child(4) .tag { color: #7B68EE; border-color: rgba(123,104,238,0.3); }
.card:nth-child(5) { --card-color: #E040FB; }
.card:nth-child(5) .tag { color: #E040FB; border-color: rgba(224,64,251,0.3); }

.footer {
  position: absolute;
  bottom: 20px;
  left: 50%;
  transform: translateX(-50%);
  font-size: 11px;
  color: rgba(255,255,255,0.3);
  white-space: nowrap;
}

@media (max-width: 500px) {
  .canvas-wrap { width: 100vw; height: 177.78vw; }
  .content { width: 85vw; }
}

#replayBtn {
  display: none;
  position: absolute;
  bottom: 20px;
  right: -80px;
  padding: 10px 20px;
  background: rgba(255,255,255,0.1);
  border: 1px solid rgba(255,255,255,0.2);
  border-radius: 8px;
  color: #fff;
  font-family: 'AlibabaPuHuiTi';
  cursor: pointer;
  font-size: 14px;
  transition: all 0.3s;
}

#replayBtn:hover { background: rgba(255,255,255,0.2); }

@media (max-width: 500px) { #replayBtn { right: 20px; bottom: 20px; } }
</style>
</head>
<body>
<div class="canvas-wrap" id="main">
  <div class="content" id="content">
    <div class="title">AI招聘动机分类</div>
    <div class="subtitle">五大类型影视公司AI转型驱动力</div>

    <div class="card">
      <div class="card-type">降本型影视公司</div>
      <div class="card-pressure">制作周期长、成本高、爆款不确定</div>
      <div class="card-focus">分镜、概念设计、AIGC物料、AI漫剧</div>
      <div class="card-tags">
        <span class="tag">华策</span>
        <span class="tag">正午阳光</span>
        <span class="tag">启蒙影业</span>
      </div>
    </div>

    <div class="card">
      <div class="card-type">增效型影视公司</div>
      <div class="card-pressure">需要寻找新内容增量</div>
      <div class="card-focus">AI产品、AI漫剧、虚拟偶像</div>
      <div class="card-tags">
        <span class="tag">博纳</span>
        <span class="tag">恒星引力</span>
        <span class="tag">欢娱</span>
        <span class="tag">耀客</span>
      </div>
    </div>

    <div class="card">
      <div class="card-type">出海型影视公司</div>
      <div class="card-pressure">海外本地化和社媒运营成本高</div>
      <div class="card-focus">多语种物料、短视频切条、海外AIGC运营</div>
      <div class="card-tags">
        <span class="tag">柠萌</span>
      </div>
    </div>

    <div class="card">
      <div class="card-type">经纪公司</div>
      <div class="card-pressure">真人艺人成本和风险高、粉丝内容供给压力大</div>
      <div class="card-focus">AI艺人、虚拟偶像、AI粉丝运营</div>
      <div class="card-tags">
        <span class="tag">乐华</span>
        <span class="tag">哇唧唧哇</span>
      </div>
    </div>

    <div class="card">
      <div class="card-type">MCN/直播电商</div>
      <div class="card-pressure">人力密集、ROI压力强</div>
      <div class="card-focus">场控、客服、审核、运营、短剧生产</div>
      <div class="card-tags">
        <span class="tag">无忧</span>
        <span class="tag">遥望</span>
      </div>
    </div>
  </div>
  <div class="footer">数据来源：娱乐资本论统计</div>
  <button id="replayBtn" onclick="replay()">▶ Replay</button>
</div>

<script>
setTimeout(() => {
  document.getElementById('replayBtn').style.display = 'block';
}, 3000);

function replay() {
  const content = document.getElementById('content');
  content.classList.remove('replay');
  void content.offsetWidth;
  content.classList.add('replay');
  document.getElementById('replayBtn').style.display = 'none';

  const cards = document.querySelectorAll('.card');
  cards.forEach(c => {
    c.style.animation = 'none';
    c.offsetHeight;
    c.style.animation = '';
  });
  const tags = document.querySelectorAll('.tag');
  tags.forEach(t => {
    t.style.animation = 'none';
    t.offsetHeight;
    t.style.animation = '';
  });

  setTimeout(() => {
    document.getElementById('replayBtn').style.display = 'block';
  }, 3000);
}
</script>
</body>
</html>
