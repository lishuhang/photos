<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=450,initial-scale=1">
<title>经纪/MCN公司AI应用方向</title>
<style>
@font-face { font-family:'AlibabaPuHuiTi'; src:url('../assets/AlibabaPuHuiTi-3-35-Thin.woff') format('woff'); font-weight:100; }
@font-face { font-family:'AlibabaPuHuiTi'; src:url('../assets/AlibabaPuHuiTi-3-55-Regular.woff') format('woff'); font-weight:400; }
@font-face { font-family:'AlibabaPuHuiTi'; src:url('../assets/AlibabaPuHuiTi-3-65-Medium.woff') format('woff'); font-weight:500; }
@font-face { font-family:'AlibabaPuHuiTi'; src:url('../assets/AlibabaPuHuiTi-3-85-Bold.woff') format('woff'); font-weight:700; }
@font-face { font-family:'AlibabaPuHuiTi'; src:url('../assets/AlibabaPuHuiTi-3-115-Black.woff') format('woff'); font-weight:900; }

* { margin:0; padding:0; box-sizing:border-box; }

body {
  background: #0a0e27;
  display: flex;
  justify-content: center;
  align-items: center;
  min-height: 100vh;
  font-family: 'AlibabaPuHuiTi', sans-serif;
  color: #fff;
}

.canvas-wrap {
  position: relative;
  width: 450px;
  height: 800px;
  background: #0a0e27;
  overflow: hidden;
}

.content {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  width: calc(450px * 0.85);
}

.title {
  font-size: 22px;
  font-weight: 700;
  text-align: center;
  margin-bottom: 4px;
  animation: fadeIn 0.8s ease-out both;
}

.subtitle {
  font-size: 13px;
  font-weight: 400;
  text-align: center;
  color: rgba(255,255,255,0.5);
  margin-bottom: 14px;
  animation: fadeIn 0.8s ease-out 0.2s both;
}

@keyframes fadeIn {
  from { opacity: 0; transform: translateY(-10px); }
  to { opacity: 1; transform: translateY(0); }
}

@keyframes radarExpand {
  from { transform: scale(0); opacity: 0; }
  to { transform: scale(1); opacity: 1; }
}

@keyframes gridDraw {
  from { stroke-dashoffset: 800; }
  to { stroke-dashoffset: 0; }
}

.radar-container {
  display: flex;
  justify-content: center;
  margin-bottom: 14px;
  animation: fadeIn 0.6s ease-out 0.3s both;
}

.radar-container svg {
  overflow: visible;
}

.grid-circle {
  fill: none;
  stroke: rgba(255,255,255,0.08);
  stroke-width: 1;
  stroke-dasharray: 800;
  animation: gridDraw 1.5s ease-out both;
}

.grid-circle:nth-child(1) { animation-delay: 0.2s; }
.grid-circle:nth-child(2) { animation-delay: 0.3s; }
.grid-circle:nth-child(3) { animation-delay: 0.4s; }
.grid-circle:nth-child(4) { animation-delay: 0.5s; }

.axis-line {
  stroke: rgba(255,255,255,0.06);
  stroke-width: 1;
}

.dim-label {
  font-size: 11px;
  fill: rgba(255,255,255,0.6);
  font-family: 'AlibabaPuHuiTi';
  font-weight: 400;
}

.radar-polygon {
  transform-origin: center;
  animation: radarExpand 0.8s cubic-bezier(0.34,1.56,0.64,1) both;
}

.radar-polygon.p0 { animation-delay: 0.8s; }
.radar-polygon.p1 { animation-delay: 1.2s; }
.radar-polygon.p2 { animation-delay: 1.6s; }
.radar-polygon.p3 { animation-delay: 2.0s; }

.legend {
  display: flex;
  justify-content: center;
  flex-wrap: wrap;
  gap: 12px;
  animation: fadeIn 0.6s ease-out 2.4s both;
}

.legend-item {
  display: flex;
  align-items: center;
  gap: 6px;
  font-size: 12px;
}

.legend-line {
  width: 20px;
  height: 3px;
  border-radius: 2px;
}

.footer {
  position: absolute;
  bottom: 20px;
  left: 50%;
  transform: translateX(-50%);
  font-size: 11px;
  color: rgba(255,255,255,0.3);
  white-space: nowrap;
}

@media (max-width: 500px) {
  .canvas-wrap { width: 100vw; height: 177.78vw; }
  .content { width: 85vw; }
}

#replayBtn {
  display: none;
  position: absolute;
  bottom: 20px;
  right: -80px;
  padding: 10px 20px;
  background: rgba(255,255,255,0.1);
  border: 1px solid rgba(255,255,255,0.2);
  border-radius: 8px;
  color: #fff;
  font-family: 'AlibabaPuHuiTi';
  cursor: pointer;
  font-size: 14px;
  transition: all 0.3s;
}

#replayBtn:hover { background: rgba(255,255,255,0.2); }

@media (max-width: 500px) { #replayBtn { right: 20px; bottom: 20px; } }
</style>
</head>
<body>
<div class="canvas-wrap" id="main">
  <div class="content" id="content">
    <div class="title">经纪/MCN公司AI应用方向</div>
    <div class="subtitle">雷达图对比四家公司AI能力布局</div>

    <div class="radar-container" id="radarContainer"></div>

    <div class="legend">
      <div class="legend-item"><div class="legend-line" style="background:#FF6B6B"></div>乐华</div>
      <div class="legend-item"><div class="legend-line" style="background:#FFA940"></div>哇唧唧哇</div>
      <div class="legend-item"><div class="legend-line" style="background:#00D4AA"></div>无忧</div>
      <div class="legend-item"><div class="legend-line" style="background:#7B68EE"></div>遥望</div>
    </div>
  </div>
  <div class="footer">数据来源：娱乐资本论统计</div>
  <button id="replayBtn" onclick="replay()">▶ Replay</button>
</div>

<script>
const dims = ['AI内容生产','虚拟偶像','粉丝运营','直播替代','AI短剧','人才招聘力度'];
const datasets = [
  { name:'乐华', values:[9,9,5,2,6,5], color:'#FF6B6B', fill:'rgba(255,107,107,0.15)', cls:'p0' },
  { name:'哇唧唧哇', values:[4,7,8,2,2,3], color:'#FFA940', fill:'rgba(255,169,64,0.15)', cls:'p1' },
  { name:'无忧', values:[5,2,4,9,3,3], color:'#00D4AA', fill:'rgba(0,212,170,0.15)', cls:'p2' },
  { name:'遥望', values:[8,3,4,7,9,8], color:'#7B68EE', fill:'rgba(123,104,238,0.15)', cls:'p3' }
];
const n = dims.length;
const cx = 170, cy = 170, R = 130;
const maxVal = 10;

function getPoint(i, val) {
  const angle = (Math.PI * 2 * i / n) - Math.PI / 2;
  const r = (val / maxVal) * R;
  return { x: cx + r * Math.cos(angle), y: cy + r * Math.sin(angle) };
}

function buildRadar() {
  const container = document.getElementById('radarContainer');
  let svg = `<svg width="340" height="340" viewBox="0 0 340 340">`;

  // Grid circles
  for (let k = 1; k <= 4; k++) {
    const r = R * k / 4;
    svg += `<circle class="grid-circle" cx="${cx}" cy="${cy}" r="${r}"/>`;
  }

  // Axis lines + dimension labels
  for (let i = 0; i < n; i++) {
    const p = getPoint(i, maxVal);
    svg += `<line class="axis-line" x1="${cx}" y1="${cy}" x2="${p.x}" y2="${p.y}"/>`;
    const lp = getPoint(i, maxVal + 18);
    svg += `<text class="dim-label" x="${lp.x}" y="${lp.y}" text-anchor="middle" dominant-baseline="middle">${dims[i]}</text>`;
  }

  // Data polygons
  datasets.forEach(ds => {
    let points = [];
    for (let i = 0; i < n; i++) {
      const p = getPoint(i, ds.values[i]);
      points.push(`${p.x},${p.y}`);
    }
    svg += `<polygon class="radar-polygon ${ds.cls}" points="${points.join(' ')}" fill="${ds.fill}" stroke="${ds.color}" stroke-width="2" style="transform-origin:${cx}px ${cy}px"/>`;
  });

  svg += `</svg>`;
  container.innerHTML = svg;
}

buildRadar();

setTimeout(() => {
  document.getElementById('replayBtn').style.display = 'block';
}, 3500);

function replay() {
  document.getElementById('replayBtn').style.display = 'none';
  buildRadar();
  setTimeout(() => {
    document.getElementById('replayBtn').style.display = 'block';
  }, 3500);
}
</script>
</body>
</html>
