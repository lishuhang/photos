<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>AI招聘动机分类</title>
<style>
@font-face { font-family:'AlibabaPuHuiTi'; src:url('../assets/AlibabaPuHuiTi-3-35-Thin.woff') format('woff'); font-weight:100; }
@font-face { font-family:'AlibabaPuHuiTi'; src:url('../assets/AlibabaPuHuiTi-3-55-Regular.woff') format('woff'); font-weight:400; }
@font-face { font-family:'AlibabaPuHuiTi'; src:url('../assets/AlibabaPuHuiTi-3-65-Medium.woff') format('woff'); font-weight:500; }
@font-face { font-family:'AlibabaPuHuiTi'; src:url('../assets/AlibabaPuHuiTi-3-85-Bold.woff') format('woff'); font-weight:700; }
@font-face { font-family:'AlibabaPuHuiTi'; src:url('../assets/AlibabaPuHuiTi-3-115-Black.woff') format('woff'); font-weight:900; }

* { margin:0; padding:0; box-sizing:border-box; }
body {
  background:#0a0e27;
  display:flex; justify-content:center; align-items:center;
  min-height:100vh;
  font-family:'AlibabaPuHuiTi',sans-serif;
  color:#fff;
  overflow:hidden;
}
.canvas-wrap {
  position:relative;
  width:450px; height:800px;
  background:#0a0e27;
  overflow:hidden;
}
.content {
  position:absolute;
  top:50%; left:50%; transform:translate(-50%,-50%);
  width:390px; height:620px;
}
.title {
  font-size:22px; font-weight:700;
  text-align:center;
  margin-bottom:24px;
  opacity:0; transform:translateY(-20px);
  transition: opacity 0.8s ease, transform 0.8s ease;
}
.title.show { opacity:1; transform:translateY(0); }
.title span {
  background: linear-gradient(90deg,#FF6B6B,#E040FB);
  -webkit-background-clip:text; -webkit-text-fill-color:transparent;
  background-clip:text;
}

.card {
  background:rgba(255,255,255,0.04);
  border-radius:10px;
  padding:14px 16px;
  margin-bottom:12px;
  border-left:4px solid;
  opacity:0; transform:translateY(40px);
  transition: opacity 0.6s ease, transform 0.6s ease;
}
.card.show { opacity:1; transform:translateY(0); }

.card-header {
  display:flex; align-items:center; justify-content:space-between;
  margin-bottom:6px;
}
.card-type {
  font-size:15px; font-weight:700;
}
.card-pressure {
  font-size:11px; color:rgba(255,255,255,0.5);
  font-weight:400;
}
.card-focus {
  font-size:12px; color:rgba(255,255,255,0.7);
  margin-bottom:8px; font-weight:400;
  line-height:1.5;
}
.card-focus::before {
  content:'AI方向：';
  color:rgba(255,255,255,0.45);
  font-weight:500;
}
.tags {
  display:flex; flex-wrap:wrap; gap:6px;
}
.tag {
  padding:3px 10px;
  border-radius:12px;
  font-size:11px; font-weight:500;
  background:rgba(255,255,255,0.06);
  border:1px solid rgba(255,255,255,0.1);
  transform:scale(0);
  transition: transform 0.4s cubic-bezier(0.34,1.56,0.64,1);
}
.tag.show { transform:scale(1); }

.footer {
  position:absolute;
  bottom:20px; left:0; right:0;
  text-align:center;
  font-size:11px; color:rgba(255,255,255,0.35);
  font-weight:100;
}

#replayBtn {
  display:none; position:absolute; bottom:20px; right:-80px;
  padding:10px 20px; background:rgba(255,255,255,0.1);
  border:1px solid rgba(255,255,255,0.2); border-radius:8px;
  color:#fff; font-family:'AlibabaPuHuiTi'; cursor:pointer;
  font-size:14px; transition:all 0.3s;
}
#replayBtn:hover { background:rgba(255,255,255,0.2); }
@media (max-width:500px) {
  #replayBtn { right:20px; bottom:20px; }
}
</style>
</head>
<body>
<div class="canvas-wrap">
  <div class="content">
    <div class="title" id="title"><span>AI招聘动机分类</span></div>
    <div id="cardContainer"></div>
  </div>
  <div class="footer">数据来源：娱乐资本论统计</div>
  <button id="replayBtn" onclick="replay()">▶ Replay</button>
</div>

<script>
const data = [
  {type:'降本型影视公司', pressure:'制作周期长、成本高、爆款不确定', aiFocus:'分镜、概念设计、AIGC物料、AI漫剧', companies:['华策','正午阳光','启蒙影业'], color:'#FF6B6B'},
  {type:'增效型影视公司', pressure:'需要寻找新内容增量', aiFocus:'AI产品、AI漫剧、虚拟偶像', companies:['博纳','恒星引力','欢娱','耀客'], color:'#FFA940'},
  {type:'出海型影视公司', pressure:'海外本地化和社媒运营成本高', aiFocus:'多语种物料、短视频切条、海外AIGC运营', companies:['柠萌'], color:'#00D4AA'},
  {type:'经纪公司', pressure:'真人艺人成本和风险高、粉丝内容供给压力大', aiFocus:'AI艺人、虚拟偶像、AI粉丝运营', companies:['乐华','哇唧唧哇'], color:'#7B68EE'},
  {type:'MCN/直播电商', pressure:'人力密集、ROI压力强', aiFocus:'场控、客服、审核、运营、短剧生产', companies:['无忧','遥望'], color:'#E040FB'}
];

let animTimers = [];

function buildCards() {
  const container = document.getElementById('cardContainer');
  container.innerHTML = '';
  animTimers.forEach(t => clearTimeout(t));
  animTimers = [];

  data.forEach((d, i) => {
    const card = document.createElement('div');
    card.className = 'card';
    card.style.borderLeftColor = d.color;
    card.style.transitionDelay = `${i * 200}ms`;

    let header = `<div class="card-header">
      <div class="card-type" style="color:${d.color}">${d.type}</div>
      <div class="card-pressure">${d.pressure}</div>
    </div>`;

    let focus = `<div class="card-focus">${d.aiFocus}</div>`;

    let tags = '<div class="tags">';
    d.companies.forEach((c, ci) => {
      tags += `<span class="tag" style="border-color:${d.color}44;color:${d.color}" data-delay="${i * 200 + ci * 100 + 400}">${c}</span>`;
    });
    tags += '</div>';

    card.innerHTML = header + focus + tags;
    container.appendChild(card);
  });

  // Title fade in
  animTimers.push(setTimeout(() => {
    document.getElementById('title').classList.add('show');
  }, 200));

  // Cards slide in
  animTimers.push(setTimeout(() => {
    document.querySelectorAll('.card').forEach(c => c.classList.add('show'));
  }, 600));

  // Tags scale in
  animTimers.push(setTimeout(() => {
    document.querySelectorAll('.tag').forEach(tag => {
      const delay = parseInt(tag.dataset.delay);
      setTimeout(() => tag.classList.add('show'), delay);
    });
  }, 600));

  // Replay button
  animTimers.push(setTimeout(() => {
    document.getElementById('replayBtn').style.display = 'block';
  }, 3500));
}

function replay() {
  document.getElementById('replayBtn').style.display = 'none';
  document.getElementById('title').classList.remove('show');
  document.querySelectorAll('.card').forEach(c => c.classList.remove('show'));
  document.querySelectorAll('.tag').forEach(t => t.classList.remove('show'));
  animTimers.forEach(t => clearTimeout(t));
  setTimeout(buildCards, 300);
}

window.addEventListener('DOMContentLoaded', buildCards);
</script>
</body>
</html>
