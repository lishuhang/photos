<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>三种影视公司AI路径对比</title>
<style>
@font-face { font-family:'AlibabaPuHuiTi'; src:url('../assets/AlibabaPuHuiTi-3-35-Thin.woff') format('woff'); font-weight:100; }
@font-face { font-family:'AlibabaPuHuiTi'; src:url('../assets/AlibabaPuHuiTi-3-55-Regular.woff') format('woff'); font-weight:400; }
@font-face { font-family:'AlibabaPuHuiTi'; src:url('../assets/AlibabaPuHuiTi-3-65-Medium.woff') format('woff'); font-weight:500; }
@font-face { font-family:'AlibabaPuHuiTi'; src:url('../assets/AlibabaPuHuiTi-3-85-Bold.woff') format('woff'); font-weight:700; }
@font-face { font-family:'AlibabaPuHuiTi'; src:url('../assets/AlibabaPuHuiTi-3-115-Black.woff') format('woff'); font-weight:900; }

* { margin:0; padding:0; box-sizing:border-box; }

body {
  background: #050816;
  display: flex;
  justify-content: center;
  align-items: center;
  min-height: 100vh;
  font-family: 'AlibabaPuHuiTi', sans-serif;
}

.canvas-wrap {
  position: relative;
  width: 450px;
  height: 800px;
  background: #0a0e27;
  overflow: hidden;
  margin: auto;
}

.content {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  width: 400px;
  height: 520px;
}

.title {
  font-size: 20px;
  font-weight: 700;
  color: #fff;
  text-align: center;
  margin-bottom: 4px;
  letter-spacing: 1px;
}
.subtitle {
  font-size: 12px;
  font-weight: 400;
  color: rgba(255,255,255,0.5);
  text-align: center;
  margin-bottom: 12px;
}

.legend {
  display: flex;
  justify-content: center;
  gap: 16px;
  margin-bottom: 14px;
}
.legend-item {
  display: flex;
  align-items: center;
  gap: 5px;
  font-size: 10px;
  color: rgba(255,255,255,0.7);
}
.legend-dot {
  width: 8px;
  height: 8px;
  border-radius: 2px;
}

.chart-area {
  display: flex;
  align-items: flex-end;
  justify-content: space-around;
  height: 340px;
  padding-bottom: 0;
  border-bottom: 1px solid rgba(255,255,255,0.1);
}

.group {
  display: flex;
  flex-direction: column;
  align-items: center;
  flex: 1;
}

.group-bars {
  display: flex;
  align-items: flex-end;
  gap: 3px;
  height: 300px;
}

.bar-col {
  display: flex;
  flex-direction: column;
  align-items: center;
}

.bar-rect {
  width: 18px;
  border-radius: 3px 3px 0 0;
  transform-origin: bottom;
  animation: barGrowUp 0.8s ease-out forwards;
  transform: scaleY(0);
}

/* FIX 5: group-label fixed height, nowrap, small font */
.group-label {
  height: 28px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 9px;
  color: rgba(255,255,255,0.6);
  white-space: nowrap;
  margin-top: 6px;
  text-align: center;
}

.bar-value {
  font-size: 8px;
  color: rgba(255,255,255,0.5);
  margin-bottom: 3px;
  opacity: 0;
  animation: fadeIn 0.4s ease forwards;
}

/* Bar colors for 3 company types */
.type-traditional { background: linear-gradient(180deg, #FF6B6B, #CC4444); }
.type-mcn { background: linear-gradient(180deg, #4ECDC4, #2EA89F); }
.type-tech { background: linear-gradient(180deg, #7B68EE, #5A48CC); }

@keyframes barGrowUp {
  from { transform: scaleY(0); }
  to { transform: scaleY(1); }
}

@keyframes fadeIn {
  from { opacity: 0; }
  to { opacity: 1; }
}

.y-axis {
  position: absolute;
  left: 0;
  top: 0;
  bottom: 0;
  display: flex;
  flex-direction: column;
  justify-content: space-between;
  padding-right: 4px;
  height: 300px;
}
.y-label {
  font-size: 8px;
  color: rgba(255,255,255,0.3);
  text-align: right;
}

.grid-lines {
  position: absolute;
  left: 0;
  right: 0;
  top: 0;
  height: 300px;
  display: flex;
  flex-direction: column;
  justify-content: space-between;
  pointer-events: none;
}
.grid-line {
  height: 1px;
  background: rgba(255,255,255,0.05);
}

.footer {
  position: absolute;
  bottom: 16px;
  left: 0;
  right: 0;
  text-align: center;
  font-size: 10px;
  color: rgba(255,255,255,0.3);
  font-weight: 400;
}

#loopBtn {
  position: absolute;
  top: 50%;
  right: -90px;
  transform: translateY(-50%);
  padding: 10px 18px;
  background: rgba(255,255,255,0.1);
  border: 1px solid rgba(255,255,255,0.2);
  border-radius: 8px;
  color: #fff;
  font-family: 'AlibabaPuHuiTi';
  cursor: pointer;
  font-size: 14px;
  transition: all 0.3s;
  display: none;
}
#loopBtn:hover { background: rgba(255,255,255,0.2); }
#loopBtn.active { background: rgba(0,212,170,0.2); border-color: rgba(0,212,170,0.4); color: #00D4AA; }

@media (max-width: 500px) {
  .canvas-wrap { width: 100vw; height: 177.78vw; }
  .content { width: 88vw; height: 115vw; }
  #loopBtn { right: 10px; top: auto; bottom: 10px; transform: none; }
}
</style>
</head>
<body>
<div class="canvas-wrap">
  <div class="content" id="content">
    <div class="title">三种影视公司AI路径对比</div>
    <div class="subtitle">传统影视 · MCN/经纪 · 科技影视 — AI应用方向分布</div>

    <div class="legend">
      <div class="legend-item"><div class="legend-dot" style="background:#FF6B6B;"></div>传统影视</div>
      <div class="legend-item"><div class="legend-dot" style="background:#4ECDC4;"></div>MCN/经纪</div>
      <div class="legend-item"><div class="legend-dot" style="background:#7B68EE;"></div>科技影视</div>
    </div>

    <div class="chart-area">
      <!-- Group 1: 分镜/概念 -->
      <div class="group">
        <div class="group-bars">
          <div class="bar-col">
            <div class="bar-value" style="animation-delay:1.0s;">45</div>
            <div class="bar-rect type-traditional" style="height:135px;animation-delay:0.2s;"></div>
          </div>
          <div class="bar-col">
            <div class="bar-value" style="animation-delay:1.1s;">20</div>
            <div class="bar-rect type-mcn" style="height:60px;animation-delay:0.35s;"></div>
          </div>
          <div class="bar-col">
            <div class="bar-value" style="animation-delay:1.2s;">60</div>
            <div class="bar-rect type-tech" style="height:180px;animation-delay:0.5s;"></div>
          </div>
        </div>
        <div class="group-label">分镜/概念</div>
      </div>

      <!-- Group 2: 漫剧/偶像 -->
      <div class="group">
        <div class="group-bars">
          <div class="bar-col">
            <div class="bar-value" style="animation-delay:1.3s;">25</div>
            <div class="bar-rect type-traditional" style="height:75px;animation-delay:0.65s;"></div>
          </div>
          <div class="bar-col">
            <div class="bar-value" style="animation-delay:1.4s;">55</div>
            <div class="bar-rect type-mcn" style="height:165px;animation-delay:0.8s;"></div>
          </div>
          <div class="bar-col">
            <div class="bar-value" style="animation-delay:1.5s;">15</div>
            <div class="bar-rect type-tech" style="height:45px;animation-delay:0.95s;"></div>
          </div>
        </div>
        <div class="group-label">漫剧/偶像</div>
      </div>

      <!-- Group 3: 海外运营 -->
      <div class="group">
        <div class="group-bars">
          <div class="bar-col">
            <div class="bar-value" style="animation-delay:1.6s;">15</div>
            <div class="bar-rect type-traditional" style="height:45px;animation-delay:1.1s;"></div>
          </div>
          <div class="bar-col">
            <div class="bar-value" style="animation-delay:1.7s;">40</div>
            <div class="bar-rect type-mcn" style="height:120px;animation-delay:1.25s;"></div>
          </div>
          <div class="bar-col">
            <div class="bar-value" style="animation-delay:1.8s;">35</div>
            <div class="bar-rect type-tech" style="height:105px;animation-delay:1.4s;"></div>
          </div>
        </div>
        <div class="group-label">海外运营</div>
      </div>

      <!-- Group 4: 技术研发 -->
      <div class="group">
        <div class="group-bars">
          <div class="bar-col">
            <div class="bar-value" style="animation-delay:1.9s;">10</div>
            <div class="bar-rect type-traditional" style="height:30px;animation-delay:1.55s;"></div>
          </div>
          <div class="bar-col">
            <div class="bar-value" style="animation-delay:2.0s;">15</div>
            <div class="bar-rect type-mcn" style="height:45px;animation-delay:1.7s;"></div>
          </div>
          <div class="bar-col">
            <div class="bar-value" style="animation-delay:2.1s;">70</div>
            <div class="bar-rect type-tech" style="height:210px;animation-delay:1.85s;"></div>
          </div>
        </div>
        <div class="group-label">技术研发</div>
      </div>

      <!-- Group 5: 创作工具 -->
      <div class="group">
        <div class="group-bars">
          <div class="bar-col">
            <div class="bar-value" style="animation-delay:2.2s;">30</div>
            <div class="bar-rect type-traditional" style="height:90px;animation-delay:2.0s;"></div>
          </div>
          <div class="bar-col">
            <div class="bar-value" style="animation-delay:2.3s;">25</div>
            <div class="bar-rect type-mcn" style="height:75px;animation-delay:2.15s;"></div>
          </div>
          <div class="bar-col">
            <div class="bar-value" style="animation-delay:2.4s;">50</div>
            <div class="bar-rect type-tech" style="height:150px;animation-delay:2.3s;"></div>
          </div>
        </div>
        <div class="group-label">创作工具</div>
      </div>
    </div>
  </div>

  <div class="footer">数据来源：娱乐资本论统计</div>

  <button id="loopBtn" onclick="toggleLoop()">🔄 Loop</button>
</div>

<script>
let looping = false;
let loopTimer = null;
const ANIM_DURATION = 3200;

function showLoopBtn() {
  document.getElementById('loopBtn').style.display = 'block';
}

function toggleLoop() {
  looping = !looping;
  const btn = document.getElementById('loopBtn');
  btn.classList.toggle('active', looping);
  if (looping) {
    startLoop();
  } else {
    clearTimeout(loopTimer);
  }
}

function startLoop() {
  if (!looping) return;
  const content = document.getElementById('content');
  content.style.transition = 'opacity 0.8s';
  content.style.opacity = '0';
  loopTimer = setTimeout(() => {
    resetAnimations();
    content.style.opacity = '1';
    loopTimer = setTimeout(() => {
      if (looping) startLoop();
    }, ANIM_DURATION + 3000);
  }, 1300);
}

function resetAnimations() {
  const content = document.getElementById('content');
  const rects = content.querySelectorAll('.bar-rect');
  const vals = content.querySelectorAll('.bar-value');
  rects.forEach(r => {
    r.style.animation = 'none';
    r.offsetHeight;
    r.style.animation = '';
  });
  vals.forEach(v => {
    v.style.animation = 'none';
    v.offsetHeight;
    v.style.animation = '';
  });
}

setTimeout(showLoopBtn, ANIM_DURATION);
</script>
</body>
</html>
