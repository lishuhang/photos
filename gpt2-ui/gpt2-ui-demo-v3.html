<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>AI生图</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#FFF;--nav-bg:#F5F5F5;--border:#E0E0E0;--blue:#3333CC;--purple:#6A5ACD;
  --green:#00CC00;--red:#FF0000;--yellow:#FFCC00;--gray:#666;--light-gray:#999;
  --gap:20px;
}
html,body{height:100%;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;background:var(--bg);color:#000;font-size:14px}

/* === NAV === */
#topNav{background:var(--nav-bg);height:60px;display:flex;align-items:center;justify-content:space-between;padding:0 20px;position:sticky;top:0;z-index:100}
#topNav .title{font-size:24px;font-weight:700}
#topNav .nav-right{display:flex;align-items:center;gap:12px}
#topNav .points{color:var(--blue);font-size:18px}
#topNav .settings-icon{cursor:pointer}

/* === MAIN LAYOUT: 2 columns (left + center) === */
#mainWrap{display:flex;height:calc(100vh - 60px);overflow:hidden;position:relative}
#leftPanel{width:380px;min-width:320px;overflow-y:auto;padding:var(--gap);border-right:1px solid var(--border);flex-shrink:0}
#centerPanel{flex:1;overflow-y:auto;padding:var(--gap);position:relative}

/* === LEFT: Prompt Form — no border-radius, no shadow === */
.card{background:var(--bg);padding:var(--gap)}
#promptArea{width:100%;height:100px;border:1px solid var(--border);border-radius:4px;padding:12px;resize:vertical;font-size:14px;font-family:inherit}
#promptArea::placeholder{color:var(--light-gray)}
.prompt-actions{display:flex;gap:12px;margin-top:12px;flex-wrap:wrap}
.prompt-actions button{display:inline-flex;align-items:center;gap:4px;background:none;border:none;color:var(--blue);font-size:14px;cursor:pointer;padding:4px 0}
.prompt-actions button:hover{text-decoration:underline}
.prompt-actions button svg{flex-shrink:0}

/* Dropdown grid: 2x2 */
.dropdown-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:16px}
.dropdown-grid select{width:100%;height:40px;border:1px solid var(--border);border-radius:4px;padding:0 10px;font-size:14px;color:#000;background:var(--bg);cursor:pointer;appearance:auto}

/* Reference image */
.ref-upload{width:150px;height:150px;border:1px dashed var(--border);border-radius:4px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px;margin-top:16px;cursor:pointer;color:var(--gray);font-size:14px}
.ref-upload:hover{border-color:var(--blue);color:var(--blue)}
.ref-upload svg{flex-shrink:0}

/* Reference image scroll area */
.ref-scroll-wrap{display:flex;gap:10px;margin-top:16px;align-items:flex-start}
.ref-images{display:flex;gap:10px;overflow-x:auto;flex:1;padding-bottom:4px}
.ref-images img{width:60px;height:60px;border-radius:4px;object-fit:cover;border:1px solid var(--border);flex-shrink:0}
.ref-add-btn{flex-shrink:0;width:40px;height:40px;border:1px solid var(--border);border-radius:4px;display:flex;align-items:center;justify-content:center;cursor:pointer;background:var(--bg);color:var(--gray)}
.ref-add-btn:hover{border-color:var(--blue);color:var(--blue)}

/* Generate button */
#generateBtn{width:100%;height:50px;background:var(--purple);color:#FFF;border:none;border-radius:4px;font-size:16px;cursor:pointer;margin-top:16px;display:flex;align-items:center;justify-content:center;gap:6px}
#generateBtn:hover{opacity:.9}

/* Extra buttons row */
.extra-btns{display:flex;gap:10px;margin-top:12px}
.extra-btns button{flex:1;height:40px;border:1px solid var(--purple);border-radius:4px;background:none;color:var(--blue);font-size:14px;cursor:pointer}
.extra-btns button:hover{background:rgba(106,90,205,.06)}

/* === CENTER: Task List === */
.task-header{display:flex;align-items:center;gap:12px;flex-wrap:wrap}
.task-header label{display:inline-flex;align-items:center;gap:6px;font-size:14px;cursor:pointer;user-select:none}
.task-header input[type=checkbox]{width:16px;height:16px;accent-color:var(--blue)}
.task-header .hdr-btns{margin-left:auto;display:flex;gap:8px}
.btn-outline{height:30px;padding:0 14px;border:1px solid var(--blue);border-radius:4px;background:none;color:var(--blue);font-size:14px;cursor:pointer}
.btn-outline.danger{border-color:var(--red);color:var(--red)}
.btn-outline:hover{opacity:.8}

/* Task items */
.task-list{margin-top:16px;display:flex;flex-direction:column;gap:12px}
.task-item{display:flex;align-items:flex-start;gap:10px;padding:12px;border:1px solid var(--border);border-radius:4px;background:var(--bg)}
.task-item .status-icon{flex-shrink:0;margin-top:2px}
.task-item .task-body{flex:1;min-width:0}
.task-item .task-time{color:var(--light-gray);font-size:12px}
.task-item .task-desc{margin-top:4px;font-size:14px;line-height:1.5;word-break:break-all}
.task-item .task-actions{flex-shrink:0;display:flex;gap:8px;margin-top:2px}
.task-item .task-actions button{background:none;border:none;cursor:pointer;padding:2px;color:var(--gray)}
.task-item .task-actions button:hover{color:var(--blue)}

/* === HISTORY DRAWER: portrait only, from bottom === */
#historyDrawer{
  display:none; /* hidden in landscape */
}
#drawerToggle{
  display:none; /* hidden in landscape */
}

/* === PORTRAIT MODE === */
@media(max-width:768px){
  #mainWrap{flex-direction:column}
  #leftPanel{width:100%;min-width:0;border-right:none;border-bottom:1px solid var(--border);overflow-y:visible;max-height:none}
  #centerPanel{display:none} /* taskCard moves to drawer in portrait */
  .dropdown-grid{grid-template-columns:1fr 1fr}
  .extra-btns{flex-direction:column}
  .extra-btns button{width:100%}

  /* Drawer: bottom slide-up, portrait only */
  #historyDrawer{
    display:flex;flex-direction:column;
    position:fixed;bottom:0;left:0;right:0;
    height:65vh;
    background:var(--bg);border-top:1px solid var(--border);
    box-shadow:0 -2px 10px rgba(0,0,0,.1);
    transform:translateY(100%);
    transition:transform .3s ease;
    z-index:150;overflow-y:auto;
    border-radius:12px 12px 0 0;
  }
  #historyDrawer.open{transform:translateY(0)}

  /* Drawer header with drag handle feel */
  #historyDrawer .drawer-header{
    padding:16px 20px;display:flex;align-items:center;justify-content:space-between;
    border-bottom:1px solid var(--border);flex-shrink:0;
  }
  #historyDrawer .drawer-header h3{font-size:16px;font-weight:700}
  #historyDrawer .drawer-header button{background:none;border:none;cursor:pointer;color:var(--gray);padding:4px}
  #historyDrawer .drawer-body{padding:20px;flex:1;overflow-y:auto}

  /* Toggle button: fixed bottom-right, portrait only */
  #drawerToggle{
    display:flex;
    position:fixed;bottom:20px;right:20px;
    width:56px;height:56px;
    background:var(--purple);border:none;border-radius:50%;
    cursor:pointer;z-index:200;
    align-items:center;justify-content:center;
    box-shadow:0 2px 8px rgba(106,90,205,.4);
  }
  #drawerToggle:hover{opacity:.9}
  #drawerToggle svg{stroke:#FFF}
}
@media(max-width:420px){
  .dropdown-grid{grid-template-columns:1fr}
  #leftPanel{padding:12px}
  .card{padding:12px}
  #historyDrawer{height:75vh}
}
</style>
</head>
<body>

<!-- ========== TOP NAV ========== -->
<nav id="topNav">
  <div class="title">AI生图</div>
  <div class="nav-right">
    <span class="points">剩余 151.6</span>
    <span class="settings-icon" onclick="return false" title="设置">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#666" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
    </span>
  </div>
</nav>

<!-- ========== MAIN 2-COLUMN LAYOUT ========== -->
<div id="mainWrap">

  <!-- ===== LEFT: Prompt Form ===== -->
  <div id="leftPanel">
    <div class="card" id="promptCard">

      <!-- Textarea -->
      <textarea id="promptArea" placeholder="提示词" onclick="return false"></textarea>

      <!-- Action buttons below textarea -->
      <div class="prompt-actions">
        <button id="pasteBtn" onclick="return false">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#3333CC" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
          粘贴
        </button>
        <button id="clearBtn" onclick="return false">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#3333CC" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
          清空
        </button>
        <button id="promptLibBtn" onclick="return false">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#3333CC" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/></svg>
          提示词库
        </button>
      </div>

      <!-- Dropdowns 2×2 grid, no labels -->
      <div class="dropdown-grid">
        <select id="modelSelect" onclick="return false">
          <option>GPT-Image-2</option>
          <option>DALL·E 3</option>
        </select>
        <select id="quantitySelect" onclick="return false">
          <option>1张</option>
          <option>2张</option>
          <option>4张</option>
        </select>
        <select id="qualitySelect" onclick="return false">
          <option>1.5K 标准</option>
          <option>1K 经济</option>
          <option>2K 高清</option>
        </select>
        <select id="ratioSelect" onclick="return false">
          <option>1:1</option>
          <option>16:9</option>
          <option>9:16</option>
          <option>4:3</option>
          <option>3:4</option>
          <option>3:2</option>
          <option>2:3</option>
        </select>
      </div>

      <!-- Reference image upload area -->
      <div class="ref-upload" id="refUpload" onclick="return false">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#666" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
        <span>参考图</span>
      </div>

      <!-- Reference images scroll row with fixed add button -->
      <div class="ref-scroll-wrap" id="refScrollWrap" style="display:none">
        <div class="ref-images" id="refImages">
        </div>
        <div class="ref-add-btn" onclick="return false" title="添加参考图">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
        </div>
      </div>

      <!-- Generate button -->
      <button id="generateBtn" onclick="return false">
        生成图片
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#FFF" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><path d="M12 6v6l4 2"/></svg>
        2点
      </button>

      <!-- Extra feature buttons -->
      <div class="extra-btns">
        <button id="watermarkBtn" onclick="return false">添加水印</button>
        <button id="synthIdBtn" onclick="return false">去除SynthID</button>
      </div>

    </div>
  </div>

  <!-- ===== CENTER: Task List (landscape only, moves to drawer in portrait) ===== -->
  <div id="centerPanel">
    <div id="taskCard">
      <div class="task-header">
        <label>
          <input type="checkbox" id="ongoingChk" onclick="return false">
          进行中
        </label>
        <div class="hdr-btns">
          <button class="btn-outline" id="exportBtn" onclick="return false">导出</button>
          <button class="btn-outline danger" id="clearAllBtn" onclick="return false">清空</button>
        </div>
      </div>

      <div class="task-list" id="taskList">

        <!-- Success task -->
        <div class="task-item" id="task-success">
          <span class="status-icon">
            <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><circle cx="8" cy="8" r="8" fill="#00CC00"/><path d="M4.5 8L7 10.5L11.5 5.5" stroke="#FFF" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg>
          </span>
          <div class="task-body">
            <div class="task-time">06-03 22:42:40</div>
            <div class="task-desc">GPT-Image-2 照片的早视板比较杂乱，请按照示意图重排板上内容（示意图为手工缩放，因此部分地方有色差，重排版时可忽略）。</div>
          </div>
          <div class="task-actions">
            <button onclick="return false" title="复制">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#666" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
            </button>
            <button onclick="return false" title="下载">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#666" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
            </button>
          </div>
        </div>

        <!-- Failed task -->
        <div class="task-item" id="task-fail">
          <span class="status-icon">
            <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><circle cx="8" cy="8" r="8" fill="#FF0000"/><path d="M5.5 5.5L10.5 10.5M10.5 5.5L5.5 10.5" stroke="#FFF" stroke-width="1.8" stroke-linecap="round"/></svg>
          </span>
          <div class="task-body">
            <div class="task-time">06-03 21:58:13</div>
            <div class="task-desc">GPT-Image-2 请将这张图片转换为赛博朋克风格，保留主要构图，增强光影对比，添加霓虹灯效果。</div>
          </div>
          <div class="task-actions">
            <button onclick="return false" title="复制">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#666" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
            </button>
            <button onclick="return false" title="下载">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#666" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
            </button>
          </div>
        </div>

        <!-- Timeout task -->
        <div class="task-item" id="task-timeout">
          <span class="status-icon">
            <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><circle cx="8" cy="8" r="8" fill="#FFCC00"/><path d="M8 4.5V8.5L10.5 10" stroke="#FFF" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/></svg>
          </span>
          <div class="task-body">
            <div class="task-time">06-03 21:30:55</div>
            <div class="task-desc">GPT-Image-2 生成一张未来城市的全景图，包含飞行汽车和高楼大厦，天空中有巨大的广告屏幕和全息投影。</div>
          </div>
          <div class="task-actions">
            <button onclick="return false" title="复制">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#666" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
            </button>
            <button onclick="return false" title="下载">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#666" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
            </button>
          </div>
        </div>

      </div>
    </div>
  </div>

</div><!-- /mainWrap -->

<!-- ========== HISTORY DRAWER: portrait only, slides up from bottom ========== -->
<div id="historyDrawer">
  <div class="drawer-header">
    <h3>历史记录</h3>
    <button onclick="toggleDrawer()" title="收起">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#666" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"/></svg>
    </button>
  </div>
  <div class="drawer-body" id="drawerBody">
    <!-- taskCard will be moved here by JS in portrait mode -->
  </div>
</div>

<!-- Drawer toggle button: portrait only, bottom-right FAB -->
<button id="drawerToggle" onclick="toggleDrawer()" title="历史记录">
  <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#FFF" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"/></svg>
</button>

<script>
// Move taskCard between centerPanel (landscape) and drawer (portrait)
function relocateTaskCard(){
  var tc=document.getElementById('taskCard');
  var cp=document.getElementById('centerPanel');
  var db=document.getElementById('drawerBody');
  if(window.innerWidth<=768){
    // Portrait: taskCard goes into drawer body
    if(tc.parentElement!==db){db.appendChild(tc);}
  }else{
    // Landscape: taskCard goes back to centerPanel
    if(tc.parentElement!==cp){cp.appendChild(tc);}
    // Also close drawer if switching to landscape
    var d=document.getElementById('historyDrawer');
    d.classList.remove('open');
  }
}

// Drawer toggle
function toggleDrawer(){
  var d=document.getElementById('historyDrawer');
  var b=document.getElementById('drawerToggle');
  d.classList.toggle('open');
  var isOpen=d.classList.contains('open');
  b.innerHTML=isOpen
    ?'<svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#FFF" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 15 12 9 18 15"/></svg>'
    :'<svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#FFF" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"/></svg>';
}

// Init + resize handler
relocateTaskCard();
window.addEventListener('resize',function(){relocateTaskCard();});

// Generate two 60x60 sample base64 placeholder images
(function(){
  function makePlaceholder(color,text){
    var c=document.createElement('canvas');c.width=60;c.height=60;
    var ctx=c.getContext('2d');
    ctx.fillStyle=color;ctx.fillRect(0,0,60,60);
    ctx.fillStyle='#FFF';ctx.font='bold 12px sans-serif';ctx.textAlign='center';ctx.textBaseline='middle';
    ctx.fillText(text,30,30);
    return c.toDataURL('image/png');
  }
  var wrap=document.getElementById('refScrollWrap');
  var img1=document.createElement('img');img1.src=makePlaceholder('#6A5ACD','图1');
  var img2=document.createElement('img');img2.src=makePlaceholder('#3333CC','图2');
  document.getElementById('refImages').appendChild(img1);
  document.getElementById('refImages').appendChild(img2);
  wrap.style.display='flex';
  document.getElementById('refUpload').style.display='none';
})();
</script>
</body>
</html>
