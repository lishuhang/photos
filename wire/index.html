        body {

        .timeline-line {
            position: absolute;
            left: 1.25rem;
            top: 0;
            bottom: 0;
            width: 2px;
            background-color: #e2e8f0;
            z-index: 0;
        }

        .dark .timeline-line {
            background-color: #334155;
        }

        .loading-bar {
            position: absolute;
            bottom: 0;
            left: 0;
            height: 2px;
            background: #3b82f6;
            animation: loading 2s infinite ease-in-out;
            width: 0%;
        }

        @keyframes loading {
            0% { width: 0%; left: 0; }
            50% { width: 100%; left: 0; }
            100% { width: 0%; left: 100%; }
        }

        .modal-overlay {
            background-color: rgba(0, 0, 0, 0.5);
        }

        .toggle-checkbox:checked {
            right: 0;
            border-color: #3b82f6;
        }
        .toggle-checkbox:checked + .toggle-label {
            background-color: #3b82f6;
        }

        .scrollbar-thin::-webkit-scrollbar {
            width: 6px;
        }
        .scrollbar-thin::-webkit-scrollbar-track {
            background: transparent;
        }
        .scrollbar-thin::-webkit-scrollbar-thumb {
            background-color: #cbd5e1;
            border-radius: 20px;
        }
        .dark .scrollbar-thin::-webkit-scrollbar-thumb {
            background-color: #475569;
        }

        .hide-scrollbar::-webkit-scrollbar {
            display: none;
        }
        .hide-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }

        .banner-spinner {
            display: inline-block;
            width: 14px;
            height: 14px;
            border: 2px solid rgba(255,255,255,0.3);
            border-top-color: #fff;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        @keyframes ai-spin {
            to { transform: rotate(360deg); }
        }
        .ai-loader {
            display: inline-block;
            width: 12px;
            height: 12px;
            border: 2px solid rgba(59,130,246,0.3);
            border-top-color: #3b82f6;
            border-radius: 50%;
            animation: ai-spin 0.6s linear infinite;
        }
        .title-loader {
            display: inline-block;
            width: 10px;
            height: 10px;
            border: 1.5px solid rgba(139,92,246,0.3);
            border-top-color: #8b5cf6;
            border-radius: 50%;
            animation: ai-spin 0.6s linear infinite;
            vertical-align: middle;
            margin-left: 4px;
        }
        .retry-link {
            cursor: pointer;
            color: #3b82f6;
            text-decoration: underline;
            font-size: 10px;
            margin-left: 4px;
        }
        .retry-link:hover {
            color: #2563eb;
        }
        @keyframes toast-drift-down {
            0% { opacity: 1; transform: translateY(0); }
            70% { opacity: 0.6; transform: translateY(30px); }
            100% { opacity: 0; transform: translateY(60px); }
        }
        .toast-drift-out {
            animation: toast-drift-down 1.2s ease-out forwards;
        }
        @keyframes toast-fade-in {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .toast-fade-in {
            animation: toast-fade-in 0.3s ease-out forwards;
        }
        @keyframes banner-pulse {
            0%, 100% { box-shadow: 0 0 0 0 rgba(59,130,246,0.4); }
            50% { box-shadow: 0 0 0 6px rgba(59,130,246,0); }
        }
        .banner-pulse {
            animation: banner-pulse 2s ease-in-out infinite;
        }

        // --- Helper Functions ---

        const getLazyDefaultFeeds = () => {
            try {
                const element = document.getElementById('default-feeds-data');
                if (element) {
                    return JSON.parse(element.textContent);
                }
            } catch (e) {
                console.error("Failed to parse default feeds from HTML", e);
            }
            return [];
        };

        const fetchFeedContent = async (url) => {
            let lastError = null;
            const cacheBuster = `&_t=${Date.now()}`;

            for (const proxy of PROXY_LIST) {
                try {
                    const controller = new AbortController();
                    const timeoutId = setTimeout(() => controller.abort(), FETCH_TIMEOUT);
                    const targetUrl = proxy + encodeURIComponent(url) + cacheBuster;
                    const response = await fetch(targetUrl, { signal: controller.signal });
                    clearTimeout(timeoutId);
                    if (!response.ok) throw new Error('HTTP ' + response.status);
                    const buffer = await response.arrayBuffer();
                    const decoder = new TextDecoder("utf-8");
                    const text = decoder.decode(buffer);
                    if (text.includes("<?xml") || text.includes("<rss") || text.includes("<feed") || text.includes("<rdf")) {
                        return text;
                    }
                    throw new Error("Invalid content type or empty");
                } catch (err) {
                    lastError = err;
                }
            }
            throw lastError || new Error("All proxies failed");
        };

        // v2.6: Fetch RSS via rss2json.com API (CORS-friendly, returns parsed JSON)
        const fetchFeedViaRss2Json = async (url) => {
            try {
                const controller = new AbortController();
                const timeoutId = setTimeout(() => controller.abort(), FETCH_TIMEOUT);
                const response = await fetch(RSS2JSON_ENDPOINT + '?rss_url=' + encodeURIComponent(url), { signal: controller.signal });
                clearTimeout(timeoutId);
                if (!response.ok) throw new Error('HTTP ' + response.status);
                const data = await response.json();
                if (data.status !== 'ok' || !data.items || data.items.length === 0) {
                    throw new Error('rss2json: ' + (data.status || 'no items'));
                }
                return data;
            } catch (e) {
                throw e;
            }
        };

        // v2.6: Parse rss2json response into our standard news item format
        const parseRss2Json = (data, feedInfo) => {
            try {
                const newsItems = data.items.map(entry => {
                    const title = entry.title || '';
                    const link = entry.link || entry.guid || '';
                    const pubDate = entry.pubDate || '';
                    const description = entry.description || entry.content || '';
                    const contentEncoded = entry.content || entry.description || '';

                    if (!title || !link) return null;

                    let sourceName = feedInfo.name;
                    let cleanTitle = title;
                    if (title.includes(" - ")) {
                        const parts = title.split(" - ");
                        if (parts[parts.length - 1].length < 20) {
                            sourceName = parts[parts.length - 1];
                        }
                        cleanTitle = parts.slice(0, -1).join(" - ");
                    }
                    const isImportant =
                        title.includes("Urgent") ||
                        title.includes("Breaking") ||
                        title.includes("\u7a81\u53d1") ||
                        title.includes("\u91cd\u78c5");
                    let ts = Date.now();
                    if (pubDate) {
                        const parsedTs = new Date(pubDate.trim()).getTime();
                        if (!isNaN(parsedTs)) ts = parsedTs;
                    }

                    return {
                        id: link,
                        timestamp: ts,
                        source: sourceName,
                        content: cleanTitle,
                        url: link,
                        important: isImportant,
                        type: feedInfo.type,
                        category: feedInfo.category || 'General',
                        rssDescription: description.replace(/<[^>]*>/g, '').trim().substring(0, 2000),
                        contentEncoded: contentEncoded.trim().substring(0, 8000)
                    };
                }).filter(Boolean);

                newsItems.sort((a, b) => b.timestamp - a.timestamp);
                return newsItems.slice(0, 3);
            } catch (e) {
                console.warn('rss2json parse error for ' + feedInfo.name, e);
                return [];
            }
        };

        const parseRSS = (xmlText, feedInfo) => {
            try {
                const parser = new DOMParser();
                const xmlDoc = parser.parseFromString(xmlText, "text/xml");
                const items = xmlDoc.querySelectorAll("item, entry");
                const newsItems = [];

                items.forEach(item => {
                    const title = item.querySelector("title")?.textContent;
                    let link = item.querySelector("link")?.textContent;
                    if (!link) {
                        const linkElem = item.querySelector("link[href]");
                        if (linkElem) link = linkElem.getAttribute("href");
                    }
                    let pubDate = item.querySelector("pubDate, published, updated")?.textContent;
                    if (!pubDate) {
                        const dcDate = item.getElementsByTagName("dc:date")[0]
                                    || item.getElementsByTagNameNS("*", "date")[0];
                        if (dcDate) pubDate = dcDate.textContent;
                    }

                    if (title && link) {
                        let sourceName = feedInfo.name;
                        let cleanTitle = title;
                        if (title.includes(" - ")) {
                            const parts = title.split(" - ");
                            if (parts[parts.length - 1].length < 20) {
                                sourceName = parts[parts.length - 1];
                            }
                            cleanTitle = parts.slice(0, -1).join(" - ");
                        }
                        const isImportant =
                            title.includes("Urgent") ||
                            title.includes("Breaking") ||
                            title.includes("\u7a81\u53d1") ||
                            title.includes("\u91cd\u78c5");
                        let ts = Date.now();
                        if (pubDate) {
                            const parsedTs = new Date(pubDate.trim()).getTime();
                            if (!isNaN(parsedTs)) ts = parsedTs;
                        }

                        const descEl = item.querySelector("description");
                        const rssDescription = descEl ? descEl.textContent.trim() : "";
                        let contentEncoded = "";
                        const contentNodes = item.getElementsByTagNameNS("*", "encoded");
                        if (contentNodes.length > 0) contentEncoded = contentNodes[0].textContent.trim();

                        newsItems.push({
                            id: link,
                            timestamp: ts,
                            source: sourceName,
                            content: cleanTitle,
                            url: link,
                            important: isImportant,
                            type: feedInfo.type,
                            category: feedInfo.category || 'General',
                            rssDescription: rssDescription,
                            contentEncoded: contentEncoded
                        });
                    }
                });
                newsItems.sort((a, b) => b.timestamp - a.timestamp);
                return newsItems.slice(0, 3);
            } catch (e) {
                console.warn('XML Parse Error for ' + feedInfo.name, e);
                return [];
            }
        };

        const formatTime = (timestamp) => {
            if (!timestamp) return '--:--';
            const date = new Date(timestamp);
            return date.toLocaleTimeString('en-GB', { hour: '2-digit', minute: '2-digit' });
        };

        // --- AI Helper Functions ---
        const LANG_NAMES = {
            'zh-CN': { 'zh-CN': '简体中文', 'en': 'Simplified Chinese', 'zh-TW': '簡體中文' },
            'zh-TW': { 'zh-CN': '繁体中文', 'en': 'Traditional Chinese', 'zh-TW': '繁體中文' },
            'en': { 'zh-CN': '英语', 'en': 'English', 'zh-TW': '英語' },
            'ja': { 'zh-CN': '日语', 'en': 'Japanese', 'zh-TW': '日語' },
            'ko': { 'zh-CN': '韩语', 'en': 'Korean', 'zh-TW': '韓語' }
        };

        const getTargetLangName = (langCode, uiLang) => {
            const names = LANG_NAMES[langCode];
            if (!names) return langCode;
            return names[uiLang] || names['en'] || langCode;
        };

        const callAI = async (provider, apiKey, endpoint, messages, maxTokens) => {
            if (provider === 'gemini-2.0-flash') {
                const geminiEndpoint = endpoint || 'https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent';
                const url = geminiEndpoint + '?key=' + apiKey;
                const geminiContents = [];
                if (messages.length >= 2 && messages[0].role === 'system') {
                    geminiContents.push({ role: 'user', parts: [{ text: messages[0].content }] });
                    geminiContents.push({ role: 'model', parts: [{ text: 'Understood.' }] });
                    geminiContents.push({ role: 'user', parts: [{ text: messages[1].content }] });
                } else {
                    messages.forEach(m => {
                        geminiContents.push({ role: m.role === 'assistant' ? 'model' : 'user', parts: [{ text: m.content }] });
                    });
                }
                const response = await fetch(url, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ contents: geminiContents, generationConfig: { temperature: 0.1, maxOutputTokens: maxTokens || 300 } })
                });
                const data = await response.json();
                if (data.candidates && data.candidates[0] && data.candidates[0].content) {
                    return data.candidates[0].content.parts[0].text;
                }
                throw new Error('Gemini API error: ' + JSON.stringify(data));
            }
            const glmEndpoint = endpoint || 'https://open.bigmodel.cn/api/paas/v4/chat/completions';
            const response = await fetch(glmEndpoint, {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'Authorization': 'Bearer ' + apiKey
                },
                body: JSON.stringify({
                    model: 'glm-4-flash',
                    messages: messages,
                    temperature: 0.1,
                    max_tokens: maxTokens || 200
                })
            });
            const data = await response.json();
            if (data.choices && data.choices[0]) {
                return data.choices[0].message.content;
            }
            throw new Error('GLM API error: ' + JSON.stringify(data));
        };

        // --- AI Cache Management ---
        const loadAiCache = (key) => {
            try {
                const data = localStorage.getItem(key);
                return data ? JSON.parse(data) : {};
            } catch(e) { return {}; }
        };

        const saveAiCache = (key, data, limit) => {
            try {
                const entries = Object.entries(data);
                if (limit && limit !== 'all' && entries.length > parseInt(limit)) {
                    entries.sort((a, b) => (b[1].ts || 0) - (a[1].ts || 0));
                    const trimmed = {};
                    entries.slice(0, parseInt(limit)).forEach(([k, v]) => { trimmed[k] = v; });
                    localStorage.setItem(key, JSON.stringify(trimmed));
                } else {
                    localStorage.setItem(key, JSON.stringify(data));
                }
            } catch(e) {
                console.warn('Cache save failed, clearing old data:', e);
                const entries = Object.entries(data);
                const trimmed = {};
                entries.slice(0, 50).forEach(([k, v]) => { trimmed[k] = v; });
                try { localStorage.setItem(key, JSON.stringify(trimmed)); } catch(e2) {}
            }
        };

        const AI_ERROR_PREFIX = '__ERROR__:';

        // --- Components ---

        const UpdateBanner = ({ bannerState, updateCount, bannerProgress, onExpand, uiStrings }) => {

            if (bannerState === 'updated') {

                                                </div>
                                            </div>
                                            <div>
                                                <label className="text-sm text-slate-700 dark:text-slate-200 flex items-center gap-1.5 mb-1">
                                                    <${IconTranslate} /> ${strings.ai_endpoint}

                                                    value=${aiEndpoint}

                                            </div>
                                            <div className="flex items-center justify-between">
                                                <div>

                                            </div>
                                        </div>
                                    </div>
                                    <div className="p-3 bg-gray-50 dark:bg-slate-900 rounded border border-gray-200 dark:border-slate-700">
                                        <h3 className="text-xs font-semibold text-gray-500 dark:text-gray-400 mb-3 uppercase tracking-wider">${strings.cache_limit}</h3>
                                        <div className="flex gap-2 flex-wrap">
                                            ${['100', '500', '1000', 'all'].map(val => html`
                                                <button
                                                    key=${val}
                                                    onClick=${() => setAiCacheLimit(val)}
                                                    className=${`text-xs px-3 py-1.5 rounded border ${aiCacheLimit === val ? 'bg-blue-50 border-blue-300 text-blue-700 dark:bg-blue-900/20 dark:border-blue-700 dark:text-blue-400' : 'bg-white border-gray-300 text-gray-600 dark:bg-slate-800 dark:border-slate-600 dark:text-slate-400'}`}
                                                >

                                        </div>
                                        <button
                                            onClick=${() => {
                                                if (window.confirm(strings.clear_summary_cache_confirm)) {
                                                    onClearSummaryCache();

                                            }}
                                            className="mt-3 text-xs px-3 py-1.5 rounded border border-red-200 bg-red-50 text-red-600 dark:bg-red-900/20 dark:border-red-900/50 dark:text-red-400 hover:bg-red-100 dark:hover:bg-red-900/30"
                                        >
                                            ${strings.clear_summary_cache}
                                        </button>
                                    </div>
                                </div>
                            `}

                            ${activeTab === 'readme' && html`
                                <div className="space-y-3">
                                    <${ReadmeSection} title="Global Wire ${APP_VERSION}" defaultOpen=${true}>
                                        <p>7x24 全球突发新闻聚合器，通过 RSS 源实时聚合来自中国大陆、香港、台湾、日本、韩国、新加坡、欧洲、美国的最新资讯。</p>
                                    </${ReadmeSection}>
                                    <${ReadmeSection} title="AI 功能">
                                        <p>支持 GLM-4 Flash 和 Gemini 2.0 Flash。配置 API Key 后可使用自动翻译标题和 AI 摘要功能。翻译和摘要结果缓存在 localStorage 中，避免重复请求。</p>
                                    </${ReadmeSection}>
                                    <${ReadmeSection} title="v2.6 更新">
                                        <p>更新机制：标签页活跃时，新内容不自动汇入时间线，改为显示"有x条新消息，点击更新"提示，点击后汇入并开始摘要前10条。自动翻译标题时显示加载动画。</p>
                                    </${ReadmeSection}>
                                    <${ReadmeSection} title="技术说明">
                                        <p>使用 React 18 + htm 构建，Tailwind CSS 样式，Turndown.js 将 HTML 转 Markdown。通过 CORS 代理获取 RSS 源。单文件架构，部署于 GitHub Pages + Cloudflare Workers。</p>
                                        <p><strong>localStorage keys:</strong> theme, ui_lang, news_feeds_config, news_cache_v3, ai_provider, ai_api_key, ai_endpoint, ai_auto_translate, ai_show_summary, ai_cache_limit, ai_translations_v1, ai_summaries_v2</p>
                                    </${ReadmeSection}>
                                </div>
                            `}
                        </div>
                    </div>
                </div>
            `;
        };

        // --- Main App ---
        const App = () => {
            const [feeds, setFeeds] = useState([]);
            const [news, setNews] = useState([]);
            const [theme, setTheme] = useState('system');
            const [uiLang, setUiLang] = useState('zh-CN');
            const [notifications, setNotifications] = useState(false);
            const [status, setStatus] = useState('idle');
            const [lastUpdated, setLastUpdated] = useState(Date.now());
            const [retryCount, setRetryCount] = useState(0);
            const [isSettingsOpen, setIsSettingsOpen] = useState(false);
            const [fetchStats, setFetchStats] = useState({ total: 0, success: 0 });
            const [activeCategory, setActiveCategory] = useState('ALL');
            const [bannerState, setBannerState] = useState('hidden');
            const [updateCount, setUpdateCount] = useState(0);
            const [bannerProgress, setBannerProgress] = useState({ completed: 0, total: 0 });

            // v2.6: Pending items buffer - holds new items until user clicks to merge
            const pendingItemsRef = useRef([]);
            const [, setPendingTick] = useState(0);

            // v2.1: AI settings
            const [aiProvider, setAiProvider] = useState('glm-4-flash');
            const DEFAULT_API_KEY = '0b3a84dc7afc4196a442717f297dfd43.4Y2f136IIg4BtxQD';
            const [aiApiKey, setAiApiKey] = useState(DEFAULT_API_KEY);
            const [aiEndpoint, setAiEndpoint] = useState('');
            const [autoTranslate, setAutoTranslate] = useState(false);
            const [showSummary, setShowSummary] = useState(false);
            const [aiCacheLimit, setAiCacheLimit] = useState('100');

            // v2.1: AI caches with localStorage persistence
            const translationsRef = useRef(loadAiCache('ai_translations_v1'));
            const summariesRef = useRef(loadAiCache('ai_summaries_v2'));
            const aiStatesRef = useRef({});

            // Track previous API key for auto-retry
            const prevApiKeyRef = useRef('');

            const [, setAiTick] = useState(0);
            const triggerAiRerender = useCallback(() => {
                setAiTick(t => t + 1);
            }, []);

            const bannerDismissTimerRef = useRef(null);
            const prevFeedsStrRef = useRef('');
            const initialFetchDoneRef = useRef(false);
            const isFirstFetchRef = useRef(true);

            // AI processing queue to avoid parallel API calls
            const aiQueueRef = useRef([]);
            const aiProcessingRef = useRef(false);

            const categories = useMemo(() => {
                const cats = new Set(feeds.filter(f => f.enabled).map(f => f.category || 'General'));
                return Array.from(cats).sort();
            }, [feeds]);

            const filteredNews = useMemo(() => {
                if (activeCategory === 'ALL') return news;
                return news.filter(item => item.category === activeCategory);
            }, [news, activeCategory]);

            // Initialize System
            useEffect(() => {
                const savedTheme = localStorage.getItem('theme');
                setTheme(savedTheme || 'system');

                const savedLang = localStorage.getItem('ui_lang');
                if (savedLang) setUiLang(savedLang);

                if (Notification.permission === 'granted') setNotifications(true);

                const savedAiProvider = localStorage.getItem('ai_provider');
                if (savedAiProvider) setAiProvider(savedAiProvider);

                const savedAiApiKey = localStorage.getItem('ai_api_key');
                if (savedAiApiKey && savedAiApiKey !== 'undefined') setAiApiKey(savedAiApiKey);
                prevApiKeyRef.current = (savedAiApiKey && savedAiApiKey !== 'undefined') ? savedAiApiKey : DEFAULT_API_KEY;

                const savedAiEndpoint = localStorage.getItem('ai_endpoint');
                if (savedAiEndpoint) setAiEndpoint(savedAiEndpoint);

                const savedAutoTranslate = localStorage.getItem('ai_auto_translate');
                if (savedAutoTranslate === 'true') setAutoTranslate(true);

                const savedShowSummary = localStorage.getItem('ai_show_summary');
                if (savedShowSummary === 'true') setShowSummary(true);

                const savedAiCacheLimit = localStorage.getItem('ai_cache_limit');
                if (savedAiCacheLimit) setAiCacheLimit(savedAiCacheLimit);

                const savedFeeds = localStorage.getItem('news_feeds_config');
                const defaultFeeds = getLazyDefaultFeeds();

                if (savedFeeds) {
                    try {
                        const parsed = JSON.parse(savedFeeds);
                        if (parsed.length < 15) {
                            setFeeds(defaultFeeds);
                        } else {
                            setFeeds(parsed);
                        }
                    } catch(e) {
                        setFeeds(defaultFeeds);
                    }
                } else {
                    setFeeds(defaultFeeds);
                }

                const cached = localStorage.getItem('news_cache_v3');
                if (cached) {
                    try {
                        setNews(JSON.parse(cached));
                    } catch(e) { console.error("Cache error"); }
                }
            }, []);

            // Always fetch on page load
            useEffect(() => {
                if (feeds.length > 0 && !initialFetchDoneRef.current) {
                    initialFetchDoneRef.current = true;
                    fetchData();
                }
                const timer = setInterval(fetchData, UPDATE_INTERVAL);
                return () => clearInterval(timer);
            }, [feeds, notifications]);

            // Save feeds when changed
            useEffect(() => {
                if (feeds.length > 0) {
                    localStorage.setItem('news_feeds_config', JSON.stringify(feeds));
                }
            }, [feeds]);

            useEffect(() => { localStorage.setItem('ui_lang', uiLang); }, [uiLang]);
            useEffect(() => { localStorage.setItem('ai_provider', aiProvider); }, [aiProvider]);
            useEffect(() => { localStorage.setItem('ai_api_key', aiApiKey); }, [aiApiKey]);
            useEffect(() => { localStorage.setItem('ai_endpoint', aiEndpoint); }, [aiEndpoint]);
            useEffect(() => { localStorage.setItem('ai_auto_translate', String(autoTranslate)); }, [autoTranslate]);
            useEffect(() => { localStorage.setItem('ai_show_summary', String(showSummary)); }, [showSummary]);
            useEffect(() => { localStorage.setItem('ai_cache_limit', aiCacheLimit); }, [aiCacheLimit]);

            // Theme Management
            useEffect(() => {
                const applyTheme = (isDark) => {
                    if (isDark) {
                        document.documentElement.classList.add('dark');
                    } else {
                        document.documentElement.classList.remove('dark');
                    }
                };
                if (theme === 'system') {
                    const mq = window.matchMedia('(prefers-color-scheme: dark)');
                    applyTheme(mq.matches);
                    const handler = (e) => applyTheme(e.matches);
                    mq.addEventListener('change', handler);
                    localStorage.setItem('theme', 'system');
                    return () => mq.removeEventListener('change', handler);
                } else {
                    applyTheme(theme === 'dark');
                    localStorage.setItem('theme', theme);
                }
            }, [theme]);

            // Notifications
            const sendNotification = useCallback((count) => {
                if (!notifications || document.visibilityState === 'visible' || count === 0) return;
                const strings = STRINGS[uiLang];
                try {
                    const notif = new Notification(strings.notif_new_updates_title, {
                        body: strings.notif_new_updates_body.replace('{count}', count),
                        icon: 'https://cdn-icons-png.flaticon.com/512/2965/2965879.png'
                    });
                    notif.onclick = () => { window.focus(); notif.close(); };
                } catch(e) {
                    console.warn('Notification failed:', e);
                }
            }, [notifications, uiLang]);

            // v2.6: handleBannerExpand - merge pending items and trigger summary for first 10
            const handleBannerExpand = useCallback(() => {
                const items = pendingItemsRef.current;
                if (items.length > 0) {
                    setNews(prev => {
                        const currentIds = new Set(prev.map(n => n.id));
                        const unique = items.filter(item => !currentIds.has(item.id));
                        if (unique.length > 0) {
                            const combined = [...unique, ...prev]
                                .sort((a, b) => b.timestamp - a.timestamp)
                                .slice(0, MAX_ITEMS);
                            localStorage.setItem('news_cache_v3', JSON.stringify(combined));
                            return combined;
                        }
                        return prev;
                    });

                    // Trigger summary for first 10 new items (will be picked up by the news useEffect)
                    if (showSummary && aiApiKey) {
                        const itemsToSummarize = items.slice(0, 10);
                        // Small delay to ensure news state is updated before scheduling
                        setTimeout(() => {
                            itemsToSummarize.forEach(item => {
                                handleSummaryRef.current(item, !!summariesRef.current[item.id]);
                            });
                        }, 300);
                    }

                    pendingItemsRef.current = [];
                    setPendingTick(t => t + 1);
                }

                setBannerState('updated');
                if (bannerDismissTimerRef.current) clearTimeout(bannerDismissTimerRef.current);
                bannerDismissTimerRef.current = setTimeout(() => { setBannerState('hidden'); }, 2000);
            }, [showSummary, aiApiKey]);

            // v2.3: AI processing queue
            const processAiQueue = useCallback(async () => {
                if (aiProcessingRef.current || aiQueueRef.current.length === 0) return;
                aiProcessingRef.current = true;

                while (aiQueueRef.current.length > 0) {
                    const task = aiQueueRef.current.shift();
                    try {
                        await task();
                    } catch(e) {
                        console.error('AI queue task error:', e);
                    }
                }

                aiProcessingRef.current = false;
            }, []);

            const enqueueAiTask = useCallback((task) => {
                aiQueueRef.current.push(task);
                processAiQueue();
            }, [processAiQueue]);

            // v2.3: Summary batch tracking
            const summaryInFlightRef = useRef(0);
            const MAX_SUMMARY_INFLIGHT = 10;

            // v2.1: Translate handler with localStorage cache
            const handleTranslate = useCallback((item, isRetry) => {
                if (!aiApiKey) return;
                const existing = translationsRef.current[item.id];
                if (!isRetry && existing && !existing.startsWith(AI_ERROR_PREFIX)) return;
                if (aiStatesRef.current[item.id] === 'translating') return;

                aiStatesRef.current[item.id] = 'translating';
                triggerAiRerender();

                enqueueAiTask(async () => {
                    try {
                        const result = await callAI(aiProvider, aiApiKey, aiEndpoint, [
                            { role: 'system', content: 'You are a translator. Translate the following news title to ' + uiLang + '. Output only the translation, nothing else.' },
                            { role: 'user', content: item.content }
                        ]);
                        translationsRef.current[item.id] = result.trim();
                    } catch(e) {
                        console.error('Translation failed:', e);
                        translationsRef.current[item.id] = AI_ERROR_PREFIX + (e.message || 'Unknown error');
                    } finally {
                        aiStatesRef.current[item.id] = null;
                        saveAiCache('ai_translations_v1', translationsRef.current, aiCacheLimit);
                        triggerAiRerender();
                    }
                });
            }, [aiProvider, aiApiKey, aiEndpoint, uiLang, aiCacheLimit, triggerAiRerender, enqueueAiTask]);

            // v2.4: Summary handler
            const handleSummary = useCallback((item, isRetry) => {
                if (!aiApiKey) return;
                const existing = summariesRef.current[item.id];
                if (!isRetry && existing && !existing.startsWith(AI_ERROR_PREFIX)) return;
                if (aiStatesRef.current[item.id] === 'summarizing') return;
                if (summaryInFlightRef.current >= MAX_SUMMARY_INFLIGHT) return;

                summaryInFlightRef.current++;
                aiStatesRef.current[item.id] = 'summarizing';
                triggerAiRerender();

                enqueueAiTask(async () => {
                    try {
                        let articleMarkdown = '';
                        let contentSource = 'none';

                        // Step 1: Try RSS feed's own content
                        const rssContent = item.contentEncoded || item.rssDescription || '';

                        if (rssContent) {
                            try {
                                const turndownService = new TurndownService({
                                    headingStyle: 'atx',
                                    codeBlockStyle: 'fenced',
                                    bulletListMarker: '-'
                                });
                                turndownService.remove(['script', 'style', 'nav', 'footer', 'header', 'iframe', 'noscript', 'aside', '.ad', '.advertisement', '.sidebar', '.comments', '.social-share', '.related', '#comments']);

                                if (rssContent.includes('<') && rssContent.includes('>')) {
                                    const doc = new DOMParser().parseFromString(rssContent, 'text/html');
                                    articleMarkdown = turndownService.turndown(doc.body);
                                } else {
                                    articleMarkdown = rssContent;
                                }
                                articleMarkdown = articleMarkdown.replace(/\n{3,}/g, '\n\n').trim();

                                const titleNorm = item.content.trim().toLowerCase().replace(/\s+/g, ' ');
                                const mdNorm = articleMarkdown.trim().toLowerCase().replace(/\s+/g, ' ');
                                if (mdNorm.length > 0 && mdNorm.length < titleNorm.length + 20 && (titleNorm === mdNorm || titleNorm.includes(mdNorm))) {
                                    articleMarkdown = '';
                                    contentSource = 'rss:dup-title';
                                } else if (articleMarkdown.length > 4000) {
                                    articleMarkdown = articleMarkdown.substring(0, 4000);
                                    contentSource = 'rss:' + (item.contentEncoded ? 'encoded' : 'desc') + '(' + articleMarkdown.length + ')';
                                } else {
                                    contentSource = 'rss:' + (item.contentEncoded ? 'encoded' : 'desc') + '(' + articleMarkdown.length + ')';
                                }
                            } catch(e) {
                                console.warn('RSS content turndown failed:', e);
                            }
                        }

                        // Step 2: If RSS content is insufficient, try fetching article via proxy
                        if (articleMarkdown.length < 80) {
                            let fetchLog = '';
                            try {
                                const turndownService = new TurndownService({
                                    headingStyle: 'atx',
                                    codeBlockStyle: 'fenced',
                                    bulletListMarker: '-'
                                });
                                turndownService.remove(['script', 'style', 'nav', 'footer', 'header', 'iframe', 'noscript', 'aside', '.ad', '.advertisement', '.sidebar', '.comments', '.social-share', '.related', '#comments']);

                                const ARTICLE_TIMEOUT = 10000;
                                for (const proxyConfig of ARTICLE_PROXY_LIST) {
                                    try {
                                        const controller = new AbortController();
                                        const timeoutId = setTimeout(() => controller.abort(), ARTICLE_TIMEOUT);
                                        const targetUrl = proxyConfig.url + encodeURIComponent(item.url);
                                        const response = await fetch(targetUrl, { signal: controller.signal });
                                        clearTimeout(timeoutId);
                                        fetchLog += proxyConfig.url.split('/')[2] + ':' + response.status + ' ';

                                        if (response.ok) {
                                            let htmlText = '';
                                            if (proxyConfig.type === 'json') {
                                                const jsonData = await response.json();
                                                htmlText = jsonData.contents || '';
                                            } else {
                                                htmlText = await response.text();
                                            }

                                            if (!htmlText) { fetchLog += 'empty '; continue; }
                                            fetchLog += 'len=' + htmlText.length + ' ';

                                            const doc = new DOMParser().parseFromString(htmlText, 'text/html');

                                            const selectors = ['article', '[role="article"]', '.article-content', '.post-content', '.entry-content', '.article_body', '.news-content', '.story-body', '.article__body', '.post-body', '.content-body', '#article-body', '.main-content', '#content', '.content'];
                                            let articleEl = null;
                                            for (const sel of selectors) {
                                                articleEl = doc.querySelector(sel);
                                                if (articleEl && articleEl.textContent.trim().length > 300) break;
                                                articleEl = null;
                                            }
                                            if (!articleEl) articleEl = doc.body;

                                            if (articleEl) {
                                                const fetchedMd = turndownService.turndown(articleEl);
                                                const trimmedMd = fetchedMd.replace(/\n{3,}/g, '\n\n').trim().substring(0, 4000);
                                                if (trimmedMd.length > articleMarkdown.length) {
                                                    articleMarkdown = trimmedMd;
                                                    contentSource = 'fetch:' + fetchLog.trim() + '(' + articleMarkdown.length + ')';
                                                }
                                            }
                                            if (articleMarkdown.length > 80) break;
                                        }
                                    } catch(e) {
                                        fetchLog += 'err:' + (e.message || 'timeout') + ' ';
                                    }
                                }
                            } catch(e) {
                                console.warn('Article fetch failed:', e);
                            }
                            if (contentSource.startsWith('rss')) {
                                contentSource += ' | fetch:' + fetchLog.trim();
                            }
                        }

                        console.log('[Summary] ' + item.content.substring(0, 40) + ' | source: ' + contentSource + ' | mdLen: ' + articleMarkdown.length);

                        let messages;
                        if (articleMarkdown && articleMarkdown.length > 30) {
                            const promptTemplate = articleMarkdown.length > 200
                                ? 'Summarize this news article in approximately 140 characters in {lang}. Focus on the key facts: who, what, when, where, why. Keep key numbers. Output only the summary.'
                                : 'Based on the limited content available, write a brief summary in approximately 100 characters in {lang}. Focus on the key point. Output only the summary.';
                            messages = [
                                { role: 'system', content: promptTemplate.replace('{lang}', uiLang) },
                                { role: 'user', content: articleMarkdown }
                            ];
                        } else {
                            summariesRef.current[item.id] = AI_ERROR_PREFIX + 'Unable to fetch article content (mdLen=' + articleMarkdown.length + ')';
                            saveAiCache('ai_summaries_v2', summariesRef.current, aiCacheLimit);
                            triggerAiRerender();
                            return;
                        }

                        const result = await callAI(aiProvider, aiApiKey, aiEndpoint, messages, 300);
                        summariesRef.current[item.id] = result.trim();
                    } catch(e) {
                        console.error('Summary failed:', e);
                        summariesRef.current[item.id] = AI_ERROR_PREFIX + (e.message || 'Unknown error');
                    } finally {
                        aiStatesRef.current[item.id] = null;
                        summaryInFlightRef.current--;
                        saveAiCache('ai_summaries_v2', summariesRef.current, aiCacheLimit);
                        triggerAiRerender();
                        setTimeout(() => { if (scheduleNextBatchRef.current) scheduleNextBatchRef.current(); }, 50);
                    }
                });
            }, [aiProvider, aiApiKey, aiEndpoint, uiLang, aiCacheLimit, triggerAiRerender, enqueueAiTask]);

            // Ref to break circular dep
            const scheduleNextBatchRef = useRef(null);
            const handleSummaryRef = useRef(null);
            handleSummaryRef.current = handleSummary;

            // Schedule next batch of summaries
            const scheduleNextSummaryBatch = useCallback(() => {
                if (!showSummary || !aiApiKey) return;
                const needed = news.filter(item => {
                    const existing = summariesRef.current[item.id];
                    const state = aiStatesRef.current[item.id];
                    if (existing && !existing.startsWith(AI_ERROR_PREFIX)) return false;
                    if (state === 'summarizing') return false;
                    return true;
                });
                needed.sort((a, b) => {
                    const aErr = summariesRef.current[a.id]?.startsWith(AI_ERROR_PREFIX) ? 1 : 0;
                    const bErr = summariesRef.current[b.id]?.startsWith(AI_ERROR_PREFIX) ? 1 : 0;
                    return aErr - bErr;
                });
                const available = Math.max(0, MAX_SUMMARY_INFLIGHT - summaryInFlightRef.current);
                const toSchedule = needed.slice(0, available);
                toSchedule.forEach(item => {
                    handleSummary(item, !!summariesRef.current[item.id]);
                });
            }, [showSummary, aiApiKey, news, handleSummary]);

            scheduleNextBatchRef.current = scheduleNextSummaryBatch;

            // Auto-translate when news items arrive
            useEffect(() => {
                if (!aiApiKey || news.length === 0) return;
                if (autoTranslate) {
                    news.forEach(item => {
                        const existing = translationsRef.current[item.id];
                        if (!existing || existing.startsWith(AI_ERROR_PREFIX)) {
                            handleTranslate(item, !!existing);
                        }
                    });
                }
            }, [news, autoTranslate, aiApiKey, handleTranslate]);

            // Auto-summary
            useEffect(() => {
                if (!showSummary || !aiApiKey || news.length === 0) return;
                setTimeout(() => { if (scheduleNextBatchRef.current) scheduleNextBatchRef.current(); }, 200);
            }, [news, showSummary, aiApiKey]);

            // When summary is toggled OFF, cancel all in-progress summaries
            useEffect(() => {
                if (showSummary) return;
                Object.keys(aiStatesRef.current).forEach(key => {
                    if (aiStatesRef.current[key] === 'summarizing') {
                        aiStatesRef.current[key] = null;
                    }
                });
                summaryInFlightRef.current = 0;
                triggerAiRerender();
            }, [showSummary, triggerAiRerender]);

            // IntersectionObserver for lazy summary loading
            const summaryObserverRef = useRef(null);
            const observedEntriesRef = useRef(new Set());

            useEffect(() => {
                if (!showSummary) {
                    if (summaryObserverRef.current) {
                        summaryObserverRef.current.disconnect();
                        summaryObserverRef.current = null;
                    }
                    observedEntriesRef.current.clear();
                    return;
                }
                if (!aiApiKey) return;

                if (!summaryObserverRef.current) {
                    summaryObserverRef.current = new IntersectionObserver((entries) => {
                        entries.forEach(entry => {
                            if (entry.isIntersecting) {
                                const itemId = entry.target.getAttribute('data-item-id');
                                if (itemId) {
                                    const existing = summariesRef.current[itemId];
                                    if (!existing || existing.startsWith(AI_ERROR_PREFIX)) {
                                        if (summaryInFlightRef.current < MAX_SUMMARY_INFLIGHT && scheduleNextBatchRef.current) {
                                            scheduleNextBatchRef.current();
                                        }
                                    }
                                }
                                summaryObserverRef.current.unobserve(entry.target);
                            }
                        });
                    }, { rootMargin: '200px' });
                }

                const elements = document.querySelectorAll('[data-item-id]');
                elements.forEach(el => {
                    const itemId = el.getAttribute('data-item-id');
                    if (!observedEntriesRef.current.has(itemId)) {
                        observedEntriesRef.current.add(itemId);
                        summaryObserverRef.current.observe(el);
                    }
                });
            }, [showSummary, aiApiKey, news]);

            // Retry handlers
            const handleRetryTranslate = useCallback((item) => {
                handleTranslate(item, true);
            }, [handleTranslate]);

            const handleRetrySummary = useCallback((item) => {
                handleSummary(item, true);
            }, [handleSummary]);

            // Clear summary cache
            const handleClearSummaryCache = useCallback(() => {
                summariesRef.current = {};
                localStorage.removeItem('ai_summaries_v1');
                localStorage.removeItem('ai_summaries_v2');
                triggerAiRerender();
            }, [triggerAiRerender]);

            // v2.6: RSS Racing with pending buffer
            const fetchData = async () => {
                if (feeds.length === 0) return;
                setStatus('fetching');
                setBannerState('updating');
                setBannerProgress({ completed: 0, total: 0 });

                const active = feeds.filter(f => f.enabled !== false);
                const totalFeeds = active.length;
                let completedCount = 0;
                let successCount = 0;

                // Track current IDs (from both displayed news and pending items)
                const currentIds = new Set(news.map(n => n.id));
                pendingItemsRef.current.forEach(item => currentIds.add(item.id));
                const pendingIds = new Set(pendingItemsRef.current.map(n => n.id));

                let allNewItems = [];

                const promises = active.map(async (feed) => {
                    try {
                        // v2.6: Try proxy first, then rss2json as fallback
                        let items = [];
                        try {
                            const xml = await fetchFeedContent(feed.url);
                            items = parseRSS(xml, feed);
                        } catch(proxyErr) {
                            // Proxy failed, try rss2json.com
                            try {
                                const r2jData = await fetchFeedViaRss2Json(feed.url);
                                items = parseRss2Json(r2jData, feed);
                            } catch(r2jErr) {
                                // Both failed
                            }
                        }
                        if (items.length > 0) {
                            successCount++;
                            const unique = items.filter(item => !currentIds.has(item.id));
                            if (unique.length > 0) {
                                allNewItems.push(...unique);
                                unique.forEach(item => currentIds.add(item.id));
                            }
                        }
                    } catch(e) {}
                    completedCount++;
                    setBannerProgress({ completed: completedCount, total: totalFeeds });
                });

                await Promise.allSettled(promises);

                setFetchStats({ total: totalFeeds, success: successCount });
                setLastUpdated(Date.now());
                setStatus(successCount > 0 ? 'idle' : 'error');

                if (allNewItems.length > 0) {
                    allNewItems.sort((a, b) => b.timestamp - a.timestamp);

                    // First fetch always auto-merges so user sees content immediately
                    const isFirstFetch = isFirstFetchRef.current;
                    if (isFirstFetch) {
                        isFirstFetchRef.current = false;
                    }

                    const isVisible = document.visibilityState === 'visible';
                    if (isVisible && !isFirstFetch) {
                        // v2.6: Buffer new items, don't merge yet (tab is active and not first load)
                        pendingItemsRef.current = [...allNewItems, ...pendingItemsRef.current]
                            .sort((a, b) => b.timestamp - a.timestamp);
                        // Remove duplicates in pending buffer
                        const seenIds = new Set();
                        pendingItemsRef.current = pendingItemsRef.current.filter(item => {
                            if (seenIds.has(item.id)) return false;
                            seenIds.add(item.id);
                            return true;
                        });

                        setUpdateCount(pendingItemsRef.current.length);
                        setBannerState('available');
                        setPendingTick(t => t + 1);
                    } else {
                        // Auto-merge: first load OR tab is not visible
                        setNews(prev => {
                            const prevIds = new Set(prev.map(n => n.id));
                            const unique = allNewItems.filter(item => !prevIds.has(item.id));
                            if (unique.length > 0) {
                                const combined = [...unique, ...prev]
                                    .sort((a, b) => b.timestamp - a.timestamp)
                                    .slice(0, MAX_ITEMS);
                                localStorage.setItem('news_cache_v3', JSON.stringify(combined));
                                return combined;
                            }
                            return prev;
                        });
                        if (isVisible) {
                            setBannerState('hidden');
                        } else {
                            setBannerState('hidden');
                            sendNotification(allNewItems.length);
                        }
                    }
                } else {
                    // No new items, but still check if we had pending from before
                    if (pendingItemsRef.current.length > 0) {
                        setUpdateCount(pendingItemsRef.current.length);
                        setBannerState('available');
                    } else {
                        setBannerState('hidden');
                    }
                    if (successCount === 0 && retryCount < 2) {
                        setStatus('error');
                    }
                }
            };

            const toggleNotifications = async () => {
                if (!notifications) {
                    const permission = await Notification.requestPermission();
                    if (permission === 'granted') setNotifications(true);
                } else {
                    setNotifications(false);
                }
            };

            const handleOpenSettings = () => {
                prevFeedsStrRef.current = JSON.stringify(feeds);
                prevApiKeyRef.current = aiApiKey;
                setIsSettingsOpen(true);
            };

            const handleCloseSettings = () => {
                setIsSettingsOpen(false);

                // If API key changed, retry all failed translations and summaries
                if (aiApiKey && aiApiKey !== prevApiKeyRef.current) {
                    const failedTransKeys = Object.keys(translationsRef.current).filter(k => translationsRef.current[k].startsWith(AI_ERROR_PREFIX));
                    const failedSummKeys = Object.keys(summariesRef.current).filter(k => summariesRef.current[k].startsWith(AI_ERROR_PREFIX));

                    news.forEach(item => {
                        if (failedTransKeys.includes(item.id)) {
                            handleRetryTranslate(item);
                        }
                        if (failedSummKeys.includes(item.id)) {
                            handleRetrySummary(item);
                        }
                    });
                }

                const currentFeedsStr = JSON.stringify(feeds);
                if (prevFeedsStrRef.current !== currentFeedsStr) {
                    setNews([]);
                    localStorage.removeItem('news_cache_v3');
                    setStatus('idle');
                    setActiveCategory('ALL');
                    setTimeout(() => fetchData(), 50);
                }
            };

            const handleManualRefresh = () => { fetchData(); };

            const hasError = status === 'error' || (status === 'idle' && fetchStats.total > 0 && fetchStats.success === 0);
            const uiStrings = STRINGS[uiLang];

            // Get translation/summary for display
            const getTranslation = (id) => {
                const entry = translationsRef.current[id];
                return entry || null;
            };
            const getSummary = (id) => {
                const entry = summariesRef.current[id];
                return entry || null;
            };

            return html`
                <div className="min-h-screen flex flex-col max-w-4xl mx-auto border-x border-gray-200 dark:border-slate-800 bg-white dark:bg-slate-900">
                    <${Header}
                        status=${status}
                        onOpenSettings=${handleOpenSettings}
                        onRefresh=${handleManualRefresh}
                        uiStrings=${uiStrings}
                        hasError=${hasError}
                        showSummary=${showSummary}
                        setShowSummary=${setShowSummary}
                    />
                    <${FilterBar}
                        categories=${categories}
                        activeCategory=${activeCategory}
                        onSelectCategory=${setActiveCategory}
                        uiStrings=${uiStrings}
                    />

                    <main className="flex-1 relative p-4 sm:p-6 overflow-x-hidden">
                        <div className="timeline-line"></div>

                        <${UpdateBanner}
                            bannerState=${bannerState}
                            updateCount=${updateCount}
                            bannerProgress=${bannerProgress}
                            onExpand=${handleBannerExpand}
                            uiStrings=${uiStrings}
                        />

                        ${filteredNews.length === 0 && status !== 'fetching' && html`
                            <div className="pl-10 pt-10 text-gray-400">
                                <p>${hasError ? uiStrings.error_fetch : uiStrings.no_items}</p>
                            </div>
                        `}

                        <div className="space-y-0">
                            ${filteredNews.map((item) => html`
                                <${NewsCard}
                                    key=${item.id}
                                    item=${item}
                                    translation=${getTranslation(item.id)}
                                    summaryText=${getSummary(item.id)}
                                    aiState=${aiStatesRef.current[item.id]}
                                    onTranslate=${handleTranslate}
                                    onRetryTranslate=${handleRetryTranslate}
                                    onRetrySummary=${handleRetrySummary}
                                    autoTranslate=${autoTranslate}
                                    showSummary=${showSummary}
                                    hasApiKey=${!!aiApiKey}
                                    uiStrings=${uiStrings}
                                />
                            `)}
                        </div>

                        <div className="relative pl-8 py-12 text-center opacity-60 hover:opacity-100">
                            <div className="absolute left-[1.25rem] -translate-x-1/2 w-2 h-2 bg-gray-300 dark:bg-slate-700 rounded-full top-1/2"></div>
                            <div className="flex flex-col items-center gap-1">
                                <button
                                    onClick=${handleManualRefresh}
                                    className=${`text-xs font-mono ${hasError ? 'text-red-500 font-bold' : 'text-gray-400 hover:text-blue-500'}`}
                                >
                                    ${status === 'fetching' ? uiStrings.updating :
                                     hasError ? uiStrings.error_fetch :
                                     uiStrings.last_updated + ' ' + formatTime(lastUpdated)}
                                </button>
                                ${fetchStats.total > 0 && html`
                                    <span className=${`text-[10px] font-mono ${fetchStats.success < fetchStats.total ? 'text-yellow-600 dark:text-yellow-500' : 'text-gray-300 dark:text-slate-700'}`}>
                                        ${uiStrings.success_rate} ${fetchStats.success}/${fetchStats.total}
                                    </span>
                                `}
                                <p className="text-[10px] text-gray-300 dark:text-slate-700 mt-1">
                                    ${uiStrings.sources_via} Global RSS Feeds (Proxy)
                                </p>
                                <p className="text-[10px] text-gray-300 dark:text-slate-700">
                                    Global Wire ${APP_VERSION}
                                </p>
                            </div>
                        </div>
                    </main>

                    <${SettingsModal}
                        isOpen=${isSettingsOpen}
                        onClose=${handleCloseSettings}
                        feeds=${feeds}
                        setFeeds=${setFeeds}
                        uiLang=${uiLang}
                        setUiLang=${setUiLang}
                        theme=${theme}
                        setTheme=${setTheme}
                        notifications=${notifications}
                        toggleNotifications=${toggleNotifications}
                        aiProvider=${aiProvider}
                        setAiProvider=${setAiProvider}
                        aiApiKey=${aiApiKey}
                        setAiApiKey=${setAiApiKey}
                        aiEndpoint=${aiEndpoint}
                        setAiEndpoint=${setAiEndpoint}
                        autoTranslate=${autoTranslate}
                        setAutoTranslate=${setAutoTranslate}
                        showSummary=${showSummary}
                        setShowSummary=${setShowSummary}
                        aiCacheLimit=${aiCacheLimit}
                        setAiCacheLimit=${setAiCacheLimit}
                        onClearSummaryCache=${handleClearSummaryCache}
                    />
                </div>
            `;
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(html`<${App} />`);
    </script>
</body></html>
