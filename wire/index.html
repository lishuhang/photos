        body {

        .timeline-line {
            position: absolute;
            left: 1.25rem;
            top: 0;
            bottom: 0;
            width: 2px;
            background-color: #e2e8f0;
            z-index: 0;
        }

        .dark .timeline-line {
            background-color: #334155;
        }

        .loading-bar {
            position: absolute;
            bottom: 0;
            left: 0;
            height: 2px;
            background: #3b82f6;
            animation: loading 2s infinite ease-in-out;
            width: 0%;
        }

        @keyframes loading {
            0% { width: 0%; left: 0; }
            50% { width: 100%; left: 0; }
            100% { width: 0%; left: 100%; }
        }

        .modal-overlay {
            background-color: rgba(0, 0, 0, 0.5);
        }

        .toggle-checkbox:checked {
            right: 0;
            border-color: #3b82f6;
        }
        .toggle-checkbox:checked + .toggle-label {
            background-color: #3b82f6;
        }

        .scrollbar-thin::-webkit-scrollbar {
            width: 6px;
        }
        .scrollbar-thin::-webkit-scrollbar-track {
            background: transparent;
        }
        .scrollbar-thin::-webkit-scrollbar-thumb {
            background-color: #cbd5e1;
            border-radius: 20px;
        }
        .dark .scrollbar-thin::-webkit-scrollbar-thumb {
            background-color: #475569;
        }

        .hide-scrollbar::-webkit-scrollbar {
            display: none;
        }
        .hide-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }

        .banner-spinner {
            display: inline-block;
            width: 14px;
            height: 14px;
            border: 2px solid rgba(255,255,255,0.3);
            border-top-color: #fff;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .update-toast {
            animation: toastSlideIn 0.3s ease-out;
        }
        @keyframes toastSlideIn {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .ai-result {
            animation: fadeIn 0.2s ease-out;
        }
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        // --- Helper Functions ---

        const getLazyDefaultFeeds = () => {
            try {
                const element = document.getElementById('default-feeds-data');
                if (element) {
                    return JSON.parse(element.textContent);
                }
            } catch (e) {
                console.error("Failed to parse default feeds from HTML", e);
            }
            return [];
        };

        // Robust Fetcher with Proxy Fallback
        const fetchFeedContent = async (url) => {
            let lastError = null;
            const cacheBuster = `&_t=${Date.now()}`;
            for (const proxy of PROXY_LIST) {
                try {
                    const controller = new AbortController();
                    const timeoutId = setTimeout(() => controller.abort(), FETCH_TIMEOUT);
                    const targetUrl = proxy + encodeURIComponent(url) + cacheBuster;
                    const response = await fetch(targetUrl, { signal: controller.signal });
                    clearTimeout(timeoutId);
                    if (!response.ok) throw new Error('HTTP ' + response.status);
                    const buffer = await response.arrayBuffer();
                    const decoder = new TextDecoder("utf-8");
                    const text = decoder.decode(buffer);
                    if (text.includes("<?xml") || text.includes("<rss") || text.includes("<feed") || text.includes("<rdf")) {
                        return text;
                    }
                    throw new Error("Invalid content type or empty");
                } catch (err) {
                    lastError = err;
                }
            }
            throw lastError || new Error("All proxies failed");
        };

        const parseRSS = (xmlText, feedInfo) => {
            try {
                const parser = new DOMParser();
                const xmlDoc = parser.parseFromString(xmlText, "text/xml");
                const items = xmlDoc.querySelectorAll("item, entry");
                const newsItems = [];
                items.forEach(item => {
                    const title = item.querySelector("title")?.textContent;
                    let link = item.querySelector("link")?.textContent;
                    if (!link) {
                        const linkElem = item.querySelector("link[href]");
                        if (linkElem) link = linkElem.getAttribute("href");
                    }
                    let pubDate = item.querySelector("pubDate, published, updated")?.textContent;
                    if (!pubDate) {
                        const dcDate = item.getElementsByTagName("dc:date")[0] || item.getElementsByTagNameNS("*", "date")[0];
                        if (dcDate) pubDate = dcDate.textContent;
                    }
                    if (title && link) {
                        let sourceName = feedInfo.name;
                        let cleanTitle = title;
                        if (title.includes(" - ")) {
                            const parts = title.split(" - ");
                            if (parts[parts.length - 1].length < 20) {
                                sourceName = parts[parts.length - 1];
                            }
                            cleanTitle = parts.slice(0, -1).join(" - ");
                        }
                        const isImportant = title.includes("Urgent") || title.includes("Breaking") || title.includes("\u7a81\u53d1") || title.includes("\u91cd\u78c5");
                        let ts = Date.now();
                        if (pubDate) {
                            const parsedTs = new Date(pubDate.trim()).getTime();
                            if (!isNaN(parsedTs)) ts = parsedTs;
                        }
                        newsItems.push({
                            id: link,
                            timestamp: ts,
                            source: sourceName,
                            content: cleanTitle,
                            url: link,
                            important: isImportant,
                            type: feedInfo.type,
                            category: feedInfo.category || 'General'
                        });
                    }
                });
                newsItems.sort((a, b) => b.timestamp - a.timestamp);
                return newsItems.slice(0, 3);
            } catch (e) {
                console.warn('XML Parse Error for ' + feedInfo.name, e);
                return [];
            }
        };

        const callAI = async (apiKey, model, prompt) => {
            if (!apiKey) throw new Error('No API key');

            // Use the Worker's own /api/ai endpoint as a server-side proxy (no CORS issues)
            const response = await fetch('/api/ai', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ apiKey, model, prompt })
            });

            if (!response.ok) {
                const errText = await response.text();
                let errMsg = 'API error: ' + response.status;
                try { const errJson = JSON.parse(errText); errMsg = errJson.error || errMsg; } catch(e) { errMsg += ' ' + errText.substring(0, 200); }
                throw new Error(errMsg);
            }

            const data = await response.json();

            if (data.error) throw new Error(data.error);

            // GLM response format
            if (data.choices?.[0]?.message?.content) {
                return data.choices[0].message.content.trim();
            }
            // Gemini response format
            if (data.candidates?.[0]?.content?.parts?.[0]?.text) {
                return data.candidates[0].content.parts[0].text.trim();
            }

            throw new Error('Unexpected API response format');

            if (!isOpen) return null;

            const handleAdd = () => {
                if (!newName || !newUrl) return;
                const newFeed = {
                    id: Date.now().toString(),
                    name: newName,
                    url: newUrl,
                    type: 'rss',
                    enabled: true,
                    category: newCategory || 'General'
                };
                setFeeds([...feeds, newFeed]);
                setNewName('');
                setNewUrl('');
                setNewCategory('General');
            };

            const handleDelete = (id) => {
                setFeeds(feeds.filter(f => f.id !== id));
            };

                setFeeds(feeds.map(f => f.id === id ? { ...f, enabled: !f.enabled } : f));
            };

            const handleExport = () => {
                const exportData = {
                    feeds: feeds,
                    aiConfig: { apiKey: aiApiKey, model: aiModel, targetLang: aiTargetLang }
                };
                const dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(exportData, null, 2));
                const downloadAnchorNode = document.createElement('a');
                downloadAnchorNode.setAttribute("href", dataStr);
                downloadAnchorNode.setAttribute("download", "global_wire_config.json");
                document.body.appendChild(downloadAnchorNode);
                downloadAnchorNode.click();
                downloadAnchorNode.remove();
            };

            const handleImportClick = () => {
                if (window.confirm(strings.import_warn)) {
                    fileInputRef.current.click();

            };

            const handleFileChange = (e) => {
                const file = e.target.files[0];
                if (!file) return;
                const reader = new FileReader();
                reader.onload = (event) => {
                    try {
                        const rawData = JSON.parse(event.target.result);
                        // v2.0: Support both old format (array) and new format (object with feeds + aiConfig)
                        if (Array.isArray(rawData)) {
                            let parsedFeeds = [];
                            let currentCategory = 'Imported';
                            rawData.forEach(item => {
                                if (item.__comment) {
                                    currentCategory = item.__comment.replace(/^=== | ===$/g, '').trim();
                                } else if (item.url && item.name) {
                                    parsedFeeds.push({
                                        ...item,
                                        category: item.category || currentCategory,
                                        id: item.id || Date.now().toString() + Math.random().toString().substr(2, 5),
                                        type: item.type || 'rss',
                                        enabled: item.enabled !== false
                                    });
                                }
                            });
                            setFeeds(parsedFeeds);
                        } else if (rawData.feeds && Array.isArray(rawData.feeds)) {
                            setFeeds(rawData.feeds);
                            if (rawData.aiConfig) {
                                if (rawData.aiConfig.apiKey) setAiApiKey(rawData.aiConfig.apiKey);
                                if (rawData.aiConfig.model) setAiModel(rawData.aiConfig.model);
                                if (rawData.aiConfig.targetLang) setAiTargetLang(rawData.aiConfig.targetLang);

                            alert('Invalid JSON structure');
                            return;
                        }
                        alert('Import successful!');

                        console.error(error);
                        alert('Error parsing JSON file');

                reader.readAsText(file);

        const App = () => {
            const [feeds, setFeeds] = useState([]);
            const [news, setNews] = useState([]);
            const [theme, setTheme] = useState('system');
            const [uiLang, setUiLang] = useState('zh-CN');
            const [notifications, setNotifications] = useState(false);
            const [status, setStatus] = useState('idle');
            const [lastUpdated, setLastUpdated] = useState(Date.now());
            const [retryCount, setRetryCount] = useState(0);
            const [isSettingsOpen, setIsSettingsOpen] = useState(false);
            const [fetchStats, setFetchStats] = useState({ total: 0, success: 0 });
            const [activeCategory, setActiveCategory] = useState('ALL');
            const [bannerState, setBannerState] = useState('hidden');
            const [updateCount, setUpdateCount] = useState(0);
            const [bannerProgress, setBannerProgress] = useState({ completed: 0, total: 0 });

            // v2.0: AI settings
            const [aiApiKey, setAiApiKey] = useState('');
            const [aiModel, setAiModel] = useState('glm-4-flash');
            const [aiTargetLang, setAiTargetLang] = useState('zh-CN');
            // AI results state - managed at App level to prevent NewsCard re-render issues
            const [aiResults, setAiResults] = useState({});
            const [aiLoadingMap, setAiLoadingMap] = useState({});
            const [aiErrorMap, setAiErrorMap] = useState({});

            const handleAITranslate = useCallback(async (item) => {
                const strings = STRINGS[uiLang];
                if (!aiApiKey) {
                    setAiErrorMap(prev => ({...prev, [item.id]: strings.ai_no_key}));
                    setTimeout(() => setAiErrorMap(prev => { const next = {...prev}; delete next[item.id]; return next; }), 3000);
                    return;
                }
                // Set loading
                setAiLoadingMap(prev => ({...prev, [item.id]: 'translate'}));
                setAiErrorMap(prev => { const next = {...prev}; delete next[item.id]; return next; });
                // Use setTimeout to defer state updates out of the current render cycle
                setTimeout(async () => {
                    try {
                        const langName = LANG_NAMES[aiTargetLang] || aiTargetLang;
                        const prompt = 'Translate the following text to ' + langName + '. Only return the translation, nothing else:\n\n' + item.content;
                        const result = await callAI(aiApiKey, aiModel, prompt);
                        setAiResults(prev => ({...prev, [item.id + '_translate']: result}));
                    } catch (e) {
                        console.error('Translate error:', e);
                        setAiErrorMap(prev => ({...prev, [item.id]: strings.ai_error + ': ' + e.message}));
                    } finally {
                        setAiLoadingMap(prev => { const next = {...prev}; delete next[item.id]; return next; });
                    }
                }, 0);
            }, [aiApiKey, aiModel, aiTargetLang, uiLang]);

            const handleAISummarize = useCallback(async (item) => {
                const strings = STRINGS[uiLang];
                if (!aiApiKey) {
                    setAiErrorMap(prev => ({...prev, [item.id]: strings.ai_no_key}));
                    setTimeout(() => setAiErrorMap(prev => { const next = {...prev}; delete next[item.id]; return next; }), 3000);
                    return;
                }
                setAiLoadingMap(prev => ({...prev, [item.id]: 'summarize'}));
                setAiErrorMap(prev => { const next = {...prev}; delete next[item.id]; return next; });
                setTimeout(async () => {
                    try {
                        const langName = LANG_NAMES[aiTargetLang] || aiTargetLang;
                        const prompt = 'Provide a concise summary (2-3 sentences) of this news article in ' + langName + ':\nTitle: ' + item.content + '\nSource: ' + item.source;
                        const result = await callAI(aiApiKey, aiModel, prompt);
                        setAiResults(prev => ({...prev, [item.id + '_summary']: result}));
                    } catch (e) {
                        console.error('Summarize error:', e);
                        setAiErrorMap(prev => ({...prev, [item.id]: strings.ai_error + ': ' + e.message}));
                    } finally {
                        setAiLoadingMap(prev => { const next = {...prev}; delete next[item.id]; return next; });
                    }
                }, 0);
            }, [aiApiKey, aiModel, aiTargetLang, uiLang]);

            const bannerDismissTimerRef = useRef(null);
            const prevFeedsStrRef = useRef('');
            const initialFetchDoneRef = useRef(false);

            const categories = useMemo(() => {
                const cats = new Set(feeds.filter(f => f.enabled).map(f => f.category || 'General'));
                return Array.from(cats).sort();
            }, [feeds]);

            const filteredNews = useMemo(() => {
                if (activeCategory === 'ALL') return news;
                return news.filter(item => item.category === activeCategory);
            }, [news, activeCategory]);

            // Initialize System
            useEffect(() => {
                const savedTheme = localStorage.getItem('theme');
                setTheme(savedTheme || 'system');

                const savedLang = localStorage.getItem('ui_lang');
                if (savedLang) setUiLang(savedLang);

                // v2.0: Load AI settings
                const savedApiKey = localStorage.getItem('ai_api_key');
                if (savedApiKey) setAiApiKey(savedApiKey);
                const savedModel = localStorage.getItem('ai_model');
                if (savedModel) setAiModel(savedModel);
                const savedTargetLang = localStorage.getItem('ai_target_lang');
                if (savedTargetLang) setAiTargetLang(savedTargetLang);

                // v2.0: Fix notification permission check
                if ('Notification' in window && Notification.permission === 'granted') {
                    setNotifications(true);
                }

                // Load Feeds Config
                const savedFeeds = localStorage.getItem('news_feeds_config');
                const defaultFeeds = getLazyDefaultFeeds();
                if (savedFeeds) {
                    try {
                        const parsed = JSON.parse(savedFeeds);
                        if (parsed.length < 15) {
                            setFeeds(defaultFeeds);
                        } else {
                            setFeeds(parsed);
                        }
                    } catch(e) {
                        setFeeds(defaultFeeds);
                    }
                } else {
                    setFeeds(defaultFeeds);
                }

                // Load News Cache
                const cached = localStorage.getItem('news_cache_v3');
                if (cached) {
                    try {
                        setNews(JSON.parse(cached));
                    } catch(e) { console.error("Cache error"); }
                }
            }, []);

            // Always fetch on page load
            useEffect(() => {
                if (feeds.length > 0 && !initialFetchDoneRef.current) {
                    initialFetchDoneRef.current = true;
                    fetchData();
                }
                const timer = setInterval(fetchData, UPDATE_INTERVAL);
                return () => clearInterval(timer);
            }, [feeds, notifications]);

            // Save feeds when changed
            useEffect(() => {
                if (feeds.length > 0) {
                    localStorage.setItem('news_feeds_config', JSON.stringify(feeds));
                }
            }, [feeds]);

            // Save UI Lang
            useEffect(() => {
                localStorage.setItem('ui_lang', uiLang);
            }, [uiLang]);

            // v2.0: Save AI settings (skip on first render when initial value is empty)
            const aiApiKeyInitRef = useRef(false);
            useEffect(() => {
                if (!aiApiKeyInitRef.current) {
                    aiApiKeyInitRef.current = true;
                    return; // Skip the initial save that would clear localStorage
                }
                if (aiApiKey) localStorage.setItem('ai_api_key', aiApiKey);
                else localStorage.removeItem('ai_api_key');
            }, [aiApiKey]);

            useEffect(() => {
                localStorage.setItem('ai_model', aiModel);
            }, [aiModel]);

            useEffect(() => {
                localStorage.setItem('ai_target_lang', aiTargetLang);
            }, [aiTargetLang]);

            // Theme Management
            useEffect(() => {
                const applyTheme = (isDark) => {
                    if (isDark) {
                        document.documentElement.classList.add('dark');
                    } else {
                        document.documentElement.classList.remove('dark');
                    }
                };

                if (theme === 'system') {
                    const mq = window.matchMedia('(prefers-color-scheme: dark)');
                    applyTheme(mq.matches);
                    const handler = (e) => applyTheme(e.matches);
                    mq.addEventListener('change', handler);
                    localStorage.setItem('theme', 'system');
                    return () => mq.removeEventListener('change', handler);
                } else {
                    applyTheme(theme === 'dark');
                    localStorage.setItem('theme', theme);
                }
            }, [theme]);

            // v2.0: Enhanced notification with proper permission handling
            const sendNotification = useCallback((count) => {
                if (!notifications || document.visibilityState === 'visible' || count === 0) return;
                const strings = STRINGS[uiLang];
                try {
                    if ('Notification' in window && Notification.permission === 'granted') {
                        new Notification(strings.notif_new_updates_title, {
                            body: strings.notif_new_updates_body.replace('{count}', count),
                            icon: 'https://cdn-icons-png.flaticon.com/512/2965/2965879.png'
                        });
                    }
                } catch(e) {
                    console.warn('Notification failed:', e);
                }
            }, [notifications, uiLang]);

            // Handle banner expand
            const handleBannerExpand = useCallback(() => {
                setBannerState('updated');
                if (bannerDismissTimerRef.current) clearTimeout(bannerDismissTimerRef.current);
                bannerDismissTimerRef.current = setTimeout(() => {
                    setBannerState('hidden');
                }, 2000);
            }, []);

            // RSS Racing
            const fetchData = async () => {
                if (feeds.length === 0) return;
                setStatus('fetching');
                setBannerState('updating');
                setBannerProgress({ completed: 0, total: 0 });

                const active = feeds.filter(f => f.enabled !== false);
                const totalFeeds = active.length;
                let completedCount = 0;
                let successCount = 0;
                const prevIds = new Set(news.map(n => n.id));
                let newItemsCount = 0;

                const promises = active.map(async (feed) => {
                    try {
                        const xml = await fetchFeedContent(feed.url);
                        const items = parseRSS(xml, feed);
                        successCount++;
                        if (items.length > 0) {
                            setNews(prev => {
                                const currentIds = new Set(prev.map(n => n.id));
                                const unique = items.filter(item => !currentIds.has(item.id));
                                if (unique.length > 0) {
                                    const combined = [...unique, ...prev]
                                        .sort((a, b) => b.timestamp - a.timestamp)
                                        .slice(0, MAX_ITEMS);
                                    localStorage.setItem('news_cache_v3', JSON.stringify(combined));
                                    return combined;
                                }
                                return prev;
                            });
                        }
                    } catch(e) {}
                    completedCount++;
                    setBannerProgress({ completed: completedCount, total: totalFeeds });
                });

                await Promise.allSettled(promises);

                setNews(currentNews => {
                    newItemsCount = currentNews.filter(n => !prevIds.has(n.id)).length;
                    return currentNews;
                });

                setFetchStats({ total: totalFeeds, success: successCount });
                setLastUpdated(Date.now());
                setStatus(successCount > 0 ? 'idle' : 'error');

                if (newItemsCount > 0) {
                    const isVisible = document.visibilityState === 'visible';
                    if (isVisible) {
                        setUpdateCount(newItemsCount);
                        setBannerState('available');
                    } else {
                        setBannerState('hidden');
                        sendNotification(newItemsCount);
                    }
                } else {
                    setBannerState('hidden');
                    if (successCount === 0 && retryCount < 2) {
                        setStatus('error');
                    }
                }
            };

            // v2.0: Fix notification toggle with proper permission request
            const toggleNotifications = async () => {
                if (!notifications) {
                    if (!('Notification' in window)) {
                        alert(STRINGS[uiLang].ai_notif_permission);
                        return;
                    }
                    const permission = await Notification.requestPermission();
                    if (permission === 'granted') {
                        setNotifications(true);
                    } else {
                        setNotifications(false);
                    }
                } else {
                    setNotifications(false);
                }
            };

            const handleOpenSettings = () => {
                prevFeedsStrRef.current = JSON.stringify(feeds);
                setIsSettingsOpen(true);
            };

            const handleCloseSettings = () => {
                setIsSettingsOpen(false);
                const currentFeedsStr = JSON.stringify(feeds);
                if (prevFeedsStrRef.current !== currentFeedsStr) {
                    setNews([]);
                    localStorage.removeItem('news_cache_v3');
                    setStatus('idle');
                    setActiveCategory('ALL');
                    setTimeout(() => fetchData(), 50);
                }
            };

            const handleManualRefresh = () => {
                fetchData();
            };

            const hasError = status === 'error' || (status === 'idle' && fetchStats.total > 0 && fetchStats.success === 0);

            return html`
                <div className="min-h-screen flex flex-col max-w-4xl mx-auto border-x border-gray-200 dark:border-slate-800 bg-white dark:bg-slate-900">
                    <${Header}
                        status=${status}
                        onOpenSettings=${handleOpenSettings}
                        onRefresh=${handleManualRefresh}
                        uiStrings=${STRINGS[uiLang]}
                        hasError=${hasError}
                    />
                    <${FilterBar}
                        categories=${categories}
                        activeCategory=${activeCategory}
                        onSelectCategory=${setActiveCategory}
                        uiStrings=${STRINGS[uiLang]}
                    />

                    <main className="flex-1 relative p-4 sm:p-6 overflow-x-hidden">
                        <div className="timeline-line"></div>

                        <${UpdateToast}
                            bannerState=${bannerState}
                            updateCount=${updateCount}
                            bannerProgress=${bannerProgress}
                            onExpand=${handleBannerExpand}
                            uiStrings=${STRINGS[uiLang]}
                        />

                        ${filteredNews.length === 0 && status !== 'fetching' && html`
                            <div className="pl-10 pt-10 text-gray-400">
                                <p>${hasError ? STRINGS[uiLang].error_fetch : STRINGS[uiLang].no_items}</p>
                            </div>
                        `}

                        <div className="space-y-0">
                            ${filteredNews.map((item) => html`
                                <${NewsCard}
                                    key=${item.id}
                                    item=${item}
                                    aiResults=${aiResults}
                                    aiLoadingMap=${aiLoadingMap}
                                    aiErrorMap=${aiErrorMap}
                                    onTranslate=${handleAITranslate}
                                    onSummarize=${handleAISummarize}
                                    uiStrings=${STRINGS[uiLang]}
                                />
                            `)}
                        </div>

                        <div className="relative pl-8 py-12 text-center opacity-60 hover:opacity-100">
                            <div className="absolute left-[1.25rem] -translate-x-1/2 w-2 h-2 bg-gray-300 dark:bg-slate-700 rounded-full top-1/2"></div>
                            <div className="flex flex-col items-center gap-1">
                                <button
                                    onClick=${handleManualRefresh}
                                    className=${`text-xs font-mono ${hasError ? 'text-red-500 font-bold' : 'text-gray-400 hover:text-blue-500'}`}
                                >
                                    ${status === 'fetching' ? STRINGS[uiLang].updating :
                                     hasError ? STRINGS[uiLang].error_fetch :
                                     STRINGS[uiLang].last_updated + ' ' + formatTime(lastUpdated)}
                                </button>
                                ${fetchStats.total > 0 && html`
                                    <span className=${`text-[10px] font-mono ${fetchStats.success < fetchStats.total ? 'text-yellow-600 dark:text-yellow-500' : 'text-gray-300 dark:text-slate-700'}`}>
                                        ${STRINGS[uiLang].success_rate} ${fetchStats.success}/${fetchStats.total}
                                    </span>
                                `}
                                <p className="text-[10px] text-gray-300 dark:text-slate-700 mt-1">
                                    ${STRINGS[uiLang].sources_via} Global RSS Feeds (Proxy)
                                </p>
                                <p className="text-[10px] text-gray-300 dark:text-slate-700">
                                    Global Wire ${APP_VERSION}
                                </p>
                            </div>
                        </div>
                    </main>

                    <${SettingsModal}
                        isOpen=${isSettingsOpen}
                        onClose=${handleCloseSettings}
                        feeds=${feeds}
                        setFeeds=${setFeeds}
                        uiLang=${uiLang}
                        setUiLang=${setUiLang}
                        theme=${theme}
                        setTheme=${setTheme}
                        notifications=${notifications}
                        toggleNotifications=${toggleNotifications}
                        aiApiKey=${aiApiKey}
                        setAiApiKey=${setAiApiKey}
                        aiModel=${aiModel}
                        setAiModel=${setAiModel}
                        aiTargetLang=${aiTargetLang}
                        setAiTargetLang=${setAiTargetLang}
                    />
                </div>
            `;
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(html`<${App} />`);
    </script>
</body></html>
