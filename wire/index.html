        body {

        }

        .timeline-line {
            position: absolute;
            left: 1.25rem;
            top: 0;
            bottom: 0;
            width: 2px;
            background-color: #e2e8f0;
            z-index: 0;
        }

        .dark .timeline-line {
            background-color: #334155;
        }

        .loading-bar {
            position: absolute;
            bottom: 0;
            left: 0;
            height: 2px;
            background: #3b82f6;
            animation: loading 2s infinite ease-in-out;
            width: 0%;
        }

        @keyframes loading {
            0% { width: 0%; left: 0; }
            50% { width: 100%; left: 0; }
            100% { width: 0%; left: 100%; }
        }

        .modal-overlay {
            background-color: rgba(0, 0, 0, 0.5);
        }

        .toggle-checkbox:checked {
            right: 0;
            border-color: #3b82f6;
        }
        .toggle-checkbox:checked + .toggle-label {
            background-color: #3b82f6;
        }

        .scrollbar-thin::-webkit-scrollbar {
            width: 6px;
        }
        .scrollbar-thin::-webkit-scrollbar-track {
            background: transparent;
        }
        .scrollbar-thin::-webkit-scrollbar-thumb {
            background-color: #cbd5e1;
            border-radius: 20px;
        }
        .dark .scrollbar-thin::-webkit-scrollbar-thumb {
            background-color: #475569;
        }

        .hide-scrollbar::-webkit-scrollbar {
            display: none;
        }
        .hide-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }

        .banner-spinner {
            display: inline-block;
            width: 14px;
            height: 14px;
            border: 2px solid rgba(255,255,255,0.3);
            border-top-color: #fff;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        @keyframes ai-spin {
            to { transform: rotate(360deg); }
        }
        .ai-loader {
            display: inline-block;
            width: 12px;
            height: 12px;

            border-top-color: #3b82f6;
            border-radius: 50%;
            animation: ai-spin 0.6s linear infinite;
        }

        // --- Helper Functions ---

        const getLazyDefaultFeeds = () => {

            }
            return [];
        };

        const fetchFeedContent = async (url) => {
            let lastError = null;
            const cacheBuster = `&_t=${Date.now()}`;

            for (const proxy of PROXY_LIST) {
                try {
                    const controller = new AbortController();
                    const timeoutId = setTimeout(() => controller.abort(), FETCH_TIMEOUT);

                    const targetUrl = proxy + encodeURIComponent(url) + cacheBuster;

                    const response = await fetch(targetUrl, { signal: controller.signal });
                    clearTimeout(timeoutId);

                    if (!response.ok) throw new Error('HTTP ' + response.status);

                    const buffer = await response.arrayBuffer();
                    const decoder = new TextDecoder("utf-8");
                    const text = decoder.decode(buffer);

                    if (text.includes("<?xml") || text.includes("<rss") || text.includes("<feed") || text.includes("<rdf")) {
                        return text;
                    }
                    throw new Error("Invalid content type or empty");

                } catch (err) {
                    lastError = err;
                }
            }
            throw lastError || new Error("All proxies failed");
        };

        const parseRSS = (xmlText, feedInfo) => {
            try {
                const parser = new DOMParser();
                const xmlDoc = parser.parseFromString(xmlText, "text/xml");

                const items = xmlDoc.querySelectorAll("item, entry");
                const newsItems = [];

                items.forEach(item => {
                    const title = item.querySelector("title")?.textContent;

                    let link = item.querySelector("link")?.textContent;
                    if (!link) {
                        const linkElem = item.querySelector("link[href]");
                        if (linkElem) link = linkElem.getAttribute("href");
                    }

                    let pubDate = item.querySelector("pubDate, published, updated")?.textContent;
                    if (!pubDate) {
                        const dcDate = item.getElementsByTagName("dc:date")[0]
                                    || item.getElementsByTagNameNS("*", "date")[0];
                        if (dcDate) pubDate = dcDate.textContent;
                    }

                    if (title && link) {
                        let sourceName = feedInfo.name;
                        let cleanTitle = title;

                        if (title.includes(" - ")) {
                            const parts = title.split(" - ");
                            if (parts[parts.length - 1].length < 20) {
                                sourceName = parts[parts.length - 1];
                            }
                            cleanTitle = parts.slice(0, -1).join(" - ");
                        }

                        const isImportant =
                            title.includes("Urgent") ||
                            title.includes("Breaking") ||
                            title.includes("\u7a81\u53d1") ||
                            title.includes("\u91cd\u78c5");

                        let ts = Date.now();
                        if (pubDate) {
                            const parsedTs = new Date(pubDate.trim()).getTime();
                            if (!isNaN(parsedTs)) {
                                ts = parsedTs;
                            }
                        }

                        newsItems.push({
                            id: link,
                            timestamp: ts,
                            source: sourceName,
                            content: cleanTitle,
                            url: link,
                            important: isImportant,
                            type: feedInfo.type,
                            category: feedInfo.category || 'General'
                        });
                    }
                });

                newsItems.sort((a, b) => b.timestamp - a.timestamp);
                return newsItems.slice(0, 3);

            } catch (e) {
                console.warn('XML Parse Error for ' + feedInfo.name, e);
                return [];
            }
        };

        const callAI = async (provider, apiKey, endpoint, messages) => {
            if (provider === 'gemini-2.0-flash') {
                const geminiEndpoint = endpoint || 'https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent';
                const url = geminiEndpoint + '?key=' + apiKey;
                const contents = messages.map(m => ({
                    role: m.role === 'system' ? 'user' : 'model',
                    parts: [{ text: m.content }]
                }));
                // For Gemini, put system message first as user, then assistant confirmation, then user message
                const geminiContents = [];
                if (messages.length >= 2 && messages[0].role === 'system') {
                    geminiContents.push({ role: 'user', parts: [{ text: messages[0].content }] });
                    geminiContents.push({ role: 'model', parts: [{ text: 'Understood.' }] });
                    geminiContents.push({ role: 'user', parts: [{ text: messages[1].content }] });
                } else {
                    messages.forEach(m => {
                        geminiContents.push({ role: m.role === 'assistant' ? 'model' : 'user', parts: [{ text: m.content }] });
                    });
                }
                const response = await fetch(url, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ contents: geminiContents, generationConfig: { temperature: 0.1, maxOutputTokens: 300 } })
                });
                const data = await response.json();
                if (data.candidates && data.candidates[0] && data.candidates[0].content) {
                    return data.candidates[0].content.parts[0].text;
                }
                throw new Error('Gemini API error: ' + JSON.stringify(data));
            }

            // GLM-4-flash (default)
            const glmEndpoint = endpoint || 'https://open.bigmodel.cn/api/paas/v4/chat/completions';
            const response = await fetch(glmEndpoint, {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'Authorization': 'Bearer ' + apiKey
                },
                body: JSON.stringify({
                    model: 'glm-4-flash',
                    messages: messages,
                    temperature: 0.1,
                    max_tokens: 200
                })
            });
            const data = await response.json();
            if (data.choices && data.choices[0]) {
                return data.choices[0].message.content;
            }
            throw new Error('GLM API error: ' + JSON.stringify(data));

                                        type: item.type || 'rss',
                                        enabled: item.enabled !== false
                                    });
                                }

                            setFeeds(parsedFeeds);
                            alert('Import successful!');

            const [retryCount, setRetryCount] = useState(0);
            const [isSettingsOpen, setIsSettingsOpen] = useState(false);
            const [fetchStats, setFetchStats] = useState({ total: 0, success: 0 });

            // Category filter
            const [activeCategory, setActiveCategory] = useState('ALL');

            // v1.2: Banner state with progress
            const [bannerState, setBannerState] = useState('hidden');
            const [updateCount, setUpdateCount] = useState(0);
            const [bannerProgress, setBannerProgress] = useState({ completed: 0, total: 0 });

            // v2.0: AI settings
            const [aiProvider, setAiProvider] = useState('glm-4-flash');
            const [aiApiKey, setAiApiKey] = useState('');
            const [aiTargetLang, setAiTargetLang] = useState('zh-CN');
            const [aiEndpoint, setAiEndpoint] = useState('');

            // v2.0: AI caches
            const translationsRef = useRef({});
            const summariesRef = useRef({});
            const aiStatesRef = useRef({});

            // Force re-render trigger for AI states
            const [, setAiTick] = useState(0);
            const triggerAiRerender = useCallback(() => {
                setAiTick(t => t + 1);
            }, []);

            const bannerDismissTimerRef = useRef(null);
            const prevFeedsStrRef = useRef('');
            const initialFetchDoneRef = useRef(false);

            // Computed categories from current feeds
            const categories = useMemo(() => {
                const cats = new Set(feeds.filter(f => f.enabled).map(f => f.category || 'General'));
                return Array.from(cats).sort();
            }, [feeds]);

            // Filtered news based on active category
            const filteredNews = useMemo(() => {
                if (activeCategory === 'ALL') return news;
                return news.filter(item => item.category === activeCategory);
            }, [news, activeCategory]);

            // Initialize System
            useEffect(() => {
                const savedTheme = localStorage.getItem('theme');
                setTheme(savedTheme || 'system');

                const savedLang = localStorage.getItem('ui_lang');
                if (savedLang) setUiLang(savedLang);

                if (Notification.permission === 'granted') setNotifications(true);

                if (savedAiEndpoint) setAiEndpoint(savedAiEndpoint);

                // Load Feeds Config
                const savedFeeds = localStorage.getItem('news_feeds_config');
                const defaultFeeds = getLazyDefaultFeeds();

                if (savedFeeds) {
                    try {
                        const parsed = JSON.parse(savedFeeds);
                        if (parsed.length < 15) {
                            setFeeds(defaultFeeds);
                        } else {
                            setFeeds(parsed);
                        }
                    } catch(e) {
                        setFeeds(defaultFeeds);
                    }
                } else {
                    setFeeds(defaultFeeds);
                }

                // Load News Cache
                const cached = localStorage.getItem('news_cache_v3');
                if (cached) {
                    try {
                        setNews(JSON.parse(cached));
                    } catch(e) { console.error("Cache error"); }
                }
            }, []);

            // Always fetch on page load
            useEffect(() => {
                if (feeds.length > 0 && !initialFetchDoneRef.current) {
                    initialFetchDoneRef.current = true;
                    fetchData();
                }

                const timer = setInterval(fetchData, UPDATE_INTERVAL);
                return () => clearInterval(timer);
            }, [feeds, notifications]);

            // Save feeds when changed
            useEffect(() => {
                if (feeds.length > 0) {
                    localStorage.setItem('news_feeds_config', JSON.stringify(feeds));
                }
            }, [feeds]);

            // Save UI Lang
            useEffect(() => {
                localStorage.setItem('ui_lang', uiLang);
            }, [uiLang]);

            // v2.0: Save AI settings
            useEffect(() => {
                localStorage.setItem('ai_provider', aiProvider);
            }, [aiProvider]);

            useEffect(() => {
                localStorage.setItem('ai_api_key', aiApiKey);
            }, [aiApiKey]);

            useEffect(() => {
                localStorage.setItem('ai_target_lang', aiTargetLang);
            }, [aiTargetLang]);

            useEffect(() => {
                localStorage.setItem('ai_endpoint', aiEndpoint);
            }, [aiEndpoint]);

            // Theme Management
            useEffect(() => {
                const applyTheme = (isDark) => {
                    if (isDark) {
                        document.documentElement.classList.add('dark');
                    } else {
                        document.documentElement.classList.remove('dark');
                    }
                };

                if (theme === 'system') {
                    const mq = window.matchMedia('(prefers-color-scheme: dark)');
                    applyTheme(mq.matches);
                    const handler = (e) => applyTheme(e.matches);
                    mq.addEventListener('change', handler);
                    localStorage.setItem('theme', 'system');
                    return () => mq.removeEventListener('change', handler);
                } else {
                    applyTheme(theme === 'dark');
                    localStorage.setItem('theme', theme);
                }
            }, [theme]);

            // v2.0: Fixed page visibility changes - properly handle notifications
            useEffect(() => {
                const handleVisibilityChange = () => {
                    // When page becomes visible again, we could check for missed updates
                    // The main purpose is to ensure notifications work when in background
                };
                document.addEventListener('visibilitychange', handleVisibilityChange);
                return () => document.removeEventListener('visibilitychange', handleVisibilityChange);
            }, []);

            // v2.0: Enhanced notification sender with click-to-focus
            const sendNotification = useCallback((count) => {
                if (!notifications || document.visibilityState === 'visible' || count === 0) return;
                const strings = STRINGS[uiLang];
                try {
                    const notif = new Notification(strings.notif_new_updates_title, {
                        body: strings.notif_new_updates_body.replace('{count}', count),
                        icon: 'https://cdn-icons-png.flaticon.com/512/2965/2965879.png'
                    });
                    notif.onclick = () => {
                        window.focus();
                        notif.close();
                    };
                } catch(e) {
                    console.warn('Notification failed:', e);
                }
            }, [notifications, uiLang]);

            // Handle banner expand
            const handleBannerExpand = useCallback(() => {
                setBannerState('updated');
                if (bannerDismissTimerRef.current) clearTimeout(bannerDismissTimerRef.current);
                bannerDismissTimerRef.current = setTimeout(() => {
                    setBannerState('hidden');
                }, 2000);
            }, []);

            // v2.0: AI Translate handler
            const handleTranslate = useCallback(async (item) => {
                const strings = STRINGS[uiLang];
                if (!aiApiKey) {
                    alert(strings.ai_no_key);
                    return;
                }
                if (translationsRef.current[item.id]) return;
                if (aiStatesRef.current[item.id] === 'translating') return;

                aiStatesRef.current[item.id] = 'translating';
                triggerAiRerender();

                try {
                    const result = await callAI(aiProvider, aiApiKey, aiEndpoint, [
                        { role: 'system', content: 'You are a translator. Translate the following news title to ' + aiTargetLang + '. Output only the translation, nothing else.' },
                        { role: 'user', content: item.content }
                    ]);
                    translationsRef.current[item.id] = result.trim();
                } catch(e) {
                    console.error('Translation failed:', e);
                    translationsRef.current[item.id] = strings.ai_error + ': ' + (e.message || '');
                } finally {
                    aiStatesRef.current[item.id] = null;
                    triggerAiRerender();
                }
            }, [aiProvider, aiApiKey, aiEndpoint, aiTargetLang, uiLang, triggerAiRerender]);

            // v2.0: AI Summary handler
            const handleSummary = useCallback(async (item) => {
                const strings = STRINGS[uiLang];
                if (!aiApiKey) {
                    alert(strings.ai_no_key);
                    return;
                }
                if (summariesRef.current[item.id]) return;
                if (aiStatesRef.current[item.id] === 'summarizing') return;

                aiStatesRef.current[item.id] = 'summarizing';
                triggerAiRerender();

                try {
                    let articleContent = '';
                    // Try to fetch article content via CORS proxy
                    try {
                        for (const proxy of PROXY_LIST) {
                            try {
                                const controller = new AbortController();
                                const timeoutId = setTimeout(() => controller.abort(), FETCH_TIMEOUT);
                                const response = await fetch(proxy + encodeURIComponent(item.url), { signal: controller.signal });
                                clearTimeout(timeoutId);
                                if (response.ok) {
                                    const text = await response.text();
                                    // Extract text content from HTML
                                    const doc = new DOMParser().parseFromString(text, 'text/html');
                                    const bodyText = doc.body ? doc.body.innerText || doc.body.textContent : '';
                                    // Take first 3000 chars to avoid huge payloads
                                    articleContent = bodyText.replace(/\s+/g, ' ').trim().substring(0, 3000);
                                    if (articleContent.length > 100) break;
                                }
                            } catch(e) {}
                        }
                    } catch(e) {}

                    let messages;
                    if (articleContent && articleContent.length > 100) {
                        messages = [
                            { role: 'system', content: 'Summarize this news article in approximately 140 characters in ' + aiTargetLang + '. Focus on the key facts: who, what, when, where, why.' },
                            { role: 'user', content: 'Title: ' + item.content + '\n\nContent: ' + articleContent }
                        ];
                    } else {
                        messages = [
                            { role: 'system', content: 'Provide a brief context summary for this news headline in approximately 140 characters in ' + aiTargetLang + '. Focus on likely key facts: who, what, when, where, why.' },
                            { role: 'user', content: item.content }
                        ];
                    }

                    const result = await callAI(aiProvider, aiApiKey, aiEndpoint, messages);
                    summariesRef.current[item.id] = result.trim();
                } catch(e) {
                    console.error('Summary failed:', e);
                    summariesRef.current[item.id] = strings.ai_error + ': ' + (e.message || '');
                } finally {
                    aiStatesRef.current[item.id] = null;
                    triggerAiRerender();
                }
            }, [aiProvider, aiApiKey, aiEndpoint, aiTargetLang, uiLang, triggerAiRerender]);

            // RSS Racing
            const fetchData = async () => {
                if (feeds.length === 0) return;

                setStatus('fetching');
                setBannerState('updating');
                setBannerProgress({ completed: 0, total: 0 });

                const active = feeds.filter(f => f.enabled !== false);
                const totalFeeds = active.length;
                let completedCount = 0;
                let successCount = 0;
                const prevIds = new Set(news.map(n => n.id));
                let newItemsCount = 0;

                const promises = active.map(async (feed) => {
                    try {
                        const xml = await fetchFeedContent(feed.url);
                        const items = parseRSS(xml, feed);
                        successCount++;

                        if (items.length > 0) {
                            setNews(prev => {
                                const currentIds = new Set(prev.map(n => n.id));
                                const unique = items.filter(item => !currentIds.has(item.id));
                                if (unique.length > 0) {
                                    const combined = [...unique, ...prev]
                                        .sort((a, b) => b.timestamp - a.timestamp)
                                        .slice(0, MAX_ITEMS);
                                    localStorage.setItem('news_cache_v3', JSON.stringify(combined));
                                    return combined;
                                }
                                return prev;
                            });
                        }
                    } catch(e) {}

                    completedCount++;
                    setBannerProgress({ completed: completedCount, total: totalFeeds });
                });

                await Promise.allSettled(promises);

                setNews(currentNews => {
                    newItemsCount = currentNews.filter(n => !prevIds.has(n.id)).length;
                    return currentNews;
                });

                setFetchStats({ total: totalFeeds, success: successCount });
                setLastUpdated(Date.now());
                setStatus(successCount > 0 ? 'idle' : 'error');

                if (newItemsCount > 0) {
                    const isVisible = document.visibilityState === 'visible';
                    if (isVisible) {
                        setUpdateCount(newItemsCount);
                        setBannerState('available');
                    } else {
                        setBannerState('hidden');
                        sendNotification(newItemsCount);
                    }
                } else {
                    setBannerState('hidden');
                    if (successCount === 0 && retryCount < 2) {
                        setStatus('error');
                    }
                }
            };

            // v2.0: Fixed notification toggle with proper permission request
            const toggleNotifications = async () => {
                if (!notifications) {
                    const permission = await Notification.requestPermission();
                    if (permission === 'granted') {
                        setNotifications(true);
                    }
                } else {
                    setNotifications(false);
                }
            };

            const handleOpenSettings = () => {
                prevFeedsStrRef.current = JSON.stringify(feeds);
                setIsSettingsOpen(true);
            };

            const handleCloseSettings = () => {
                setIsSettingsOpen(false);
                const currentFeedsStr = JSON.stringify(feeds);
                if (prevFeedsStrRef.current !== currentFeedsStr) {
                    setNews([]);
                    localStorage.removeItem('news_cache_v3');
                    setStatus('idle');
                    setActiveCategory('ALL');
                    setTimeout(() => fetchData(), 50);
                }
            };

            const handleManualRefresh = () => {
                fetchData();
            };

            const hasError = status === 'error' || (status === 'idle' && fetchStats.total > 0 && fetchStats.success === 0);

            const uiStrings = STRINGS[uiLang];

            return html`
                <div className="min-h-screen flex flex-col max-w-4xl mx-auto border-x border-gray-200 dark:border-slate-800 bg-white dark:bg-slate-900">
                    <${Header}
                        status=${status}
                        onOpenSettings=${handleOpenSettings}
                        onRefresh=${handleManualRefresh}
                        uiStrings=${uiStrings}
                        hasError=${hasError}
                    />
                    <${FilterBar}
                        categories=${categories}
                        activeCategory=${activeCategory}
                        onSelectCategory=${setActiveCategory}
                        uiStrings=${uiStrings}
                    />

                    <main className="flex-1 relative p-4 sm:p-6 overflow-x-hidden">
                        <div className="timeline-line"></div>

                        <${UpdateBanner}
                            bannerState=${bannerState}
                            updateCount=${updateCount}
                            bannerProgress=${bannerProgress}
                            onExpand=${handleBannerExpand}
                            uiStrings=${uiStrings}
                        />

                        ${filteredNews.length === 0 && status !== 'fetching' && html`
                            <div className="pl-10 pt-10 text-gray-400">
                                <p>${hasError ? uiStrings.error_fetch : uiStrings.no_items}</p>
                            </div>
                        `}

                        <div className="space-y-0">
                            ${filteredNews.map((item) => html`
                                <${NewsCard}
                                    key=${item.id}
                                    item=${item}
                                    translation=${translationsRef.current[item.id]}
                                    summary=${summariesRef.current[item.id]}
                                    aiState=${aiStatesRef.current[item.id]}
                                    onTranslate=${handleTranslate}
                                    onSummary=${handleSummary}
                                    uiStrings=${uiStrings}
                                />
                            `)}
                        </div>

                        <div className="relative pl-8 py-12 text-center opacity-60 hover:opacity-100">
                            <div className="absolute left-[1.25rem] -translate-x-1/2 w-2 h-2 bg-gray-300 dark:bg-slate-700 rounded-full top-1/2"></div>
                            <div className="flex flex-col items-center gap-1">
                                <button
                                    onClick=${handleManualRefresh}
                                    className=${`text-xs font-mono ${hasError ? 'text-red-500 font-bold' : 'text-gray-400 hover:text-blue-500'}`}
                                >
                                    ${status === 'fetching' ? uiStrings.updating :
                                     hasError ? uiStrings.error_fetch :
                                     uiStrings.last_updated + ' ' + formatTime(lastUpdated)}
                                </button>
                                ${fetchStats.total > 0 && html`
                                    <span className=${`text-[10px] font-mono ${fetchStats.success < fetchStats.total ? 'text-yellow-600 dark:text-yellow-500' : 'text-gray-300 dark:text-slate-700'}`}>
                                        ${uiStrings.success_rate} ${fetchStats.success}/${fetchStats.total}
                                    </span>
                                `}
                                <p className="text-[10px] text-gray-300 dark:text-slate-700 mt-1">
                                    ${uiStrings.sources_via} Global RSS Feeds (Proxy)
                                </p>
                                <p className="text-[10px] text-gray-300 dark:text-slate-700">
                                    Global Wire ${APP_VERSION}
                                </p>
                            </div>
                        </div>
                    </main>

                    <${SettingsModal}
                        isOpen=${isSettingsOpen}
                        onClose=${handleCloseSettings}
                        feeds=${feeds}
                        setFeeds=${setFeeds}
                        uiLang=${uiLang}
                        setUiLang=${setUiLang}
                        theme=${theme}
                        setTheme=${setTheme}
                        notifications=${notifications}
                        toggleNotifications=${toggleNotifications}
                        aiProvider=${aiProvider}
                        setAiProvider=${setAiProvider}
                        aiApiKey=${aiApiKey}
                        setAiApiKey=${setAiApiKey}
                        aiTargetLang=${aiTargetLang}
                        setAiTargetLang=${setAiTargetLang}
                        aiEndpoint=${aiEndpoint}
                        setAiEndpoint=${setAiEndpoint}
                    />
                </div>
            `;
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(html`<${App} />`);
    </script>
</body></html>
