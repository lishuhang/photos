<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>传统影视公司AI岗位占比</title>
<style>
@font-face { font-family:'AlibabaPuHuiTi'; src:url('../assets/AlibabaPuHuiTi-3-35-Thin.woff') format('woff'); font-weight:100; }
@font-face { font-family:'AlibabaPuHuiTi'; src:url('../assets/AlibabaPuHuiTi-3-55-Regular.woff') format('woff'); font-weight:400; }
@font-face { font-family:'AlibabaPuHuiTi'; src:url('../assets/AlibabaPuHuiTi-3-65-Medium.woff') format('woff'); font-weight:500; }
@font-face { font-family:'AlibabaPuHuiTi'; src:url('../assets/AlibabaPuHuiTi-3-85-Bold.woff') format('woff'); font-weight:700; }
@font-face { font-family:'AlibabaPuHuiTi'; src:url('../assets/AlibabaPuHuiTi-3-115-Black.woff') format('woff'); font-weight:900; }
* { margin:0; padding:0; box-sizing:border-box; }
body { background:#0a0e27; display:flex; justify-content:center; align-items:center; min-height:100vh; font-family:'AlibabaPuHuiTi',sans-serif; }
.portrait-wrapper { position:relative; width:450px; height:800px; background:#0a0e27; overflow:hidden; }
.content-area { position:absolute; top:40px; left:30px; right:30px; bottom:60px; display:flex; flex-direction:column; }
.title { color:#fff; font-size:20px; font-weight:700; text-align:center; margin-bottom:20px; opacity:0; }
.chart-area { flex:1; position:relative; }
.bar-group { display:flex; align-items:center; margin-bottom:10px; opacity:0; }
.bar-label { color:rgba(255,255,255,0.85); font-size:13px; font-weight:500; width:70px; text-align:right; padding-right:10px; flex-shrink:0; }
.bar-track { flex:1; height:28px; background:rgba(255,255,255,0.06); border-radius:6px; position:relative; overflow:hidden; }
.bar-fill { height:100%; border-radius:6px; width:0; position:relative; }
.bar-pct { position:absolute; right:8px; top:50%; transform:translateY(-50%); color:#fff; font-size:12px; font-weight:700; opacity:0; }
.bar-frac { color:rgba(255,255,255,0.5); font-size:11px; margin-left:8px; flex-shrink:0; opacity:0; width:50px; }
.footer { position:absolute; bottom:15px; left:0; right:0; text-align:center; color:rgba(255,255,255,0.35); font-size:11px; }
#replayBtn { display:none; position:absolute; bottom:20px; right:-80px; padding:10px 20px; background:rgba(255,255,255,0.1); border:1px solid rgba(255,255,255,0.2); border-radius:8px; color:#fff; font-family:'AlibabaPuHuiTi'; cursor:pointer; font-size:14px; transition:all 0.3s; }
#replayBtn:hover { background:rgba(255,255,255,0.2); }
@media (max-width:500px) { #replayBtn { right:20px; bottom:20px; } }
</style>
</head>
<body>
<div class="portrait-wrapper">
  <div class="content-area">
    <div class="title" id="title">传统影视公司AI岗位占比</div>
    <div class="chart-area" id="chart"></div>
  </div>
  <div class="footer">数据来源：娱乐资本论统计</div>
  <button id="replayBtn" onclick="replay()">▶ Replay</button>
</div>
<script src="https://cdn.jsdelivr.net/npm/d3@7/dist/d3.min.js"></script>
<script>
const data = [
  {company:'博纳影业', ai:5, total:7, pct:71.43},
  {company:'恒星引力', ai:4, total:7, pct:57.14},
  {company:'欢娱影视', ai:3, total:8, pct:37.50},
  {company:'正午阳光', ai:4, total:14, pct:28.57},
  {company:'耀客文化', ai:4, total:19, pct:21.05},
  {company:'柠萌影视', ai:1, total:6, pct:16.67},
  {company:'华策影视', ai:5, total:39, pct:12.82}
];

const colorScale = d3.scaleLinear()
  .domain([0, data.length - 1])
  .range(['#FF6B6B', '#7B68EE']);

let animTimer = null;

function run() {
  document.getElementById('replayBtn').style.display = 'none';
  const chart = document.getElementById('chart');
  chart.innerHTML = '';
  const title = document.getElementById('title');
  title.style.opacity = '0';

  // Title fade in
  d3.select(title)
    .transition().duration(800)
    .style('opacity', 1);

  const maxPct = d3.max(data, d => d.pct);

  data.forEach((d, i) => {
    const group = document.createElement('div');
    group.className = 'bar-group';
    group.innerHTML = `
      <div class="bar-label">${d.company}</div>
      <div class="bar-track">
        <div class="bar-fill" id="fill-${i}" style="background:${colorScale(i)}"></div>
        <div class="bar-pct" id="pct-${i}">0%</div>
      </div>
      <div class="bar-frac" id="frac-${i}">${d.ai}/${d.total}</div>
    `;
    chart.appendChild(group);

    const g = d3.select(group);

    // Staggered fade in
    g.transition().delay(i * 150 + 200).duration(400).style('opacity', 1);

    // Bar grow
    d3.select(`#fill-${i}`)
      .transition()
      .delay(i * 150 + 400)
      .duration(800)
      .ease(d3.easeCubicOut)
      .style('width', (d.pct / maxPct * 100) + '%')
      .on('end', function() {
        // Count up pct
        const pctEl = document.getElementById(`pct-${i}`);
        d3.select(pctEl).transition().duration(300).style('opacity', 1);
        let count = {v: 0};
        d3.select(count)
          .transition().duration(600)
          .tween('text', function() {
            const interp = d3.interpolateNumber(0, d.pct);
            return function(t) {
              pctEl.textContent = interp(t).toFixed(1) + '%';
            };
          });

        // Fraction fade in
        d3.select(`#frac-${i}`)
          .transition().delay(300).duration(400)
          .style('opacity', 1);
      });
  });

  // Show replay button
  const totalTime = data.length * 150 + 1800;
  animTimer = setTimeout(() => {
    document.getElementById('replayBtn').style.display = 'block';
  }, totalTime);
}

function replay() {
  if (animTimer) clearTimeout(animTimer);
  run();
}

run();
</script>
</body>
</html>
