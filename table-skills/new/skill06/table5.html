<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=450,initial-scale=1">
<title>试水还是All in</title>
<style>
@font-face { font-family:'AlibabaPuHuiTi'; src:url('../assets/AlibabaPuHuiTi-3-35-Thin.woff') format('woff'); font-weight:100; }
@font-face { font-family:'AlibabaPuHuiTi'; src:url('../assets/AlibabaPuHuiTi-3-55-Regular.woff') format('woff'); font-weight:400; }
@font-face { font-family:'AlibabaPuHuiTi'; src:url('../assets/AlibabaPuHuiTi-3-65-Medium.woff') format('woff'); font-weight:500; }
@font-face { font-family:'AlibabaPuHuiTi'; src:url('../assets/AlibabaPuHuiTi-3-85-Bold.woff') format('woff'); font-weight:700; }
@font-face { font-family:'AlibabaPuHuiTi'; src:url('../assets/AlibabaPuHuiTi-3-115-Black.woff') format('woff'); font-weight:900; }

* { margin:0; padding:0; box-sizing:border-box; }

body {
  background: #0a0e27;
  display: flex;
  justify-content: center;
  align-items: center;
  min-height: 100vh;
  font-family: 'AlibabaPuHuiTi', sans-serif;
  color: #fff;
}

.canvas-wrap {
  position: relative;
  width: 450px;
  height: 800px;
  background: #0a0e27;
  overflow: hidden;
}

.content {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  width: calc(450px * 0.85);
}

.title {
  font-size: 22px;
  font-weight: 700;
  text-align: center;
  margin-bottom: 4px;
  animation: fadeIn 0.8s ease-out both;
}

.subtitle {
  font-size: 13px;
  font-weight: 400;
  text-align: center;
  color: rgba(255,255,255,0.5);
  margin-bottom: 16px;
  animation: fadeIn 0.8s ease-out 0.2s both;
}

@keyframes fadeIn {
  from { opacity: 0; transform: translateY(-10px); }
  to { opacity: 1; transform: translateY(0); }
}

@keyframes bubbleGrow {
  from { transform: scale(0); opacity: 0; }
  to { transform: scale(1); opacity: 1; }
}

.axis-labels {
  display: flex;
  justify-content: space-between;
  margin-bottom: 8px;
  font-size: 12px;
  color: rgba(255,255,255,0.4);
  animation: fadeIn 0.6s ease-out 0.3s both;
}

.axis-labels span:first-child { color: #5DADE2; }
.axis-labels span:last-child { color: #FF6B6B; }

.bubble-row {
  display: flex;
  align-items: center;
  justify-content: center;
  margin-bottom: 14px;
  position: relative;
  padding: 10px 0;
}

.bubble-track {
  position: relative;
  width: 100%;
  height: 80px;
  display: flex;
  align-items: center;
  justify-content: center;
}

.bubble-track::before {
  content: '';
  position: absolute;
  left: 0; right: 0;
  top: 50%;
  height: 1px;
  background: rgba(255,255,255,0.05);
}

.bubble {
  position: absolute;
  border-radius: 50%;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  animation: bubbleGrow 0.6s cubic-bezier(0.34,1.56,0.64,1) both;
  cursor: default;
  transition: filter 0.3s;
}

.bubble:hover {
  filter: brightness(1.2);
}

.bubble-name {
  font-size: 10px;
  font-weight: 500;
  white-space: nowrap;
}

.bubble-type {
  font-size: 8px;
  opacity: 0.7;
  white-space: nowrap;
}

.b1 { --size: 70px; --x: 10%; --color: #5DADE2; background: radial-gradient(circle at 35% 35%, rgba(93,173,226,0.5), rgba(93,173,226,0.15)); border: 2px solid rgba(93,173,226,0.4); animation-delay: 0.5s; }
.b2 { --size: 40px; --x: 22%; --color: #7BC67E; background: radial-gradient(circle at 35% 35%, rgba(123,198,126,0.5), rgba(123,198,126,0.15)); border: 2px solid rgba(123,198,126,0.4); animation-delay: 0.7s; }
.b3 { --size: 80px; --x: 48%; --color: #C4B45A; background: radial-gradient(circle at 35% 35%, rgba(196,180,90,0.5), rgba(196,180,90,0.15)); border: 2px solid rgba(196,180,90,0.4); animation-delay: 0.9s; }
.b4 { --size: 70px; --x: 50%; --color: #FFA940; background: radial-gradient(circle at 35% 35%, rgba(255,169,64,0.5), rgba(255,169,64,0.15)); border: 2px solid rgba(255,169,64,0.4); animation-delay: 1.1s; }
.b5 { --size: 58px; --x: 56%; --color: #FF8564; background: radial-gradient(circle at 35% 35%, rgba(255,133,100,0.5), rgba(255,133,100,0.15)); border: 2px solid rgba(255,133,100,0.4); animation-delay: 1.3s; }
.b6 { --size: 70px; --x: 76%; --color: #FF6B6B; background: radial-gradient(circle at 35% 35%, rgba(255,107,107,0.5), rgba(255,107,107,0.15)); border: 2px solid rgba(255,107,107,0.4); animation-delay: 1.5s; }
.b7 { --size: 80px; --x: 88%; --color: #FF4444; background: radial-gradient(circle at 35% 35%, rgba(255,68,68,0.5), rgba(255,68,68,0.15)); border: 2px solid rgba(255,68,68,0.4); animation-delay: 1.7s; }

.bubble {
  width: var(--size);
  height: var(--size);
  left: var(--x);
  transform: translateX(-50%);
}

.scale-bar {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-top: 10px;
  padding: 0 10px;
  animation: fadeIn 0.6s ease-out 2.0s both;
}

.scale-bar .tick {
  font-size: 9px;
  color: rgba(255,255,255,0.25);
}

.scale-line {
  flex: 1;
  height: 2px;
  background: linear-gradient(90deg, #5DADE2, #C4B45A, #FF6B6B, #FF4444);
  margin: 0 8px;
  border-radius: 1px;
  position: relative;
}

.scale-line::before, .scale-line::after {
  content: '';
  position: absolute;
  top: -3px;
  width: 2px;
  height: 8px;
  background: rgba(255,255,255,0.2);
}

.scale-line::before { left: 0; }
.scale-line::after { right: 0; }

.note {
  text-align: center;
  font-size: 11px;
  color: rgba(255,255,255,0.35);
  margin-top: 16px;
  animation: fadeIn 0.6s ease-out 2.2s both;
}

.note::before { content: '💡 '; }

.footer {
  position: absolute;
  bottom: 20px;
  left: 50%;
  transform: translateX(-50%);
  font-size: 11px;
  color: rgba(255,255,255,0.3);
  white-space: nowrap;
}

@media (max-width: 500px) {
  .canvas-wrap { width: 100vw; height: 177.78vw; }
  .content { width: 85vw; }
}

#replayBtn {
  display: none;
  position: absolute;
  bottom: 20px;
  right: -80px;
  padding: 10px 20px;
  background: rgba(255,255,255,0.1);
  border: 1px solid rgba(255,255,255,0.2);
  border-radius: 8px;
  color: #fff;
  font-family: 'AlibabaPuHuiTi';
  cursor: pointer;
  font-size: 14px;
  transition: all 0.3s;
}

#replayBtn:hover { background: rgba(255,255,255,0.2); }

@media (max-width: 500px) { #replayBtn { right: 20px; bottom: 20px; } }
</style>
</head>
<body>
<div class="canvas-wrap" id="main">
  <div class="content" id="content">
    <div class="title">试水还是All in？</div>
    <div class="subtitle">影视公司AI投入决心 vs AI岗位数量</div>

    <div class="axis-labels">
      <span>← 试水</span>
      <span>All in →</span>
    </div>

    <div class="bubble-track" style="height:90px;">
      <div class="bubble b1"><span class="bubble-name">正午阳光</span><span class="bubble-type">降本/试水</span></div>
    </div>
    <div class="bubble-track" style="height:60px;">
      <div class="bubble b2"><span class="bubble-name" style="font-size:9px">柠萌影视</span><span class="bubble-type" style="font-size:7px">出海</span></div>
    </div>
    <div class="bubble-track" style="height:95px;">
      <div class="bubble b3"><span class="bubble-name">华策影视</span><span class="bubble-type">降本+漫剧</span></div>
    </div>
    <div class="bubble-track" style="height:90px;">
      <div class="bubble b4"><span class="bubble-name">耀客文化</span><span class="bubble-type">增效/仿真人</span></div>
    </div>
    <div class="bubble-track" style="height:80px;">
      <div class="bubble b5"><span class="bubble-name" style="font-size:10px">欢娱影视</span><span class="bubble-type">增效/漫剧</span></div>
    </div>
    <div class="bubble-track" style="height:90px;">
      <div class="bubble b6"><span class="bubble-name">恒星引力</span><span class="bubble-type">增效/全梭哈</span></div>
    </div>
    <div class="bubble-track" style="height:95px;">
      <div class="bubble b7"><span class="bubble-name">博纳影业</span><span class="bubble-type">增效/技术路线</span></div>
    </div>

    <div class="scale-bar">
      <span class="tick">1</span>
      <div class="scale-line"></div>
      <span class="tick">10</span>
    </div>

    <div class="note">气泡大小代表AI岗位数量，位置代表投入程度</div>
  </div>
  <div class="footer">数据来源：娱乐资本论统计</div>
  <button id="replayBtn" onclick="replay()">▶ Replay</button>
</div>

<script>
setTimeout(() => {
  document.getElementById('replayBtn').style.display = 'block';
}, 3500);

function replay() {
  const content = document.getElementById('content');
  content.innerHTML = content.innerHTML;
  document.getElementById('replayBtn').style.display = 'none';
  setTimeout(() => {
    document.getElementById('replayBtn').style.display = 'block';
  }, 3500);
}
</script>
</body>
</html>
