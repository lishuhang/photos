<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Vidu 体验平台</title>
<style>
:root {
  --bg: #0a0a14;
  --surface: #12122a;
  --surface2: #1a1a36;
  --border: rgba(255,255,255,0.06);
  --purple: #8b5cf6;
  --purple-dark: #6d28d9;
  --purple-glow: rgba(139,92,246,0.3);
  --cyan: #67e8f9;
  --green: #34d399;
  --text: #e2e8f0;
  --text-muted: #64748b;
  --text-dim: #94a3b8;
  --red: #f87171;
  --gold: #fbbf24;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  background: var(--bg);
  background-image:
    radial-gradient(ellipse 80% 40% at 50% -5%, rgba(139,92,246,0.15) 0%, transparent 60%),
    radial-gradient(ellipse 60% 30% at 80% 100%, rgba(103,232,249,0.06) 0%, transparent 50%);
  color: var(--text);
  min-height: 100vh;
  padding: 0;
}
.wrapper { max-width: 900px; margin: 0 auto; padding: 40px 24px 60px; }

/* Header */
.hero { text-align: center; margin-bottom: 36px; }
.hero h1 {
  font-size: 28px; font-weight: 800; letter-spacing: -1px;
  background: linear-gradient(135deg, #c4b5fd 0%, #818cf8 50%, var(--cyan) 100%);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
  margin-bottom: 8px;
}
.hero p { font-size: 14px; color: var(--text-muted); }

/* API Key Bar */
.api-key-bar {
  display: flex; gap: 10px; align-items: center;
  background: var(--surface); border: 1px solid var(--border);
  border-radius: 14px; padding: 14px 20px; margin-bottom: 24px;
  box-shadow: 0 4px 24px rgba(0,0,0,0.3);
}
.api-key-bar label {
  font-size: 13px; font-weight: 600; color: var(--text-dim); white-space: nowrap;
}
.api-key-bar input {
  flex: 1; padding: 9px 14px; border: 1px solid #2a2a48; border-radius: 8px;
  background: var(--bg); color: var(--text); font-size: 13px;
  font-family: 'SF Mono', 'Fira Code', monospace;
}
.api-key-bar input:focus { border-color: rgba(139,92,246,0.5); box-shadow: 0 0 0 3px rgba(139,92,246,0.1); outline: none; }
.api-key-bar .status-dot { width: 8px; height: 8px; border-radius: 50%; background: #475569; flex-shrink: 0; }
.api-key-bar .status-dot.active { background: var(--green); box-shadow: 0 0 8px rgba(52,211,153,0.5); }

/* Cards */
.card {
  background: var(--surface); border-radius: 16px; padding: 28px;
  margin-bottom: 20px; border: 1px solid var(--border);
  box-shadow: 0 4px 32px rgba(0,0,0,0.25);
  animation: fadeIn 0.3s ease;
}
@keyframes fadeIn { from { opacity:0; transform:translateY(8px); } to { opacity:1; transform:translateY(0); } }
.card h2 {
  font-size: 16px; font-weight: 700; color: var(--text); margin-bottom: 18px;
  display: flex; align-items: center; gap: 10px;
}
.card h2 .icon { font-size: 18px; }

/* Form Elements */
label { display: block; margin-bottom: 5px; font-size: 12px; color: var(--text-muted); font-weight: 500; }
input[type="text"], input[type="number"], select, textarea {
  width: 100%; padding: 10px 14px; border: 1px solid #2a2a48; border-radius: 8px;
  background: var(--bg); color: var(--text); font-size: 13px; margin-bottom: 14px;
  transition: border-color 0.2s, box-shadow 0.2s;
}
input:focus, select:focus, textarea:focus { border-color: rgba(139,92,246,0.5); box-shadow: 0 0 0 3px rgba(139,92,246,0.08); outline: none; }
textarea { resize: vertical; min-height: 100px; line-height: 1.7; font-family: inherit; }
select { cursor: pointer; }

/* Buttons */
button { padding: 10px 24px; border: none; border-radius: 8px; font-size: 13px; cursor: pointer; font-weight: 600; transition: all 0.2s; }
.btn-primary {
  background: linear-gradient(135deg, var(--purple), var(--purple-dark));
  color: #fff; box-shadow: 0 2px 16px var(--purple-glow);
}
.btn-primary:hover { box-shadow: 0 4px 24px rgba(139,92,246,0.5); transform: translateY(-1px); }
.btn-primary:disabled { background: #2a2a48; color: var(--text-muted); cursor: not-allowed; box-shadow: none; transform: none; }
.btn-secondary { background: rgba(99,102,241,0.1); color: #a5b4fc; border: 1px solid rgba(99,102,241,0.2); padding: 7px 14px; }
.btn-secondary:hover { background: rgba(99,102,241,0.18); }
.btn-danger { background: rgba(248,113,113,0.1); color: var(--red); border: 1px solid rgba(248,113,113,0.2); padding: 7px 14px; }
.btn-sm { padding: 5px 12px; font-size: 12px; border-radius: 6px; }

/* Grid */
.grid-row { display: flex; gap: 14px; flex-wrap: wrap; margin-bottom: 4px; }
.grid-col { flex: 1; min-width: 140px; }
.form-actions { margin-top: 18px; display: flex; gap: 12px; }

/* Drop Zone */
.drop-zone {
  border: 2px dashed rgba(139,92,246,0.25); border-radius: 12px; padding: 24px;
  text-align: center; cursor: pointer; transition: all 0.2s; margin-bottom: 10px;
  position: relative;
}
.drop-zone:hover, .drop-zone.drag-over { border-color: var(--purple); background: rgba(139,92,246,0.04); }
.drop-zone input { position: absolute; inset: 0; opacity: 0; cursor: pointer; }
.drop-text { font-size: 13px; color: var(--text-muted); }
.asset-actions { display: flex; gap: 12px; align-items: center; margin-bottom: 12px; }

/* Asset List */
.asset-list { margin-bottom: 14px; }
.asset-item {
  display: flex; align-items: center; gap: 12px;
  background: var(--surface2); border: 1px solid var(--border); border-radius: 10px;
  padding: 10px 14px; margin-bottom: 8px;
}
.asset-item img { width: 44px; height: 44px; object-fit: cover; border-radius: 6px; border: 1px solid var(--border); }
.asset-item .info { flex: 1; min-width: 0; }
.asset-item .info .name { font-size: 13px; font-weight: 500; }
.asset-item .info .meta { font-size: 11px; color: var(--text-muted); margin-top: 2px; }
.asset-item .rm-btn { background: rgba(248,113,113,0.1); color: var(--red); border: 1px solid rgba(248,113,113,0.2); border-radius: 6px; padding: 4px 10px; font-size: 11px; cursor: pointer; }

/* Task Table */
.task-actions { display: flex; gap: 10px; margin-bottom: 14px; flex-wrap: wrap; }
.task-table { width: 100%; border-collapse: collapse; font-size: 12px; }
.task-table th, .task-table td { padding: 10px 12px; border-bottom: 1px solid var(--border); text-align: left; }
.task-table th { color: var(--text-muted); font-weight: 500; font-size: 11px; text-transform: uppercase; letter-spacing: 0.5px; }
.status-pending { color: var(--gold); }
.status-processing { color: var(--cyan); }
.status-success { color: var(--green); }
.status-failed { color: var(--red); }

/* Detail */
.detail-section { display: none; }
.result-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 14px; }
.result-header .state { font-size: 15px; font-weight: 700; }
.result-header .credits { font-size: 12px; color: var(--text-muted); }
.final-video video { width: 100%; max-width: 420px; border-radius: 12px; }
.shots-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 14px; margin-top: 14px; }
.shot-card { background: var(--surface2); border: 1px solid var(--border); border-radius: 12px; padding: 14px; }
.shot-card .shot-header { display: flex; justify-content: space-between; margin-bottom: 8px; }
.shot-card .shot-id { font-size: 12px; font-weight: 600; color: var(--cyan); }
.shot-card .shot-dur { font-size: 11px; color: var(--text-muted); }
.shot-card video, .shot-card img { width: 100%; border-radius: 8px; margin-bottom: 8px; }
.shot-card .shot-prompt { font-size: 11px; color: var(--text-dim); line-height: 1.5; max-height: 54px; overflow: hidden; }

/* Log */
.log {
  background: var(--bg); border-radius: 8px; padding: 12px 14px;
  font-size: 11.5px; color: var(--text-muted); max-height: 300px;
  overflow-y: auto; white-space: pre-wrap; margin-top: 14px;
  border: 1px solid var(--border); line-height: 1.7;
  font-family: 'SF Mono', 'Fira Code', monospace;
}

/* Scrollbar */
::-webkit-scrollbar { width: 5px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: #2d2d4e; border-radius: 3px; }

/* Tabs */
.tabs {
  display: flex; gap: 0; margin-bottom: 24px;
  background: var(--surface); border-radius: 12px; padding: 4px;
  border: 1px solid var(--border);
}
.tab-btn {
  flex: 1; padding: 12px 20px; border: none; border-radius: 9px;
  font-size: 14px; font-weight: 600; cursor: pointer;
  background: transparent; color: var(--text-muted); transition: all 0.2s;
}
.tab-btn:hover { color: var(--text-dim); }
.tab-btn.active {
  background: linear-gradient(135deg, var(--purple), var(--purple-dark));
  color: #fff; box-shadow: 0 2px 12px var(--purple-glow);
}

/* Checkbox row for MV */
.checkbox-row { display: flex; align-items: center; gap: 8px; margin-bottom: 14px; }
.checkbox-row input[type="checkbox"] { width: 15px; height: 15px; accent-color: var(--purple); }
.checkbox-row label { margin-bottom: 0; color: var(--text-dim); font-size: 13px; display: inline; }
</style>
</head>
<body>
<div class="wrapper">
  <div class="hero">
    <h1>Vidu 体验平台</h1>
    <p>AI 驱动的视频生成 — 短剧生成 &amp; MV 生成，一站式体验</p>
  </div>

  <!-- API Key -->
  <div class="api-key-bar">
    <label>Vidu API Key</label>
    <input type="password" id="apiKeyInput" placeholder="输入你的 API Key（Token xxx）" oninput="saveApiKey()">
    <div class="status-dot" id="keyDot"></div>
  </div>

  <!-- Tabs -->
  <div class="tabs">
    <button class="tab-btn active" onclick="switchTab('sp')">短剧生成</button>
    <button class="tab-btn" onclick="switchTab('mv')">MV 生成</button>
  </div>

  <!-- ========== 短剧 Section ========== -->
  <div id="sp-section">
  <div class="card">
    <h2><span class="icon">&#9998;</span> 创建短剧任务</h2>
    <label>剧本名称（20字符内）</label>
    <input type="text" id="scriptName" placeholder="如：典当行退婚">

    <label>剧本内容（2000中文字符内）</label>
    <textarea id="scriptContent" rows="5" placeholder="粘贴分镜剧本内容..."></textarea>

    <label>角色/场景素材</label>
    <div class="drop-zone" id="dropZone">
      <input type="file" id="assetImageInput" multiple accept=".png,.jpeg,.jpg,.webp">
      <div class="drop-text">拖拽图片到这里，或点击选择（支持多选）</div>
    </div>
    <div class="asset-actions">
      <input type="file" id="csvFile" accept=".csv" onchange="handleCsvUpload(event)" style="font-size:12px;color:var(--text-muted);">
      <span style="font-size:12px;color:var(--text-muted);">支持 CSV 批量导入</span>
    </div>
    <div id="assetList" class="asset-list"></div>

    <div class="grid-row">
      <div class="grid-col">
        <label>quality</label>
        <select id="quality"><option value="high" selected>high</option><option value="standard">standard</option></select>
      </div>
      <div class="grid-col">
        <label>placement</label>
        <select id="placement"><option value="upload" selected>upload</option><option value="panorama">panorama</option><option value="step">step</option></select>
      </div>
      <div class="grid-col">
        <label>aspect_ratio</label>
        <select id="aspectRatio"><option value="9:16">9:16</option><option value="16:9">16:9</option></select>
      </div>
      <div class="grid-col">
        <label>duration（0=自动，2~30s）</label>
        <input type="number" id="duration" value="0" min="0" max="30">
      </div>
    </div>
    <div class="grid-row">
      <div class="grid-col" style="flex:2;">
        <label>style（30字符内）</label>
        <input type="text" id="style" value="真人写实">
      </div>
      <div class="grid-col" style="flex:3;">
        <label>站位参考图 URL（可选）</label>
        <input type="text" id="uploadImageUrl" placeholder="留空则不使用">
      </div>
    </div>

    <div class="form-actions">
      <button class="btn-primary" id="btnCreate" onclick="createTask()">发起任务</button>
    </div>
    <div class="log" id="createLog" style="display:none;"></div>
  </div>

  <!-- 任务列表 -->
  <div class="card">
    <h2><span class="icon">&#9776;</span> 任务列表</h2>
    <div class="task-actions">
      <button class="btn-secondary btn-sm" onclick="queryAllTasks()">批量查询</button>
      <button class="btn-secondary btn-sm" onclick="exportCSV()">导出 CSV</button>
      <button class="btn-danger btn-sm" onclick="clearTasks()">清空</button>
    </div>
    <table class="task-table">
      <thead><tr><th>#</th><th>剧本名</th><th>task_id</th><th>状态</th><th>积分</th><th>操作</th></tr></thead>
      <tbody id="taskBody"></tbody>
    </table>
    <div class="log" id="queryLog" style="display:none;"></div>
  </div>

  <!-- 任务详情 -->
  <div class="card detail-section" id="detailSection">
    <h2><span class="icon">&#9654;</span> 任务详情</h2>
    <div id="detailContent"></div>
  </div>
  </div><!-- /sp-section -->

  <!-- ========== MV Section ========== -->
  <div id="mv-section" style="display:none;">
  <div class="card">
    <h2><span class="icon">&#9835;</span> 创建 MV 任务</h2>
    <label>模特/风格图片（1~7张，支持 png/jpeg/jpg/webp，单张 ≤ 50MB）</label>
    <div class="drop-zone" id="mvDropZone">
      <input type="file" id="mvImages" multiple accept=".png,.jpeg,.jpg,.webp">
      <div class="drop-text">拖拽图片到这里，或点击选择（1~7张）</div>
    </div>
    <div id="mvImageList" class="asset-list"></div>

    <label>音频文件（1个，支持 mp3/wav/aac/m4a，10~180秒，≤ 20MB）</label>
    <div class="drop-zone" id="mvAudioZone">
      <input type="file" id="mvAudio" accept=".mp3,.wav,.aac,.m4a">
      <div class="drop-text">拖拽音频到这里，或点击选择</div>
    </div>
    <div id="mvAudioInfo" style="font-size:12px;color:var(--text-muted);margin-bottom:14px;"></div>

    <div class="grid-row">
      <div class="grid-col">
        <label>aspect_ratio 输出比例</label>
        <select id="mvAspectRatio">
          <option value="">默认 16:9</option>
          <option value="1:1">1:1</option>
          <option value="16:9">16:9</option>
          <option value="9:16">9:16</option>
          <option value="4:3">4:3</option>
          <option value="3:4">3:4</option>
        </select>
      </div>
      <div class="grid-col">
        <label>resolution 清晰度</label>
        <select id="mvResolution">
          <option value="">默认 720p</option>
          <option value="540p">540p</option>
          <option value="720p">720p</option>
          <option value="1080p">1080p</option>
        </select>
      </div>
      <div class="grid-col">
        <label>quality 画质</label>
        <select id="mvQuality">
          <option value="high" selected>high</option>
          <option value="standard">standard</option>
        </select>
      </div>
      <div class="grid-col">
        <label>language 音频语言</label>
        <select id="mvLanguage">
          <option value="">自动</option>
          <option value="zh">中文</option>
          <option value="en">英文</option>
        </select>
      </div>
    </div>

    <label>prompt 提示词（≤3000字符）</label>
    <textarea id="mvPrompt" rows="3" placeholder="生成MV视频的文本描述（可选）"></textarea>

    <label>style 风格文本</label>
    <input type="text" id="mvStyle" placeholder="如：弥散风格、二次元风格">

    <div class="grid-row">
      <div class="grid-col">
        <div class="checkbox-row">
          <input type="checkbox" id="mvLipSync">
          <label for="mvLipSync">lip_sync 对口型（每秒+4积分，仅真人正面近景）</label>
        </div>
      </div>
      <div class="grid-col">
        <div class="checkbox-row">
          <input type="checkbox" id="mvAddSubtitle">
          <label for="mvAddSubtitle">add_subtitle 添加字幕</label>
        </div>
      </div>
    </div>

    <label>lip_ref_url 对口型参考人脸图片 — 填URL或上传本地图片</label>
    <div class="grid-row" style="align-items:center;">
      <div class="grid-col" style="flex:2;"><input type="text" id="mvLipRefUrl" placeholder="图片URL（留空则用上传的文件）"></div>
      <div class="grid-col" style="flex:1;"><input type="file" id="mvLipRefFile" accept=".png,.jpeg,.jpg,.webp" style="font-size:12px;"></div>
    </div>
    <div id="mvLipRefInfo" style="font-size:12px;color:var(--text-muted);margin-bottom:14px;"></div>

    <label>subtitle_color 字幕颜色（HEX格式）</label>
    <input type="text" id="mvSubtitleColor" placeholder="默认 #FFFFFF">

    <label>srt_url 字幕文件 — 填URL或上传本地 .srt 文件</label>
    <div class="grid-row" style="align-items:center;">
      <div class="grid-col" style="flex:2;"><input type="text" id="mvSrtUrl" placeholder="字幕文件URL（留空则用上传的文件）"></div>
      <div class="grid-col" style="flex:1;"><input type="file" id="mvSrtFile" accept=".srt,.vtt,.ass" style="font-size:12px;"></div>
    </div>
    <div id="mvSrtInfo" style="font-size:12px;color:var(--text-muted);margin-bottom:14px;"></div>

    <label>callback_url 回调地址（可选）</label>
    <input type="text" id="mvCallbackUrl" placeholder="任务状态变化时回调的URL">

    <div class="form-actions">
      <button class="btn-primary" id="btnMvCreate" onclick="mvCreateTask()">发起 MV 任务</button>
    </div>
    <div class="log" id="mvCreateLog" style="display:none;"></div>
  </div>

  <!-- MV 任务列表 -->
  <div class="card">
    <h2><span class="icon">&#9776;</span> MV 任务列表</h2>
    <div class="task-actions">
      <button class="btn-secondary btn-sm" onclick="mvQueryAll()">批量查询</button>
      <button class="btn-danger btn-sm" onclick="mvClearTasks()">清空</button>
    </div>
    <table class="task-table">
      <thead><tr><th>#</th><th>task_id</th><th>状态</th><th>操作</th></tr></thead>
      <tbody id="mvTaskBody"></tbody>
    </table>
    <div class="log" id="mvQueryLog" style="display:none;"></div>
  </div>

  <!-- MV 任务详情 -->
  <div class="card detail-section" id="mvDetailSection">
    <h2><span class="icon">&#9654;</span> MV 详情</h2>
    <div id="mvDetailContent"></div>
  </div>
  </div><!-- /mv-section -->

</div>

<script>
const $ = id => document.getElementById(id);

// ==================== API Key ====================
function loadApiKey() {
  const key = localStorage.getItem('vidu_api_key') || '';
  $('apiKeyInput').value = key;
  $('keyDot').classList.toggle('active', !!key);
  return key;
}
function saveApiKey() {
  const key = $('apiKeyInput').value.trim();
  localStorage.setItem('vidu_api_key', key);
  $('keyDot').classList.toggle('active', !!key);
}
function getViduKey() {
  const key = $('apiKeyInput').value.trim();
  if (!key) { alert('请先填写 Vidu API Key'); $('apiKeyInput').focus(); return null; }
  return key;
}

// ==================== Tasks & Assets State ====================
let tasks = JSON.parse(localStorage.getItem('sp_demo_tasks') || '[]');
let assets = [];

// ==================== Asset Management ====================
const dropZone = $('dropZone');
dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('drag-over'); });
dropZone.addEventListener('dragleave', () => dropZone.classList.remove('drag-over'));
dropZone.addEventListener('drop', e => { e.preventDefault(); dropZone.classList.remove('drag-over'); handleImageFiles(e.dataTransfer.files); });
$('assetImageInput').addEventListener('change', e => { handleImageFiles(e.target.files); e.target.value = ''; });

function handleImageFiles(files) {
  for (const file of files) {
    if (!file.type.match(/^image\/(png|jpeg|jpg|webp)$/)) continue;
    const reader = new FileReader();
    reader.onload = e => {
      const dataUrl = e.target.result;
      const nextId = String(assets.length + 1).padStart(2, '0');
      const name = file.name.replace(/\.[^.]+$/, '');
      assets.push({ id: nextId, type: 'character', name, image_uri: dataUrl, description: '', thumb: dataUrl });
      renderAssets();
    };
    reader.readAsDataURL(file);
  }
}

function renderAssets() {
  const c = $('assetList');
  if (!assets.length) { c.innerHTML = ''; return; }
  c.innerHTML = assets.map((a, i) => `
    <div class="asset-item">
      <img src="${a.thumb || ''}" alt="${a.name}">
      <div class="info">
        <div class="name">
          <input type="text" value="${esc(a.name)}" onchange="assets[${i}].name=this.value" style="width:100px;padding:4px 8px;font-size:12px;margin:0;display:inline-block;">
          <select onchange="assets[${i}].type=this.value" style="width:80px;padding:4px 8px;font-size:12px;margin:0;display:inline-block;">
            <option value="character" ${a.type==='character'?'selected':''}>character</option>
            <option value="scene" ${a.type==='scene'?'selected':''}>scene</option>
            <option value="tool" ${a.type==='tool'?'selected':''}>tool</option>
          </select>
        </div>
        <div class="meta">ID: ${a.id} · <input type="text" value="${esc(a.description)}" onchange="assets[${i}].description=this.value" placeholder="描述" style="width:160px;padding:3px 8px;font-size:11px;margin:0;display:inline-block;"></div>
      </div>
      <button class="rm-btn" onclick="assets.splice(${i},1);assets.forEach((a,j)=>a.id=String(j+1).padStart(2,'0'));renderAssets();">删除</button>
    </div>
  `).join('');
}

function handleCsvUpload(event) {
  const file = event.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    const lines = e.target.result.trim().split('\n');
    if (lines.length < 2) return;
    const headers = lines[0].split(',').map(h => h.trim());
    for (let i = 1; i < lines.length; i++) {
      const vals = lines[i].split(',');
      const obj = {};
      headers.forEach((h, idx) => obj[h] = (vals[idx] || '').trim());
      assets.push({
        id: obj.id || String(assets.length + 1).padStart(2, '0'),
        type: obj.type || 'character', name: obj.name || '',
        image_uri: obj.image_uri || '', description: obj.description || '',
        thumb: (obj.image_uri && obj.image_uri.startsWith('http')) ? obj.image_uri : ''
      });
    }
    renderAssets();
  };
  reader.readAsText(file);
}

// ==================== Create Task ====================
async function createTask() {
  const scriptName = $('scriptName').value.trim();
  const scriptContent = $('scriptContent').value.trim();
  if (!scriptName || !scriptContent) { alert('请填写剧本名称和内容'); return; }
  if (!assets.length) { alert('请添加至少一个素材'); return; }
  const apiKey = getViduKey();
  if (!apiKey) return;

  const log = $('createLog');
  log.style.display = 'block';
  log.textContent += `创建任务: ${scriptName}...\n`;
  $('btnCreate').disabled = true;

  const payload = {
    script_name: scriptName, script_content: scriptContent,
    assets: assets.map(a => ({ id: a.id, type: a.type, name: a.name, image_uri: a.image_uri, description: a.description })),
    quality: $('quality').value, placement: $('placement').value,
    duration: parseInt($('duration').value) || 0,
    resolution: '1080p', aspect_ratio: $('aspectRatio').value,
    style: $('style').value.trim() || '真人写实'
  };
  const uploadUrl = $('uploadImageUrl').value.trim();
  if (uploadUrl) payload.upload_image_url = uploadUrl;

  try {
    const resp = await fetch('/api/test/create', { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify({ api_key: apiKey, payload }) });
    const data = await resp.json();
    if (data.error) { log.textContent += `[error] ${data.error}\n`; }
    else {
      const taskId = data.task_id || data.id || '';
      log.textContent += `[ok] task_id: ${taskId}\n`;
      tasks.push({ script_name: scriptName, task_id: taskId, state: data.state || 'pending', result: data });
      saveTasks(); renderTasks();
    }
  } catch (e) { log.textContent += `[error] ${e.message}\n`; }
  $('btnCreate').disabled = false;
}

// ==================== Query Tasks ====================
async function queryAllTasks() {
  const apiKey = getViduKey(); if (!apiKey) return;
  const log = $('queryLog'); log.style.display = 'block';
  log.textContent += `\n批量查询 ${tasks.length} 个任务...\n`;
  for (let i = 0; i < tasks.length; i++) {
    const t = tasks[i]; if (!t.task_id) continue;
    try {
      const resp = await fetch(`/api/test/query?id=${encodeURIComponent(t.task_id)}&api_key=${encodeURIComponent(apiKey)}`);
      const data = await resp.json();
      if (data.error) { log.textContent += `[${i+1}] ${t.script_name}: ${data.error}\n`; }
      else { const p = parseResult(data); t.state = p.state; t.result = data; t.parsed = p; log.textContent += `[${i+1}] ${t.script_name}: ${t.state}\n`; }
    } catch (e) { log.textContent += `[${i+1}] ${t.script_name}: ${e.message}\n`; }
  }
  saveTasks(); renderTasks();
}

async function querySingle(idx) {
  const t = tasks[idx]; if (!t || !t.task_id) return;
  const apiKey = getViduKey(); if (!apiKey) return;
  try {
    const resp = await fetch(`/api/test/query?id=${encodeURIComponent(t.task_id)}&api_key=${encodeURIComponent(apiKey)}`);
    const data = await resp.json();
    if (!data.error) { const p = parseResult(data); t.state = p.state; t.result = data; t.parsed = p; showDetail(idx); }
  } catch (e) {}
  saveTasks(); renderTasks();
}

function parseResult(data) {
  const task = data.task || data;
  const meta = task.meta || task;
  const derived = task.derived_data || {};
  return {
    state: meta.state || data.state || 'unknown',
    shots: derived.shots || [],
    finalVideoUrl: derived.signed_final_video_url || '',
    credits: derived.deducted_credits || data.credits || 0
  };
}

function showDetail(idx) {
  const t = tasks[idx]; if (!t || !t.result) return;
  const section = $('detailSection'); section.style.display = 'block';
  const parsed = t.parsed || parseResult(t.result);
  const cls = parsed.state === 'success' ? 'status-success' : parsed.state === 'failed' ? 'status-failed' : parsed.state === 'processing' ? 'status-processing' : 'status-pending';

  let html = `<div class="result-header"><div><span class="state ${cls}">${parsed.state}</span> · ${escH(t.script_name)}</div><div class="credits">${parsed.credits ? parsed.credits + ' 积分' : ''}</div></div>`;
  if (parsed.finalVideoUrl) html += `<div class="final-video"><video src="${parsed.finalVideoUrl}" controls></video></div>`;
  if (parsed.shots.length) {
    html += `<div class="shots-grid">`;
    for (const s of parsed.shots) {
      html += `<div class="shot-card"><div class="shot-header"><span class="shot-id">场${s.scene_no||'?'}-镜${s.shot_no||'?'}</span><span class="shot-dur">${s.duration_sec||'?'}s</span></div>`;
      if (s.signed_video_url) html += `<video src="${s.signed_video_url}" controls></video>`;
      if (s.video_prompt) html += `<div class="shot-prompt">${escH(s.video_prompt)}</div>`;
      html += `</div>`;
    }
    html += `</div>`;
  }
  html += `<details style="margin-top:16px;"><summary style="font-size:12px;color:var(--text-muted);cursor:pointer;">原始 JSON</summary><pre style="font-size:11px;color:var(--text-dim);white-space:pre-wrap;max-height:280px;overflow:auto;margin-top:8px;">${escH(JSON.stringify(t.result,null,2))}</pre></details>`;
  $('detailContent').innerHTML = html;
  section.scrollIntoView({ behavior: 'smooth' });
}

// ==================== Render & Utils ====================
function renderTasks() {
  $('taskBody').innerHTML = tasks.map((t, i) => {
    const cls = t.state === 'success' ? 'status-success' : t.state === 'failed' ? 'status-failed' : t.state === 'processing' ? 'status-processing' : 'status-pending';
    return `<tr><td>${i+1}</td><td>${escH(t.script_name)}</td><td style="font-size:11px;font-family:monospace;">${t.task_id||'-'}</td><td class="${cls}">${t.state}</td><td style="font-size:11px;">${(t.parsed||{}).credits||'-'}</td><td><button class="btn-secondary btn-sm" onclick="querySingle(${i})">查询</button> <button class="btn-secondary btn-sm" onclick="showDetail(${i})" ${t.result?'':'disabled'}>详情</button></td></tr>`;
  }).join('');
}

function saveTasks() { localStorage.setItem('sp_demo_tasks', JSON.stringify(tasks)); }
function clearTasks() { if (!confirm('确定清空？')) return; tasks=[]; saveTasks(); renderTasks(); $('detailSection').style.display='none'; }

function exportCSV() {
  if (!tasks.length) { alert('没有任务'); return; }
  const h = ['task_id','script_name','state','scene_no','shot_no','duration_sec','video_prompt','signed_video_url'];
  let csv = h.join(',') + '\n';
  for (const t of tasks) {
    const p = t.parsed || parseResult(t.result || {});
    if (p.shots.length) { for (const s of p.shots) csv += [t.task_id,csvE(t.script_name),t.state,s.scene_no||'',s.shot_no||'',s.duration_sec||'',csvE(s.video_prompt||''),csvE(s.signed_video_url||'')].join(',')+'\n'; }
    else csv += [t.task_id,csvE(t.script_name),t.state,'','','','',''].join(',')+'\n';
  }
  const blob = new Blob(['\ufeff'+csv],{type:'text/csv;charset=utf-8;'});
  const a = document.createElement('a'); a.href=URL.createObjectURL(blob); a.download=`shortplay_${Date.now()}.csv`; a.click();
}

function esc(s) { return String(s).replace(/"/g,'&quot;').replace(/</g,'&lt;'); }
function escH(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function csvE(v) { if (!v) return ''; const s=String(v); return (s.includes(',')||s.includes('"')||s.includes('\n')) ? '"'+s.replace(/"/g,'""')+'"' : s; }

// Init
loadApiKey();
renderTasks();

// ==================== Tab Switching ====================
function switchTab(tab) {
  document.querySelectorAll('.tab-btn').forEach((btn, i) => {
    btn.classList.toggle('active', (tab === 'sp' && i === 0) || (tab === 'mv' && i === 1));
  });
  $('sp-section').style.display = tab === 'sp' ? '' : 'none';
  $('mv-section').style.display = tab === 'mv' ? '' : 'none';
}

// ==================== MV State ====================
let mvTasks = JSON.parse(localStorage.getItem('mv_demo_tasks') || '[]');
let mvImageFiles = [];

// ==================== MV File Handling ====================
const mvDropZone = $('mvDropZone');
mvDropZone.addEventListener('dragover', e => { e.preventDefault(); mvDropZone.classList.add('drag-over'); });
mvDropZone.addEventListener('dragleave', () => mvDropZone.classList.remove('drag-over'));
mvDropZone.addEventListener('drop', e => { e.preventDefault(); mvDropZone.classList.remove('drag-over'); mvHandleImages(e.dataTransfer.files); });
$('mvImages').addEventListener('change', e => { mvHandleImages(e.target.files); e.target.value = ''; });

const mvAudioZone = $('mvAudioZone');
mvAudioZone.addEventListener('dragover', e => { e.preventDefault(); mvAudioZone.classList.add('drag-over'); });
mvAudioZone.addEventListener('dragleave', () => mvAudioZone.classList.remove('drag-over'));
mvAudioZone.addEventListener('drop', e => { e.preventDefault(); mvAudioZone.classList.remove('drag-over'); const f = e.dataTransfer.files[0]; if(f) { const dt = new DataTransfer(); dt.items.add(f); $('mvAudio').files = dt.files; mvShowAudioInfo(f); }});
$('mvAudio').addEventListener('change', e => { if(e.target.files[0]) mvShowAudioInfo(e.target.files[0]); });

$('mvLipRefFile').addEventListener('change', e => {
  const f = e.target.files[0];
  $('mvLipRefInfo').textContent = f ? f.name + ' (' + (f.size/1024/1024).toFixed(1) + 'MB)' : '';
});
$('mvSrtFile').addEventListener('change', e => {
  const f = e.target.files[0];
  $('mvSrtInfo').textContent = f ? f.name : '';
});

function mvHandleImages(files) {
  for (const f of files) {
    if (!f.type.match(/^image\/(png|jpeg|jpg|webp)$/)) continue;
    if (mvImageFiles.length >= 7) break;
    mvImageFiles.push(f);
  }
  mvRenderImages();
}

function mvRenderImages() {
  if (!mvImageFiles.length) { $('mvImageList').innerHTML = ''; return; }
  $('mvImageList').innerHTML = mvImageFiles.map((f, i) => `
    <div class="asset-item">
      <img src="${URL.createObjectURL(f)}" alt="${esc(f.name)}">
      <div class="info"><div class="name">${esc(f.name)}</div><div class="meta">${(f.size/1024/1024).toFixed(1)} MB</div></div>
      <button class="rm-btn" onclick="mvImageFiles.splice(${i},1);mvRenderImages();">删除</button>
    </div>
  `).join('');
}

function mvShowAudioInfo(f) {
  $('mvAudioInfo').textContent = f.name + ' (' + (f.size/1024/1024).toFixed(1) + 'MB)';
}

function mvFileToBase64(file) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload = () => resolve(reader.result);
    reader.onerror = reject;
    reader.readAsDataURL(file);
  });
}

// ==================== MV Create ====================
async function mvCreateTask() {
  if (!mvImageFiles.length) { alert('请选择至少1张图片'); return; }
  const audioFile = $('mvAudio').files[0];
  if (!audioFile) { alert('请选择音频文件'); return; }
  const apiKey = getViduKey(); if (!apiKey) return;

  const log = $('mvCreateLog');
  log.style.display = 'block';
  log.textContent += '正在读取文件并编码...\n';
  $('btnMvCreate').disabled = true;

  try {
    const images = [];
    for (const f of mvImageFiles) { images.push(await mvFileToBase64(f)); }
    const audioB64 = await mvFileToBase64(audioFile);

    const body = { images, audio_url: audioB64 };
    const optStr = ['mvAspectRatio:aspect_ratio','mvResolution:resolution','mvQuality:quality','mvLanguage:language','mvPrompt:prompt','mvStyle:style','mvSubtitleColor:subtitle_color','mvCallbackUrl:callback_url'];
    for (const pair of optStr) {
      const [elId, key] = pair.split(':');
      const v = $(elId).value.trim();
      if (v) body[key] = v;
    }
    if ($('mvLipSync').checked) body.lip_sync = true;
    if ($('mvAddSubtitle').checked) body.add_subtitle = true;

    // lip_ref_url
    const lipUrl = $('mvLipRefUrl').value.trim();
    const lipFile = $('mvLipRefFile').files[0];
    if (lipUrl) body.lip_ref_url = lipUrl;
    else if (lipFile) body.lip_ref_url = await mvFileToBase64(lipFile);

    // srt_url
    const srtUrl = $('mvSrtUrl').value.trim();
    const srtFile = $('mvSrtFile').files[0];
    if (srtUrl) body.srt_url = srtUrl;
    else if (srtFile) body.srt_url = await mvFileToBase64(srtFile);

    log.textContent += '正在提交任务...\n';
    const resp = await fetch('/api/mv/create', {
      method: 'POST', headers: {'Content-Type':'application/json'},
      body: JSON.stringify({ api_key: apiKey, payload: body })
    });
    const data = await resp.json();
    if (data.error) { log.textContent += '[error] ' + data.error + '\n'; }
    else {
      const taskId = data.id || data.task_id || '';
      log.textContent += '[ok] task_id: ' + taskId + '\n';
      mvTasks.push({ task_id: taskId, state: data.state || 'pending', result: data, created: Date.now() });
      mvSaveTasks(); mvRenderTasks();
    }
  } catch (e) { log.textContent += '[error] ' + e.message + '\n'; }
  $('btnMvCreate').disabled = false;
}

// ==================== MV Query ====================
async function mvQueryAll() {
  const apiKey = getViduKey(); if (!apiKey) return;
  const log = $('mvQueryLog'); log.style.display = 'block';
  log.textContent += '\n批量查询 ' + mvTasks.length + ' 个 MV 任务...\n';
  for (let i = 0; i < mvTasks.length; i++) {
    const t = mvTasks[i]; if (!t.task_id) continue;
    try {
      const resp = await fetch('/api/mv/query?id=' + encodeURIComponent(t.task_id) + '&api_key=' + encodeURIComponent(apiKey));
      const data = await resp.json();
      if (data.error) { log.textContent += '[' + (i+1) + '] ' + data.error + '\n'; }
      else { t.state = data.state || 'unknown'; t.result = data; log.textContent += '[' + (i+1) + '] ' + t.task_id.slice(0,8) + '... → ' + t.state + '\n'; }
    } catch (e) { log.textContent += '[' + (i+1) + '] ' + e.message + '\n'; }
  }
  mvSaveTasks(); mvRenderTasks();
}

async function mvQuerySingle(idx) {
  const t = mvTasks[idx]; if (!t || !t.task_id) return;
  const apiKey = getViduKey(); if (!apiKey) return;
  try {
    const resp = await fetch('/api/mv/query?id=' + encodeURIComponent(t.task_id) + '&api_key=' + encodeURIComponent(apiKey));
    const data = await resp.json();
    if (!data.error) { t.state = data.state || 'unknown'; t.result = data; mvShowDetail(idx); }
  } catch (e) {}
  mvSaveTasks(); mvRenderTasks();
}

function mvShowDetail(idx) {
  const t = mvTasks[idx]; if (!t || !t.result) return;
  const section = $('mvDetailSection'); section.style.display = 'block';
  const data = t.result;
  const cls = data.state === 'success' ? 'status-success' : data.state === 'failed' ? 'status-failed' : data.state === 'processing' ? 'status-processing' : 'status-pending';

  let html = '<div class="result-header"><span class="state ' + cls + '">' + (data.state||'unknown') + '</span></div>';
  if (data.err_code) html += '<p style="color:var(--red);font-size:13px;">错误: ' + escH(data.err_code) + ' - ' + escH(data.err_msg||'') + '</p>';

  // 成片视频
  if (data.signed_url) {
    html += '<div class="final-video" style="margin-top:14px;"><video src="' + data.signed_url + '" controls></video></div>';
  }

  // 分镜视频
  if (data.job_records && data.job_records.length) {
    html += '<div class="shots-grid">';
    for (const rec of data.job_records) {
      if (rec.jobs) {
        for (const job of rec.jobs) {
          if (job.signed_url) {
            html += '<div class="shot-card"><div class="shot-header"><span class="shot-id">' + (rec.type||'clip') + ' #' + (rec.index||'') + '</span><span class="shot-dur">' + (job.state||'') + '</span></div>';
            html += '<video src="' + job.signed_url + '" controls></video></div>';
          }
        }
      }
    }
    html += '</div>';
  }

  html += '<details style="margin-top:16px;"><summary style="font-size:12px;color:var(--text-muted);cursor:pointer;">原始 JSON</summary><pre style="font-size:11px;color:var(--text-dim);white-space:pre-wrap;max-height:280px;overflow:auto;margin-top:8px;">' + escH(JSON.stringify(data,null,2)) + '</pre></details>';
  $('mvDetailContent').innerHTML = html;
  section.scrollIntoView({ behavior: 'smooth' });
}

// ==================== MV Render & Storage ====================
function mvRenderTasks() {
  $('mvTaskBody').innerHTML = mvTasks.map((t, i) => {
    const cls = t.state === 'success' ? 'status-success' : t.state === 'failed' ? 'status-failed' : t.state === 'processing' ? 'status-processing' : 'status-pending';
    return '<tr><td>' + (i+1) + '</td><td style="font-size:11px;font-family:monospace;">' + (t.task_id||'-') + '</td><td class="' + cls + '">' + t.state + '</td><td><button class="btn-secondary btn-sm" onclick="mvQuerySingle(' + i + ')">查询</button> <button class="btn-secondary btn-sm" onclick="mvShowDetail(' + i + ')" ' + (t.result?'':'disabled') + '>详情</button></td></tr>';
  }).join('');
}

function mvSaveTasks() { localStorage.setItem('mv_demo_tasks', JSON.stringify(mvTasks)); }
function mvClearTasks() { if (!confirm('确定清空 MV 任务？')) return; mvTasks=[]; mvSaveTasks(); mvRenderTasks(); $('mvDetailSection').style.display='none'; }

// MV Init
mvRenderTasks();
</script>
