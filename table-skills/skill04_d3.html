<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=450">
<title>D3.js AI招聘数据可视化</title>
<style>
@font-face { font-family:'AlibabaPuHuiTi'; src:url('./fonts/AlibabaPuHuiTi-3-35-Thin.woff') format('woff'); font-weight:100; }
@font-face { font-family:'AlibabaPuHuiTi'; src:url('./fonts/AlibabaPuHuiTi-3-55-Regular.woff') format('woff'); font-weight:400; }
@font-face { font-family:'AlibabaPuHuiTi'; src:url('./fonts/AlibabaPuHuiTi-3-65-Medium.woff') format('woff'); font-weight:500; }
@font-face { font-family:'AlibabaPuHuiTi'; src:url('./fonts/AlibabaPuHuiTi-3-85-Bold.woff') format('woff'); font-weight:700; }
@font-face { font-family:'AlibabaPuHuiTi'; src:url('./fonts/AlibabaPuHuiTi-3-115-Black.woff') format('woff'); font-weight:900; }

* { margin:0; padding:0; box-sizing:border-box; }
body {
  background: #050816;
  display: flex;
  justify-content: center;
  align-items: center;
  min-height: 100vh;
  font-family: 'AlibabaPuHuiTi', sans-serif;
  overflow: hidden;
}

#app {
  width: 450px;
  height: 800px;
  background: #0a0e27;
  position: relative;
  overflow: hidden;
  border-radius: 8px;
  box-shadow: 0 0 60px rgba(0,212,170,0.08);
}

.scene {
  position: absolute;
  top: 0; left: 0;
  width: 100%;
  height: 100%;
  opacity: 0;
  transition: opacity 0.6s ease;
  display: flex;
  flex-direction: column;
  pointer-events: none;
}
.scene.active {
  opacity: 1;
  pointer-events: auto;
}

.scene-title {
  font-size: 18px;
  font-weight: 700;
  color: #ffffff;
  text-align: center;
  padding: 18px 16px 4px;
  letter-spacing: 1px;
}
.scene-subtitle {
  font-size: 12px;
  font-weight: 400;
  color: rgba(255,255,255,0.5);
  text-align: center;
  padding: 0 16px 10px;
}

.chart-area {
  flex: 1;
  display: flex;
  justify-content: center;
  align-items: center;
  padding: 0 10px;
}

/* Progress bar */
#progress-bar {
  position: absolute;
  bottom: 0; left: 0;
  height: 3px;
  background: linear-gradient(90deg, #00D4AA, #FF6B6B, #FFA940, #7B68EE);
  transition: width 0.3s ease;
  z-index: 100;
  border-radius: 0 2px 2px 0;
}

/* Scene indicator */
#scene-indicator {
  position: absolute;
  top: 6px; right: 12px;
  font-size: 11px;
  color: rgba(255,255,255,0.35);
  z-index: 100;
  font-weight: 400;
}

/* Legend */
.legend {
  display: flex;
  justify-content: center;
  gap: 14px;
  padding: 4px 12px 8px;
  flex-wrap: wrap;
}
.legend-item {
  display: flex;
  align-items: center;
  gap: 4px;
  font-size: 11px;
  color: rgba(255,255,255,0.7);
}
.legend-dot {
  width: 8px;
  height: 8px;
  border-radius: 50%;
}

/* Bar chart specific */
.bar-label {
  fill: rgba(255,255,255,0.85);
  font-size: 13px;
  font-family: 'AlibabaPuHuiTi', sans-serif;
  font-weight: 500;
}
.bar-value {
  fill: #ffffff;
  font-size: 14px;
  font-family: 'AlibabaPuHuiTi', sans-serif;
  font-weight: 700;
}
.bar-cat {
  fill: rgba(255,255,255,0.6);
  font-size: 12px;
  font-family: 'AlibabaPuHuiTi', sans-serif;
  font-weight: 400;
}
.axis-line { stroke: rgba(255,255,255,0.1); stroke-width: 1; }
.grid-line { stroke: rgba(255,255,255,0.05); stroke-width: 1; }

/* Donut center text */
.donut-center-value {
  fill: #ffffff;
  font-size: 36px;
  font-family: 'AlibabaPuHuiTi', sans-serif;
  font-weight: 900;
}
.donut-center-label {
  fill: rgba(255,255,255,0.6);
  font-size: 12px;
  font-family: 'AlibabaPuHuiTi', sans-serif;
  font-weight: 400;
}

/* Radar label */
.radar-label {
  fill: rgba(255,255,255,0.75);
  font-size: 10px;
  font-family: 'AlibabaPuHuiTi', sans-serif;
  font-weight: 400;
}
.radar-value {
  fill: rgba(255,255,255,0.55);
  font-size: 9px;
  font-family: 'AlibabaPuHuiTi', sans-serif;
  font-weight: 400;
}

/* Bubble label */
.bubble-label {
  fill: #ffffff;
  font-size: 11px;
  font-family: 'AlibabaPuHuiTi', sans-serif;
  font-weight: 500;
  text-anchor: middle;
  dominant-baseline: central;
  pointer-events: none;
}

/* Treemap label */
.treemap-label {
  fill: #ffffff;
  font-family: 'AlibabaPuHuiTi', sans-serif;
  font-weight: 500;
  pointer-events: none;
}
.treemap-value {
  fill: rgba(255,255,255,0.7);
  font-family: 'AlibabaPuHuiTi', sans-serif;
  font-weight: 400;
  pointer-events: none;
}

/* Line chart dot pulse */
@keyframes dotPulse {
  0%, 100% { r: 5; opacity: 1; }
  50% { r: 8; opacity: 0.6; }
}

/* Final frame styles */
.final-title {
  font-size: 28px;
  font-weight: 900;
  fill: #ffffff;
  font-family: 'AlibabaPuHuiTi', sans-serif;
  text-anchor: middle;
}
.final-pct {
  font-size: 64px;
  font-weight: 900;
  fill: #00D4AA;
  font-family: 'AlibabaPuHuiTi', sans-serif;
  text-anchor: middle;
}
.final-sub {
  font-size: 13px;
  font-weight: 400;
  fill: rgba(255,255,255,0.5);
  font-family: 'AlibabaPuHuiTi', sans-serif;
  text-anchor: middle;
}
@keyframes bgGrad {
  0% { stop-color: #0a0e27; }
  50% { stop-color: #0f1538; }
  100% { stop-color: #0a0e27; }
}
@keyframes pulse {
  0%, 100% { opacity: 1; }
  50% { opacity: 0.6; }
}
</style>
</head>
<body>

<div id="app">
  <!-- Scene 1: Bar Chart -->
  <div class="scene" id="scene1">
    <div class="scene-title">各渠道AI岗位占比</div>
    <div class="scene-subtitle">社招 / 校招 / 实习 AI岗位渗透率对比</div>
    <div class="chart-area" id="chart1"></div>
    <div class="legend">
      <div class="legend-item"><div class="legend-dot" style="background:#00D4AA"></div>社招</div>
      <div class="legend-item"><div class="legend-dot" style="background:#FF6B6B"></div>校招</div>
      <div class="legend-item"><div class="legend-dot" style="background:#FFA940"></div>实习</div>
    </div>
  </div>

  <!-- Scene 2: Donut Chart -->
  <div class="scene" id="scene2">
    <div class="scene-title">AI岗位总占比</div>
    <div class="scene-subtitle">爱优腾哔四平台 1873个岗位中AI岗位分布</div>
    <div class="chart-area" id="chart2"></div>
  </div>

  <!-- Scene 3: Line Chart -->
  <div class="scene" id="scene3">
    <div class="scene-title">爱奇艺AI岗位占比变化</div>
    <div class="scene-subtitle">从9.4%到37.6%，AI岗位占比飙升4倍</div>
    <div class="chart-area" id="chart3"></div>
  </div>

  <!-- Scene 4: Radar Chart -->
  <div class="scene" id="scene4">
    <div class="scene-title">四平台AI战略维度</div>
    <div class="scene-subtitle">技术研发 / 商业化 / 社区生态 / 内容实战 / 出海能力 / 人才培养</div>
    <div class="chart-area" id="chart4"></div>
    <div class="legend">
      <div class="legend-item"><div class="legend-dot" style="background:#00D4AA"></div>腾讯</div>
      <div class="legend-item"><div class="legend-dot" style="background:#FF6B6B"></div>爱奇艺</div>
      <div class="legend-item"><div class="legend-dot" style="background:#FFA940"></div>B站</div>
      <div class="legend-item"><div class="legend-dot" style="background:#7B68EE"></div>优酷</div>
    </div>
  </div>

  <!-- Scene 5: Bubble Chart -->
  <div class="scene" id="scene5">
    <div class="scene-title">平台战略定位</div>
    <div class="scene-subtitle">X轴=技术研发 Y轴=商业化 气泡大小=总岗位数</div>
    <div class="chart-area" id="chart5"></div>
  </div>

  <!-- Scene 6: Treemap -->
  <div class="scene" id="scene6">
    <div class="scene-title">各公司AI岗位类型分布</div>
    <div class="scene-subtitle">模型/算法 · 内容创作 · 产品/运营 · 销售/商务 · 设计/美术</div>
    <div class="chart-area" id="chart6"></div>
  </div>

  <!-- Scene 7: Final Frame -->
  <div class="scene" id="scene7">
    <div class="chart-area" id="chart7"></div>
  </div>

  <div id="progress-bar"></div>
  <div id="scene-indicator">1 / 7</div>
</div>

<script src="https://cdn.jsdelivr.net/npm/d3@7/dist/d3.min.js"></script>
<script>
(function() {
  'use strict';

  // ========== DATA ==========
  var DATA = {
    hiring: { cats:['社招','校招','实习'], total:[635,525,713], ai:[167,188,113], aiPct:[26.3,35.8,15.9], totalAi:468, totalAll:1873 },
    radar: { dims:['技术研发','商业化','社区生态','内容实战','出海能力','人才培养'], tencent:[9,4,3,6,2,8], iqiyi:[5,9,2,5,8,5], bilibili:[6,4,9,4,5,7], youku:[4,5,3,9,3,6] },
    iqiyi: { period:['2025暑期','2026春季'], pct:[9.4,37.6] },
    jobs: { types:['模型/算法','内容创作','产品/运营','销售/商务','设计/美术'], tencent:[8,5,3,1,2], iqiyi:[3,4,5,6,2], bilibili:[5,3,6,1,1], youku:[2,7,3,1,6] }
  };

  var COLORS = {
    tencent: '#00D4AA',
    iqiyi: '#FF6B6B',
    bilibili: '#FFA940',
    youku: '#7B68EE'
  };

  var CHART_W = 430, CHART_H = 600;
  var SCENE_DURATION = 5000;
  var TOTAL_SCENES = 7;

  var currentScene = 0;
  var sceneTimer = null;
  var simulationRef = null;

  // ========== UTILS ==========
  function showScene(idx) {
    d3.selectAll('.scene').classed('active', false);
    d3.select('#scene' + (idx + 1)).classed('active', true);
    d3.select('#scene-indicator').text((idx + 1) + ' / ' + TOTAL_SCENES);
    d3.select('#progress-bar').style('width', ((idx + 1) / TOTAL_SCENES * 100) + '%');
  }

  function nextScene() {
    currentScene = (currentScene + 1) % TOTAL_SCENES;
    showScene(currentScene);
    renderScene(currentScene);
  }

  function startAutoPlay() {
    sceneTimer = setInterval(nextScene, SCENE_DURATION);
  }

  function renderScene(idx) {
    switch(idx) {
      case 0: renderBarChart(); break;
      case 1: renderDonutChart(); break;
      case 2: renderLineChart(); break;
      case 3: renderRadarChart(); break;
      case 4: renderBubbleChart(); break;
      case 5: renderTreemap(); break;
      case 6: renderFinalFrame(); break;
    }
  }

  // ========== SCENE 1: Animated Bar Chart ==========
  function renderBarChart() {
    var container = document.getElementById('chart1');
    container.innerHTML = '';
    var margin = { top: 20, right: 30, bottom: 50, left: 50 };
    var w = CHART_W - margin.left - margin.right;
    var h = CHART_H - margin.top - margin.bottom;

    var svg = d3.select(container).append('svg')
      .attr('width', CHART_W).attr('height', CHART_H)
      .append('g').attr('transform', 'translate(' + margin.left + ',' + margin.top + ')');

    var data = DATA.hiring;
    var colors = [COLORS.tencent, COLORS.iqiyi, COLORS.bilibili];

    var x = d3.scaleBand().domain(data.cats).range([0, w]).padding(0.35);
    var y = d3.scaleLinear().domain([0, 45]).range([h, 0]);

    // Grid lines
    svg.selectAll('.grid-line')
      .data(y.ticks(5)).enter()
      .append('line').attr('class', 'grid-line')
      .attr('x1', 0).attr('x2', w)
      .attr('y1', function(d) { return y(d); }).attr('y2', function(d) { return y(d); });

    // Y axis labels
    svg.selectAll('.y-label')
      .data(y.ticks(5)).enter()
      .append('text')
      .attr('x', -8).attr('y', function(d) { return y(d); })
      .attr('text-anchor', 'end').attr('dominant-baseline', 'middle')
      .attr('fill', 'rgba(255,255,255,0.35)').attr('font-size', '10px')
      .attr('font-family', 'AlibabaPuHuiTi')
      .text(function(d) { return d + '%'; });

    // X axis
    svg.selectAll('.bar-cat')
      .data(data.cats).enter()
      .append('text').attr('class', 'bar-cat')
      .attr('x', function(d) { return x(d) + x.bandwidth() / 2; })
      .attr('y', h + 24)
      .attr('text-anchor', 'middle')
      .text(function(d) { return d; });

    // Bars
    var bars = svg.selectAll('.bar')
      .data(data.cats).enter()
      .append('rect')
      .attr('x', function(d) { return x(d); })
      .attr('width', x.bandwidth())
      .attr('y', h)
      .attr('height', 0)
      .attr('rx', 4).attr('ry', 4)
      .attr('fill', function(d, i) { return colors[i]; })
      .attr('opacity', 0.9);

    bars.transition()
      .duration(1200)
      .ease(d3.easeElastic.amplitude(1).period(0.5))
      .delay(function(d, i) { return i * 200; })
      .attr('y', function(d) { return y(data.aiPct[data.cats.indexOf(d)]); })
      .attr('height', function(d) { return h - y(data.aiPct[data.cats.indexOf(d)]); });

    // Value labels (fade in after bars)
    svg.selectAll('.bar-value')
      .data(data.cats).enter()
      .append('text').attr('class', 'bar-value')
      .attr('x', function(d) { return x(d) + x.bandwidth() / 2; })
      .attr('y', function(d) { return y(data.aiPct[data.cats.indexOf(d)]) - 10; })
      .attr('text-anchor', 'middle')
      .attr('opacity', 0)
      .text(function(d) { return data.aiPct[data.cats.indexOf(d)] + '%'; })
      .transition()
      .duration(600)
      .delay(function(d, i) { return 800 + i * 200; })
      .attr('opacity', 1);

    // AI count labels
    svg.selectAll('.bar-label')
      .data(data.cats).enter()
      .append('text').attr('class', 'bar-label')
      .attr('x', function(d) { return x(d) + x.bandwidth() / 2; })
      .attr('y', function(d) { return y(data.aiPct[data.cats.indexOf(d)]) - 28; })
      .attr('text-anchor', 'middle')
      .attr('opacity', 0)
      .attr('font-size', '11px')
      .attr('fill', 'rgba(255,255,255,0.55)')
      .text(function(d, i) { return data.ai[i] + '个AI岗位 / 共' + data.total[i] + '个'; })
      .transition()
      .duration(600)
      .delay(function(d, i) { return 1000 + i * 200; })
      .attr('opacity', 1);

    // Baseline
    svg.append('line')
      .attr('x1', 0).attr('x2', w)
      .attr('y1', h).attr('y2', h)
      .attr('stroke', 'rgba(255,255,255,0.15)').attr('stroke-width', 1);
  }

  // ========== SCENE 2: Animated Donut Chart ==========
  function renderDonutChart() {
    var container = document.getElementById('chart2');
    container.innerHTML = '';
    var cw = CHART_W, ch = CHART_H;
    var radius = Math.min(cw, ch) / 2 - 60;
    var cx = cw / 2, cy = ch / 2 - 10;

    var svg = d3.select(container).append('svg')
      .attr('width', cw).attr('height', ch)
      .append('g').attr('transform', 'translate(' + cx + ',' + cy + ')');

    var pieData = [
      { label: 'AI岗位', value: DATA.hiring.totalAi, color: '#00D4AA' },
      { label: '非AI岗位', value: DATA.hiring.totalAll - DATA.hiring.totalAi, color: 'rgba(255,255,255,0.08)' }
    ];

    var pie = d3.pie().value(function(d) { return d.value; }).sort(null).padAngle(0.03);
    var arc = d3.arc().innerRadius(radius * 0.62).outerRadius(radius);

    // Arc tween
    function arcTween(a) {
      var i = d3.interpolate({ startAngle: 0, endAngle: 0 }, a);
      return function(t) { return arc(i(t)); };
    }

    var arcs = svg.selectAll('.arc')
      .data(pie(pieData)).enter()
      .append('g').attr('class', 'arc');

    arcs.append('path')
      .attr('fill', function(d) { return d.data.color; })
      .attr('stroke', 'none')
      .transition()
      .duration(1500)
      .ease(d3.easeCubicInOut)
      .attrTween('d', arcTween);

    // Center text: percentage counting up
    var centerG = svg.append('g').attr('class', 'center-text');

    centerG.append('text')
      .attr('class', 'donut-center-label')
      .attr('dy', -12)
      .attr('text-anchor', 'middle')
      .text('AI岗位占比')
      .attr('opacity', 0)
      .transition().duration(800).delay(600)
      .attr('opacity', 1);

    var pctText = centerG.append('text')
      .attr('class', 'donut-center-value')
      .attr('dy', 28)
      .attr('text-anchor', 'middle')
      .text('0%');

    pctText.transition()
      .duration(1500)
      .ease(d3.easeCubicOut)
      .delay(400)
      .tween('text', function() {
        var interp = d3.interpolateNumber(0, 25);
        return function(t) {
          this.textContent = Math.round(interp(t)) + '%';
        };
      });

    // Detail info below donut
    var infoG = svg.append('g').attr('transform', 'translate(0, ' + (radius + 36) + ')');

    infoG.append('text')
      .attr('text-anchor', 'middle')
      .attr('fill', '#00D4AA')
      .attr('font-size', '14px')
      .attr('font-weight', '700')
      .attr('font-family', 'AlibabaPuHuiTi')
      .attr('opacity', 0)
      .text('AI岗位 ' + DATA.hiring.totalAi + '个')
      .transition().duration(600).delay(1200).attr('opacity', 1);

    infoG.append('text')
      .attr('text-anchor', 'middle')
      .attr('dy', 22)
      .attr('fill', 'rgba(255,255,255,0.4)')
      .attr('font-size', '12px')
      .attr('font-weight', '400')
      .attr('font-family', 'AlibabaPuHuiTi')
      .attr('opacity', 0)
      .text('非AI岗位 ' + (DATA.hiring.totalAll - DATA.hiring.totalAi) + '个 / 共 ' + DATA.hiring.totalAll + '个')
      .transition().duration(600).delay(1400).attr('opacity', 1);

    // Decorative ring
    svg.append('circle')
      .attr('r', radius + 14)
      .attr('fill', 'none')
      .attr('stroke', 'rgba(0,212,170,0.1)')
      .attr('stroke-width', 1)
      .attr('stroke-dasharray', '4 6')
      .attr('opacity', 0)
      .transition().duration(1000).delay(300)
      .attr('opacity', 1);
  }

  // ========== SCENE 3: Animated Line Chart ==========
  function renderLineChart() {
    var container = document.getElementById('chart3');
    container.innerHTML = '';
    var margin = { top: 30, right: 40, bottom: 60, left: 50 };
    var w = CHART_W - margin.left - margin.right;
    var h = CHART_H - margin.top - margin.bottom;

    var svg = d3.select(container).append('svg')
      .attr('width', CHART_W).attr('height', CHART_H)
      .append('g').attr('transform', 'translate(' + margin.left + ',' + margin.top + ')');

    var data = DATA.iqiyi;
    var points = data.period.map(function(p, i) { return { period: p, pct: data.pct[i] }; });

    var x = d3.scalePoint().domain(data.period).range([0, w]).padding(0.5);
    var y = d3.scaleLinear().domain([0, 45]).range([h, 0]);

    // Grid
    svg.selectAll('.grid-line-h')
      .data(y.ticks(5)).enter()
      .append('line').attr('class', 'grid-line')
      .attr('x1', 0).attr('x2', w)
      .attr('y1', function(d) { return y(d); }).attr('y2', function(d) { return y(d); });

    // Y labels
    svg.selectAll('.y-label')
      .data(y.ticks(5)).enter()
      .append('text')
      .attr('x', -8).attr('y', function(d) { return y(d); })
      .attr('text-anchor', 'end').attr('dominant-baseline', 'middle')
      .attr('fill', 'rgba(255,255,255,0.35)').attr('font-size', '10px')
      .attr('font-family', 'AlibabaPuHuiTi')
      .text(function(d) { return d + '%'; });

    // X labels
    svg.selectAll('.x-label')
      .data(data.period).enter()
      .append('text')
      .attr('x', function(d) { return x(d); }).attr('y', h + 24)
      .attr('text-anchor', 'middle')
      .attr('fill', 'rgba(255,255,255,0.6)').attr('font-size', '12px')
      .attr('font-family', 'AlibabaPuHuiTi')
      .text(function(d) { return d; });

    // Baseline
    svg.append('line')
      .attr('x1', 0).attr('x2', w)
      .attr('y1', h).attr('y2', h)
      .attr('stroke', 'rgba(255,255,255,0.15)');

    // Line definition
    var line = d3.line()
      .x(function(d) { return x(d.period); })
      .y(function(d) { return y(d.pct); })
      .curve(d3.curveMonotoneX);

    // Area definition
    var area = d3.area()
      .x(function(d) { return x(d.period); })
      .y0(h)
      .y1(function(d) { return y(d.pct); })
      .curve(d3.curveMonotoneX);

    // Draw area fill
    var areaPath = svg.append('path')
      .datum(points)
      .attr('fill', 'rgba(255,107,107,0.12)')
      .attr('d', area)
      .attr('opacity', 0);

    areaPath.transition().duration(1500).delay(400).attr('opacity', 1);

    // Glow line (draw behind main line)
    var glowPath = svg.append('path')
      .datum(points)
      .attr('fill', 'none')
      .attr('stroke', COLORS.iqiyi)
      .attr('stroke-width', 8)
      .attr('stroke-linecap', 'round')
      .attr('opacity', 0.15)
      .attr('d', line);

    var glowLen = glowPath.node().getTotalLength();
    glowPath
      .attr('stroke-dasharray', glowLen)
      .attr('stroke-dashoffset', glowLen)
      .transition()
      .duration(1800)
      .ease(d3.easeCubicInOut)
      .attr('stroke-dashoffset', 0);

    // Draw line with stroke-dasharray technique
    var linePath = svg.append('path')
      .datum(points)
      .attr('fill', 'none')
      .attr('stroke', COLORS.iqiyi)
      .attr('stroke-width', 3)
      .attr('stroke-linecap', 'round')
      .attr('d', line);

    var totalLength = linePath.node().getTotalLength();
    linePath
      .attr('stroke-dasharray', totalLength)
      .attr('stroke-dashoffset', totalLength)
      .transition()
      .duration(1800)
      .ease(d3.easeCubicInOut)
      .attr('stroke-dashoffset', 0);

    // Dots with bounce
    svg.selectAll('.dot')
      .data(points).enter()
      .append('circle')
      .attr('cx', function(d) { return x(d.period); })
      .attr('cy', function(d) { return y(d.pct); })
      .attr('r', 0)
      .attr('fill', COLORS.iqiyi)
      .attr('stroke', '#0a0e27')
      .attr('stroke-width', 2)
      .transition()
      .duration(600)
      .ease(d3.easeBounceOut)
      .delay(function(d, i) { return 1000 + i * 400; })
      .attr('r', 6);

    // Value labels
    svg.selectAll('.val-label')
      .data(points).enter()
      .append('text')
      .attr('x', function(d) { return x(d.period); })
      .attr('y', function(d) { return y(d.pct) - 16; })
      .attr('text-anchor', 'middle')
      .attr('fill', '#ffffff')
      .attr('font-size', '16px')
      .attr('font-weight', '700')
      .attr('font-family', 'AlibabaPuHuiTi')
      .attr('opacity', 0)
      .text(function(d) { return d.pct + '%'; })
      .transition()
      .duration(500)
      .delay(function(d, i) { return 1200 + i * 400; })
      .attr('opacity', 1);

    // Growth arrow annotation
    var arrowG = svg.append('g').attr('opacity', 0);
    arrowG.append('line')
      .attr('x1', x(data.period[0])).attr('y1', y(data.pct[0]) + 30)
      .attr('x2', x(data.period[1])).attr('y2', y(data.pct[1]) + 30)
      .attr('stroke', 'rgba(255,107,107,0.4)')
      .attr('stroke-width', 1.5)
      .attr('stroke-dasharray', '4 4');
    arrowG.append('text')
      .attr('x', (x(data.period[0]) + x(data.period[1])) / 2)
      .attr('y', y(data.pct[0]) + 48)
      .attr('text-anchor', 'middle')
      .attr('fill', COLORS.iqiyi)
      .attr('font-size', '12px')
      .attr('font-weight', '500')
      .attr('font-family', 'AlibabaPuHuiTi')
      .text('增长 4x');

    arrowG.transition().duration(800).delay(2000).attr('opacity', 1);
  }

  // ========== SCENE 4: Animated Radar Chart ==========
  function renderRadarChart() {
    var container = document.getElementById('chart4');
    container.innerHTML = '';
    var cw = CHART_W, ch = CHART_H - 50;
    var cx = cw / 2, cy = ch / 2;
    var radius = Math.min(cw, ch) / 2 - 60;
    var dims = DATA.radar.dims;
    var n = dims.length;
    var angleSlice = (Math.PI * 2) / n;

    var svg = d3.select(container).append('svg')
      .attr('width', cw).attr('height', ch)
      .append('g').attr('transform', 'translate(' + cx + ',' + cy + ')');

    var scale = d3.scaleLinear().domain([0, 10]).range([0, radius]);

    // Grid circles (animated)
    var gridLevels = [2, 4, 6, 8, 10];
    gridLevels.forEach(function(level, li) {
      var r = scale(level);
      svg.append('circle')
        .attr('r', 0)
        .attr('fill', 'none')
        .attr('stroke', 'rgba(255,255,255,0.07)')
        .attr('stroke-width', 1)
        .transition()
        .duration(600)
        .ease(d3.easeCubicOut)
        .delay(li * 100)
        .attr('r', r);
    });

    // Axis lines from center
    dims.forEach(function(dim, i) {
      var angle = i * angleSlice - Math.PI / 2;
      var x2 = Math.cos(angle) * radius;
      var y2 = Math.sin(angle) * radius;
      svg.append('line')
        .attr('x1', 0).attr('y1', 0)
        .attr('x2', 0).attr('y2', 0)
        .attr('stroke', 'rgba(255,255,255,0.1)')
        .attr('stroke-width', 1)
        .transition()
        .duration(800)
        .ease(d3.easeCubicOut)
        .delay(300 + i * 80)
        .attr('x2', x2)
        .attr('y2', y2);
    });

    // Axis labels
    dims.forEach(function(dim, i) {
      var angle = i * angleSlice - Math.PI / 2;
      var labelR = radius + 22;
      var lx = Math.cos(angle) * labelR;
      var ly = Math.sin(angle) * labelR;
      svg.append('text')
        .attr('class', 'radar-label')
        .attr('x', lx).attr('y', ly)
        .attr('text-anchor', 'middle')
        .attr('dominant-baseline', 'central')
        .attr('opacity', 0)
        .text(dim)
        .transition().duration(500).delay(600 + i * 80).attr('opacity', 1);
    });

    // Company polygons
    var companies = [
      { name: '腾讯', key: 'tencent', color: COLORS.tencent },
      { name: '爱奇艺', key: 'iqiyi', color: COLORS.iqiyi },
      { name: 'B站', key: 'bilibili', color: COLORS.bilibili },
      { name: '优酷', key: 'youku', color: COLORS.youku }
    ];

    function getPoints(companyKey) {
      return dims.map(function(dim, i) {
        var angle = i * angleSlice - Math.PI / 2;
        var val = DATA.radar[companyKey][i];
        return { x: Math.cos(angle) * scale(val), y: Math.sin(angle) * scale(val) };
      });
    }

    companies.forEach(function(comp, ci) {
      var pts = getPoints(comp.key);
      var pointsStr = pts.map(function(p) { return p.x + ',' + p.y; }).join(' ');

      // Polygon
      svg.append('polygon')
        .attr('points', pts.map(function() { return '0,0'; }).join(' '))
        .attr('fill', comp.color)
        .attr('fill-opacity', 0.12)
        .attr('stroke', comp.color)
        .attr('stroke-width', 2)
        .attr('stroke-opacity', 0.8)
        .transition()
        .duration(1200)
        .ease(d3.easeElastic.amplitude(1).period(0.5))
        .delay(800 + ci * 300)
        .attr('points', pointsStr);

      // Dots
      pts.forEach(function(p, pi) {
        svg.append('circle')
          .attr('cx', 0).attr('cy', 0).attr('r', 3)
          .attr('fill', comp.color)
          .attr('opacity', 0)
          .transition()
          .duration(600)
          .ease(d3.easeCubicOut)
          .delay(1200 + ci * 300 + pi * 50)
          .attr('cx', p.x).attr('cy', p.y).attr('opacity', 0.9);
      });
    });
  }

  // ========== SCENE 6: Animated Treemap ==========
  function renderTreemap() {
    var container = document.getElementById('chart6');
    container.innerHTML = '';
    var margin = { top: 10, right: 10, bottom: 10, left: 10 };
    var w = CHART_W - margin.left - margin.right;
    var h = CHART_H - margin.top - margin.bottom;

    var svg = d3.select(container).append('svg')
      .attr('width', CHART_W).attr('height', CHART_H)
      .append('g').attr('transform', 'translate(' + margin.left + ',' + margin.top + ')');

    // Build hierarchy data
    var companyColors = {
      '腾讯': COLORS.tencent,
      '爱奇艺': COLORS.iqiyi,
      'B站': COLORS.bilibili,
      '优酷': COLORS.youku
    };

    var hierarchyData = {
      name: 'root',
      children: [
        { name: '腾讯', children: DATA.jobs.types.map(function(t, i) { return { name: t, value: DATA.jobs.tencent[i], company: '腾讯' }; }) },
        { name: '爱奇艺', children: DATA.jobs.types.map(function(t, i) { return { name: t, value: DATA.jobs.iqiyi[i], company: '爱奇艺' }; }) },
        { name: 'B站', children: DATA.jobs.types.map(function(t, i) { return { name: t, value: DATA.jobs.bilibili[i], company: 'B站' }; }) },
        { name: '优酷', children: DATA.jobs.types.map(function(t, i) { return { name: t, value: DATA.jobs.youku[i], company: '优酷' }; }) }
      ]
    };

    var root = d3.hierarchy(hierarchyData)
      .sum(function(d) { return d.value; })
      .sort(function(a, b) { return b.value - a.value; });

    d3.treemap()
      .size([w, h])
      .padding(3)
      .paddingOuter(6)
      .round(true)(root);

    var leaves = root.leaves();

    leaves.forEach(function(leaf, i) {
      var d = leaf;
      var cx = (d.x0 + d.x1) / 2;
      var cy = (d.y0 + d.y1) / 2;
      var rectW = d.x1 - d.x0;
      var rectH = d.y1 - d.y0;

      var compColor = companyColors[d.data.company] || '#666';

      // Rectangle: grow from center
      var rect = svg.append('rect')
        .attr('x', cx)
        .attr('y', cy)
        .attr('width', 0)
        .attr('height', 0)
        .attr('rx', 4)
        .attr('fill', compColor)
        .attr('fill-opacity', 0.25)
        .attr('stroke', compColor)
        .attr('stroke-width', 1.5)
        .attr('stroke-opacity', 0.6);

      rect.transition()
        .duration(900)
        .ease(d3.easeElastic.amplitude(1).period(0.5))
        .delay(i * 80)
        .attr('x', d.x0)
        .attr('y', d.y0)
        .attr('width', rectW)
        .attr('height', rectH);

      // Label (only if rect is big enough)
      if (rectW > 40 && rectH > 28) {
        var labelG = svg.append('g')
          .attr('opacity', 0);

        labelG.append('text')
          .attr('class', 'treemap-label')
          .attr('x', cx)
          .attr('y', cy - 4)
          .attr('text-anchor', 'middle')
          .attr('dominant-baseline', 'central')
          .attr('font-size', rectW > 60 ? '11px' : '9px')
          .attr('fill', '#ffffff')
          .text(d.data.name);

        labelG.append('text')
          .attr('class', 'treemap-value')
          .attr('x', cx)
          .attr('y', cy + 12)
          .attr('text-anchor', 'middle')
          .attr('font-size', '9px')
          .attr('fill', 'rgba(255,255,255,0.6)')
          .text(d.data.value + '个');

        labelG.transition()
          .duration(500)
          .delay(700 + i * 80)
          .attr('opacity', 1);
      }
    });

    // Company group labels
    root.children.forEach(function(child, ci) {
      var d = child;
      var labelX = d.x0 + 6;
      var labelY = d.y0 + 14;

      svg.append('text')
        .attr('x', labelX).attr('y', labelY)
        .attr('fill', companyColors[d.data.name])
        .attr('font-size', '12px')
        .attr('font-weight', '700')
        .attr('font-family', 'AlibabaPuHuiTi')
        .attr('opacity', 0)
        .text(d.data.name)
        .transition().duration(600).delay(300 + ci * 150).attr('opacity', 0.8);
    });
  }

  // ========== SCENE 7: Final Frame ==========
  function renderFinalFrame() {
    var container = document.getElementById('chart7');
    container.innerHTML = '';
    var cw = CHART_W, ch = CHART_H;

    var svg = d3.select(container).append('svg')
      .attr('width', cw).attr('height', ch);

    // Animated gradient background
    var defs = svg.append('defs');
    var grad = defs.append('radialGradient')
      .attr('id', 'finalBg')
      .attr('cx', '50%').attr('cy', '50%').attr('r', '60%');
    grad.append('stop').attr('offset', '0%').attr('stop-color', '#141938');
    grad.append('stop').attr('offset', '100%').attr('stop-color', '#0a0e27');

    svg.append('rect')
      .attr('width', cw).attr('height', ch)
      .attr('fill', 'url(#finalBg)');

    // Force simulation with floating circles
    var nodes = [];
    var nodeColors = [COLORS.tencent, COLORS.iqiyi, COLORS.bilibili, COLORS.youku, '#00D4AA', '#FF6B6B'];
    for (var i = 0; i < 30; i++) {
      nodes.push({
        x: Math.random() * cw,
        y: Math.random() * ch,
        r: Math.random() * 18 + 4,
        color: nodeColors[i % nodeColors.length],
        opacity: Math.random() * 0.3 + 0.05
      });
    }

    var simulation = d3.forceSimulation(nodes)
      .force('charge', d3.forceCollide().radius(function(d) { return d.r + 4; }))
      .force('x', d3.forceX(cw / 2).strength(0.02))
      .force('y', d3.forceY(ch / 2).strength(0.02))
      .alpha(0.6)
      .alphaDecay(0.002);

    simulationRef = simulation;

    var circles = svg.selectAll('.float-circle')
      .data(nodes).enter()
      .append('circle')
      .attr('r', 0)
      .attr('fill', function(d) { return d.color; })
      .attr('opacity', function(d) { return d.opacity; });

    circles.transition()
      .duration(1500)
      .ease(d3.easeElastic.amplitude(1).period(0.5))
      .delay(function(d, i) { return i * 40; })
      .attr('r', function(d) { return d.r; });

    simulation.on('tick', function() {
      circles
        .attr('cx', function(d) { d.x = Math.max(d.r, Math.min(cw - d.r, d.x)); return d.x; })
        .attr('cy', function(d) { d.y = Math.max(d.r, Math.min(ch - d.r, d.y)); return d.y; });
    });

    // Center content
    var centerG = svg.append('g').attr('transform', 'translate(' + cw/2 + ',' + (ch/2 - 60) + ')');

    // Title
    centerG.append('text')
      .attr('class', 'final-title')
      .attr('dy', 0)
      .attr('opacity', 0)
      .text('爱优腾哔招聘解读')
      .transition().duration(1000).delay(400)
      .attr('opacity', 1);

    // Divider line
    centerG.append('line')
      .attr('x1', -50).attr('x2', 50)
      .attr('y1', 20).attr('y2', 20)
      .attr('stroke', 'rgba(255,255,255,0.2)')
      .attr('stroke-width', 1)
      .attr('opacity', 0)
      .transition().duration(800).delay(600)
      .attr('opacity', 1);

    // Big 25% with pulse
    var pctG = centerG.append('g').attr('transform', 'translate(0, 80)');

    // Pulse circle behind
    pctG.append('circle')
      .attr('r', 50)
      .attr('fill', 'rgba(0,212,170,0.06)')
      .attr('opacity', 0)
      .transition().duration(1000).delay(800)
      .attr('opacity', 1);

    // Animated pulse ring
    var pulseRing = pctG.append('circle')
      .attr('r', 50)
      .attr('fill', 'none')
      .attr('stroke', 'rgba(0,212,170,0.15)')
      .attr('stroke-width', 2)
      .attr('opacity', 0);

    pulseRing.transition().duration(1000).delay(900).attr('opacity', 1)
      .on('end', function pulseAnim() {
        d3.select(this)
          .transition().duration(2000).ease(d3.easeSinInOut)
          .attr('r', 65).attr('stroke-opacity', 0)
          .transition().duration(2000).ease(d3.easeSinInOut)
          .attr('r', 50).attr('stroke-opacity', 0.15)
          .on('end', pulseAnim);
      });

    var pctText = pctG.append('text')
      .attr('class', 'final-pct')
      .attr('dy', 10)
      .attr('opacity', 0)
      .text('0%');

    pctText.transition()
      .duration(1500)
      .ease(d3.easeCubicOut)
      .delay(800)
      .attr('opacity', 1)
      .tween('text', function() {
        var interp = d3.interpolateNumber(0, 25);
        return function(t) {
          this.textContent = Math.round(interp(t)) + '%';
        };
      });

    // Subtitle
    centerG.append('text')
      .attr('class', 'final-sub')
      .attr('dy', 140)
      .attr('opacity', 0)
      .text('AI岗位占四平台总招聘比例')
      .transition().duration(800).delay(1600).attr('opacity', 1);

    // Company tags at bottom
    var tagY = ch / 2 + 130;
    var companies = [
      { name: '腾讯', color: COLORS.tencent, val: '167' },
      { name: '爱奇艺', color: COLORS.iqiyi, val: '188' },
      { name: 'B站', color: COLORS.bilibili, val: '113' },
      { name: '优酷', color: COLORS.youku, val: '总468' }
    ];

    var tagWidth = 85;
    var totalTagWidth = companies.length * tagWidth + (companies.length - 1) * 8;
    var startX = (cw - totalTagWidth) / 2;

    companies.forEach(function(comp, i) {
      var tx = startX + i * (tagWidth + 8);

      svg.append('rect')
        .attr('x', tx).attr('y', tagY)
        .attr('width', tagWidth).attr('height', 36)
        .attr('rx', 8)
        .attr('fill', comp.color)
        .attr('fill-opacity', 0.12)
        .attr('stroke', comp.color)
        .attr('stroke-width', 1)
        .attr('stroke-opacity', 0.3)
        .attr('opacity', 0)
        .transition().duration(600).delay(1800 + i * 120).attr('opacity', 1);

      svg.append('text')
        .attr('x', tx + tagWidth / 2).attr('y', tagY + 14)
        .attr('text-anchor', 'middle')
        .attr('fill', comp.color)
        .attr('font-size', '11px')
        .attr('font-weight', '500')
        .attr('font-family', 'AlibabaPuHuiTi')
        .attr('opacity', 0)
        .text(comp.name)
        .transition().duration(600).delay(1900 + i * 120).attr('opacity', 1);

      svg.append('text')
        .attr('x', tx + tagWidth / 2).attr('y', tagY + 28)
        .attr('text-anchor', 'middle')
        .attr('fill', 'rgba(255,255,255,0.5)')
        .attr('font-size', '10px')
        .attr('font-family', 'AlibabaPuHuiTi')
        .attr('opacity', 0)
        .text(comp.val + '岗')
        .transition().duration(600).delay(2000 + i * 120).attr('opacity', 1);
    });

    // Bottom credit
    svg.append('text')
      .attr('x', cw / 2).attr('y', ch - 20)
      .attr('text-anchor', 'middle')
