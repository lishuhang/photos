<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>经纪/MCN公司AI应用方向</title>
<style>
@font-face { font-family:'AlibabaPuHuiTi'; src:url('../assets/AlibabaPuHuiTi-3-35-Thin.woff') format('woff'); font-weight:100; }
@font-face { font-family:'AlibabaPuHuiTi'; src:url('../assets/AlibabaPuHuiTi-3-55-Regular.woff') format('woff'); font-weight:400; }
@font-face { font-family:'AlibabaPuHuiTi'; src:url('../assets/AlibabaPuHuiTi-3-65-Medium.woff') format('woff'); font-weight:500; }
@font-face { font-family:'AlibabaPuHuiTi'; src:url('../assets/AlibabaPuHuiTi-3-85-Bold.woff') format('woff'); font-weight:700; }
@font-face { font-family:'AlibabaPuHuiTi'; src:url('../assets/AlibabaPuHuiTi-3-115-Black.woff') format('woff'); font-weight:900; }

* { margin:0; padding:0; box-sizing:border-box; }

body {
  background: #050816;
  display: flex;
  justify-content: center;
  align-items: center;
  min-height: 100vh;
  font-family: 'AlibabaPuHuiTi', sans-serif;
}

.canvas-wrap {
  position: relative;
  width: 450px;
  height: 800px;
  background: #0a0e27;
  overflow: hidden;
  margin: auto;
}

.content {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  width: 400px;
  height: 400px;
}

.title {
  font-size: 20px;
  font-weight: 700;
  color: #fff;
  text-align: center;
  margin-bottom: 4px;
  letter-spacing: 1px;
}
.subtitle {
  font-size: 12px;
  font-weight: 400;
  color: rgba(255,255,255,0.5);
  text-align: center;
  margin-bottom: 8px;
}

.radar-container {
  position: relative;
  width: 320px;
  height: 320px;
  margin: 0 auto;
}

.radar-container svg {
  width: 100%;
  height: 100%;
}

/* Radar grid lines */
.radar-grid {
  fill: none;
  stroke: rgba(255,255,255,0.08);
  stroke-width: 1;
}

.radar-axis {
  stroke: rgba(255,255,255,0.1);
  stroke-width: 1;
}

/* Radar data polygons */
.radar-data {
  animation: radarReveal 1.5s ease-out forwards;
  transform-origin: center;
}

.radar-data-1 {
  fill: rgba(255,107,107,0.15);
  stroke: #FF6B6B;
  stroke-width: 2;
  opacity: 0;
  animation: radarFadeIn 1s ease-out 0.3s forwards;
}

.radar-data-2 {
  fill: rgba(78,205,196,0.12);
  stroke: #4ECDC4;
  stroke-width: 2;
  opacity: 0;
  animation: radarFadeIn 1s ease-out 0.8s forwards;
}

.radar-data-3 {
  fill: rgba(123,104,238,0.10);
  stroke: #7B68EE;
  stroke-width: 2;
  opacity: 0;
  animation: radarFadeIn 1s ease-out 1.3s forwards;
}

.radar-dot {
  opacity: 0;
  animation: dotPop 0.3s ease forwards;
}

@keyframes radarFadeIn {
  from { opacity: 0; transform: scale(0.3); }
  to { opacity: 1; transform: scale(1); }
}

@keyframes dotPop {
  from { opacity: 0; r: 0; }
  to { opacity: 1; }
}

.radar-label {
  font-size: 10px;
  fill: rgba(255,255,255,0.7);
  font-family: 'AlibabaPuHuiTi', sans-serif;
  font-weight: 500;
  text-anchor: middle;
  dominant-baseline: middle;
}

.legend {
  display: flex;
  justify-content: center;
  gap: 16px;
  margin-top: 8px;
}
.legend-item {
  display: flex;
  align-items: center;
  gap: 5px;
  font-size: 10px;
  color: rgba(255,255,255,0.7);
}
.legend-dot {
  width: 8px;
  height: 8px;
  border-radius: 50%;
}

.footer {
  position: absolute;
  bottom: 16px;
  left: 0;
  right: 0;
  text-align: center;
  font-size: 10px;
  color: rgba(255,255,255,0.3);
  font-weight: 400;
}

#loopBtn {
  position: absolute;
  top: 50%;
  right: -90px;
  transform: translateY(-50%);
  padding: 10px 18px;
  background: rgba(255,255,255,0.1);
  border: 1px solid rgba(255,255,255,0.2);
  border-radius: 8px;
  color: #fff;
  font-family: 'AlibabaPuHuiTi';
  cursor: pointer;
  font-size: 14px;
  transition: all 0.3s;
  display: none;
}
#loopBtn:hover { background: rgba(255,255,255,0.2); }
#loopBtn.active { background: rgba(0,212,170,0.2); border-color: rgba(0,212,170,0.4); color: #00D4AA; }

@media (max-width: 500px) {
  .canvas-wrap { width: 100vw; height: 177.78vw; }
  .content { width: 88vw; height: 88vw; }
  .radar-container { width: 75vw; height: 75vw; }
  #loopBtn { right: 10px; top: auto; bottom: 10px; transform: none; }
}
</style>
</head>
<body>
<div class="canvas-wrap">
  <div class="content" id="content">
    <div class="title">经纪/MCN公司AI应用方向</div>
    <div class="subtitle">虚拟偶像 · 数字人 · AIGC内容 — 多维度对比</div>

    <div class="radar-container">
      <svg viewBox="0 0 320 320" xmlns="http://www.w3.org/2000/svg">
        <g transform="translate(160,160)">
          <!-- Grid: 5 concentric pentagons -->
          <polygon class="radar-grid" points="0,-30 28.5,-9.3 17.6,24.3 -17.6,24.3 -28.5,-9.3"/>
          <polygon class="radar-grid" points="0,-60 57,-18.5 35.3,48.5 -35.3,48.5 -57,-18.5"/>
          <polygon class="radar-grid" points="0,-90 85.5,-27.8 52.9,72.8 -52.9,72.8 -85.5,-27.8"/>
          <polygon class="radar-grid" points="0,-120 114,-37.1 70.5,97.1 -70.5,97.1 -114,-37.1"/>
          <polygon class="radar-grid" points="0,-150 142.5,-46.4 88.2,121.4 -88.2,121.4 -142.5,-46.4"/>

          <!-- Axes -->
          <line class="radar-axis" x1="0" y1="0" x2="0" y2="-150"/>
          <line class="radar-axis" x1="0" y1="0" x2="142.5" y2="-46.4"/>
          <line class="radar-axis" x1="0" y1="0" x2="88.2" y2="121.4"/>
          <line class="radar-axis" x1="0" y1="0" x2="-88.2" y2="121.4"/>
          <line class="radar-axis" x1="0" y1="0" x2="-142.5" y2="-46.4"/>

          <!-- Data 1: 传统经纪 (red) - 虚拟偶像80, 数字人60, AIGC内容45, 智能营销70, 粉丝运营55 -->
          <polygon class="radar-data radar-data-1"
            points="0,-120 99.8,-32.5 39.7,54.6 -61.7,84.9 -78.4,-25.5"/>

          <!-- Data 2: MCN机构 (teal) - 虚拟偶像40, 数字人85, AIGC内容70, 智能营销50, 粉丝运营75 -->
          <polygon class="radar-data radar-data-2"
            points="0,-60 121.1,-39.4 61.7,84.9 -44.1,60.7 -106.9,-34.8"/>

          <!-- Data 3: 科技经纪 (purple) - 虚拟偶像65, 数字人75, AIGC内容90, 智能营销85, 粉丝运营40 -->
          <polygon class="radar-data radar-data-3"
            points="0,-97.5 121.1,-39.4 79.3,109.1 -74.9,103.2 -57,-18.5"/>

          <!-- Dots for data 1 -->
          <circle class="radar-dot" cx="0" cy="-120" r="3.5" fill="#FF6B6B" style="animation-delay:0.8s;"/>
          <circle class="radar-dot" cx="99.8" cy="-32.5" r="3.5" fill="#FF6B6B" style="animation-delay:0.9s;"/>
          <circle class="radar-dot" cx="39.7" cy="54.6" r="3.5" fill="#FF6B6B" style="animation-delay:1.0s;"/>
          <circle class="radar-dot" cx="-61.7" cy="84.9" r="3.5" fill="#FF6B6B" style="animation-delay:1.1s;"/>
          <circle class="radar-dot" cx="-78.4" cy="-25.5" r="3.5" fill="#FF6B6B" style="animation-delay:1.2s;"/>

          <!-- Dots for data 2 -->
          <circle class="radar-dot" cx="0" cy="-60" r="3.5" fill="#4ECDC4" style="animation-delay:1.3s;"/>
          <circle class="radar-dot" cx="121.1" cy="-39.4" r="3.5" fill="#4ECDC4" style="animation-delay:1.4s;"/>
          <circle class="radar-dot" cx="61.7" cy="84.9" r="3.5" fill="#4ECDC4" style="animation-delay:1.5s;"/>
          <circle class="radar-dot" cx="-44.1" cy="60.7" r="3.5" fill="#4ECDC4" style="animation-delay:1.6s;"/>
          <circle class="radar-dot" cx="-106.9" cy="-34.8" r="3.5" fill="#4ECDC4" style="animation-delay:1.7s;"/>

          <!-- Dots for data 3 -->
          <circle class="radar-dot" cx="0" cy="-97.5" r="3.5" fill="#7B68EE" style="animation-delay:1.8s;"/>
          <circle class="radar-dot" cx="121.1" cy="-39.4" r="3.5" fill="#7B68EE" style="animation-delay:1.9s;"/>
          <circle class="radar-dot" cx="79.3" cy="109.1" r="3.5" fill="#7B68EE" style="animation-delay:2.0s;"/>
          <circle class="radar-dot" cx="-74.9" cy="103.2" r="3.5" fill="#7B68EE" style="animation-delay:2.1s;"/>
          <circle class="radar-dot" cx="-57" cy="-18.5" r="3.5" fill="#7B68EE" style="animation-delay:2.2s;"/>

          <!-- Labels -->
          <text class="radar-label" x="0" y="-165">虚拟偶像</text>
          <text class="radar-label" x="158" y="-50">数字人</text>
          <text class="radar-label" x="100" y="138">AIGC内容</text>
          <text class="radar-label" x="-100" y="138">智能营销</text>
          <text class="radar-label" x="-158" y="-50">粉丝运营</text>
        </g>
      </svg>
    </div>

    <div class="legend">
      <div class="legend-item"><div class="legend-dot" style="background:#FF6B6B;"></div>传统经纪</div>
      <div class="legend-item"><div class="legend-dot" style="background:#4ECDC4;"></div>MCN机构</div>
      <div class="legend-item"><div class="legend-dot" style="background:#7B68EE;"></div>科技经纪</div>
    </div>
  </div>

  <div class="footer">数据来源：娱乐资本论统计</div>

  <button id="loopBtn" onclick="toggleLoop()">🔄 Loop</button>
</div>

<script>
let looping = false;
let loopTimer = null;
const ANIM_DURATION = 2700;

function showLoopBtn() {
  document.getElementById('loopBtn').style.display = 'block';
}

function toggleLoop() {
  looping = !looping;
  const btn = document.getElementById('loopBtn');
  btn.classList.toggle('active', looping);
  if (looping) {
    startLoop();
  } else {
    clearTimeout(loopTimer);
  }
}

function startLoop() {
  if (!looping) return;
  const content = document.getElementById('content');
  content.style.transition = 'opacity 0.8s';
  content.style.opacity = '0';
  loopTimer = setTimeout(() => {
    resetAnimations();
    content.style.opacity = '1';
    loopTimer = setTimeout(() => {
      if (looping) startLoop();
    }, ANIM_DURATION + 3000);
  }, 1300);
}

function resetAnimations() {
  const content = document.getElementById('content');
  const datas = content.querySelectorAll('.radar-data');
  const dots = content.querySelectorAll('.radar-dot');
  datas.forEach(d => {
    d.style.animation = 'none';
    d.offsetHeight;
    d.style.animation = '';
  });
  dots.forEach(d => {
    d.style.animation = 'none';
    d.offsetHeight;
    d.style.animation = '';
  });
}

setTimeout(showLoopBtn, ANIM_DURATION);
</script>
</body>
</html>
