        body {

        .timeline-line {
            position: absolute;
            left: 1.25rem; 
            top: 0;
            bottom: 0;
            width: 2px;
            background-color: #e2e8f0;
            z-index: 0;
        }
        
        .dark .timeline-line {
            background-color: #334155;
        }

        /* Loading Bar Animation */
        .loading-bar {
            position: absolute;
            bottom: 0;
            left: 0;
            height: 2px;
            background: #3b82f6;
            animation: loading 2s infinite ease-in-out;
            width: 0%;
        }
        
        @keyframes loading {
            0% { width: 0%; left: 0; }
            50% { width: 100%; left: 0; }
            100% { width: 0%; left: 100%; }

            background-color: rgba(0, 0, 0, 0.5);

        /* Filter Bar Scroll */
        .hide-scrollbar::-webkit-scrollbar {

        }
        .hide-scrollbar {

            scrollbar-width: none;
        }

        /* New item highlight */

        @keyframes highlightFade {
            0% { background-color: rgba(59, 130, 246, 0.25); }

    <script type="text/babel">

        ];

                add_btn: 'Add Source',
                active_sources: 'Managed Sources',
                import_btn: 'Import Config (JSON)',
                export_btn: 'Export Config',
                no_items: 'No news items. Click Refresh or check your Feed Settings.',
                updating: 'UPDATING...',
                last_updated: 'LAST UPDATED: ',
                sources_via: 'Sources: ',
                parser_note: 'Note: Only RSS/XML supported. Please convert X/Weibo sources to RSS links yourself.',
                import_warn: 'WARNING: Importing will completely REPLACE your current feed list. Continue?',
                error_fetch: 'Update partial/failed.',
                success_rate: 'Success Rate: ',
                filter_all: 'All',
                // v1.1 new strings
                banner_updating: 'Updating all sources...',
                banner_updates_available: '{count} updates fetched, click to expand',
                banner_updated: 'Content updated',
                notif_new_updates_title: 'Global Wire Updates',
                notif_new_updates_body: '{count} new articles fetched',
            }
        };

        // --- Helper Functions ---

        const getLazyDefaultFeeds = () => {
            try {
                const element = document.getElementById('default-feeds-data');
                if (element) {
                    return JSON.parse(element.textContent);
                }
            } catch (e) {
                console.error("Failed to parse default feeds from HTML", e);
            }
            return [];
        };

        // v1.1: Parallel fetch with concurrency control
        const parallelFetch = async (feeds, concurrency) => {
            const results = [];
            let successCount = 0;
            let index = 0;

            const worker = async () => {
                while (index < feeds.length) {
                    const currentIndex = index++;
                    const feed = feeds[currentIndex];
                    try {
                        const xmlText = await fetchFeedContent(feed.url);
                        successCount++;
                        results.push(parseRSS(xmlText, feed));
                    } catch (err) {
                        results.push([]);
                    }
                }
            };

            const workers = [];
            for (let i = 0; i < Math.min(concurrency, feeds.length); i++) {
                workers.push(worker());
            }
            await Promise.all(workers);
            
            return { results: results.flat(), successCount };
        };

        // Robust Fetcher with Proxy Fallback and Encoding Handling
        const fetchFeedContent = async (url) => {
            let lastError = null;
            const cacheBuster = `&_t=${Date.now()}`;

            for (const proxy of PROXY_LIST) {
                try {
                    const controller = new AbortController();
                    const timeoutId = setTimeout(() => controller.abort(), FETCH_TIMEOUT); // v1.1: 12s timeout

                    const targetUrl = proxy + encodeURIComponent(url) + cacheBuster;
                    
                    const response = await fetch(targetUrl, { signal: controller.signal });
                    clearTimeout(timeoutId);

                    if (!response.ok) throw new Error(`HTTP ${response.status}`);

                    const buffer = await response.arrayBuffer();
                    const decoder = new TextDecoder("utf-8");
                    const text = decoder.decode(buffer);
                    
                    if (text.includes("<?xml") || text.includes("<rss") || text.includes("<feed") || text.includes("<rdf")) {
                        return text;
                    }
                    throw new Error("Invalid content type or empty");

                } catch (err) {
                    lastError = err;
                }
            }
            throw lastError || new Error("All proxies failed");
        };

        const parseRSS = (xmlText, feedInfo) => {
            try {
                const parser = new DOMParser();
                const xmlDoc = parser.parseFromString(xmlText, "text/xml");
                
                const items = xmlDoc.querySelectorAll("item, entry");
                const newsItems = [];

                items.forEach(item => {
                    const title = item.querySelector("title")?.textContent;
                    
                    let link = item.querySelector("link")?.textContent;
                    if (!link) {
                        const linkElem = item.querySelector("link[href]");
                        if (linkElem) link = linkElem.getAttribute("href");
                    }
                    
                    let pubDate = item.querySelector("pubDate, published, updated")?.textContent;
                    if (!pubDate) {
                        const dcDate = item.getElementsByTagName("dc:date")[0] 
                                    || item.getElementsByTagNameNS("*", "date")[0];
                        if (dcDate) pubDate = dcDate.textContent;
                    }
                    
                    if (title && link) {
                        let sourceName = feedInfo.name;
                        let cleanTitle = title;
                        
                        if (title.includes(" - ")) {
                            const parts = title.split(" - ");
                            if (parts[parts.length - 1].length < 20) {
                                sourceName = parts[parts.length - 1];
                            }
                            cleanTitle = parts.slice(0, -1).join(" - ");
                        }

                        const isImportant = 
                            title.includes("Urgent") || 
                            title.includes("Breaking") || 
                            title.includes("\u7a81\u53d1") || 
                            title.includes("\u91cd\u78c5");

                        let ts = Date.now();
                        if (pubDate) {
                            const parsedTs = new Date(pubDate.trim()).getTime();
                            if (!isNaN(parsedTs)) {
                                ts = parsedTs;
                            }
                        }

                        newsItems.push({
                            id: link, 
                            timestamp: ts,
                            source: sourceName,
                            content: cleanTitle,
                            url: link,
                            important: isImportant,
                            type: feedInfo.type,
                            category: feedInfo.category || 'General'
                        });
                    }
                });
                
                newsItems.sort((a, b) => b.timestamp - a.timestamp);
                return newsItems.slice(0, 3);

            } catch (e) {
                console.warn(`XML Parse Error for ${feedInfo.name}`, e);
                return [];
            }
        };

        const formatTime = (timestamp) => {
            if (!timestamp) return '--:--';
            const date = new Date(timestamp);
            return date.toLocaleTimeString('en-GB', { hour: '2-digit', minute: '2-digit' });
        };

        // --- Components ---

        // v1.1: Banner component for update notifications
        const UpdateBanner = ({ bannerState, updateCount, onExpand, uiStrings }) => {
            if (bannerState === 'hidden') return null;

            let content = null;
            
            if (bannerState === 'updating') {
                content = (
                    <div className="flex items-center gap-2">
                        <div className="banner-spinner"></div>
                        <span className="text-sm font-medium text-white">{uiStrings.banner_updating}</span>
                    </div>
                );
            } else if (bannerState === 'available') {
                const text = uiStrings.banner_updates_available.replace('{count}', updateCount);
                content = (
                    <div className="flex items-center gap-2 cursor-pointer" onClick={onExpand}>
                        <i data-lucide="bell-ring" width="16" height="16" className="text-white"></i>
                        <span className="text-sm font-medium text-white">{text}</span>
                        <i data-lucide="chevron-down" width="14" height="14" className="text-white/70"></i>
                    </div>
                );
            } else if (bannerState === 'updated') {
                content = (
                    <div className="flex items-center gap-2">
                        <i data-lucide="check-circle" width="16" height="16" className="text-white"></i>
                        <span className="text-sm font-medium text-white">{uiStrings.banner_updated}</span>
                    </div>
                );
            }

            return (
                <div className="banner-enter bg-blue-600 dark:bg-blue-700 px-4 py-2.5 text-center z-[60] shadow-md">

                    type: 'rss',
                    enabled: true,
                    category: newCategory || 'General'

                downloadAnchorNode.setAttribute("href", dataStr);
                downloadAnchorNode.setAttribute("download", "global_wire_feeds.json");

                downloadAnchorNode.click();
                downloadAnchorNode.remove();

                if (!file) return;
                
                const reader = new FileReader();
                reader.onload = (event) => {
                    try {
                        const rawData = JSON.parse(event.target.result);
                        
                        let parsedFeeds = [];
                        let currentCategory = 'Imported';

                        if (Array.isArray(rawData)) {
                            rawData.forEach(item => {
                                if (item.__comment) {
                                    currentCategory = item.__comment.replace(/^=== | ===$/g, '').trim();
                                } else if (item.url && item.name) {
                                    parsedFeeds.push({
                                        ...item,
                                        category: item.category || currentCategory,
                                        id: item.id || Date.now().toString() + Math.random().toString().substr(2, 5),
                                        type: item.type || 'rss',
                                        enabled: item.enabled !== false
                                    });
                                }
                            });
                            
                            setFeeds(parsedFeeds);
                            alert('Import successful!');
                        } else {
                            alert('Invalid JSON structure: Root must be an array');
                        }
                    } catch (error) {
                        console.error(error);
                        alert('Error parsing JSON file');
                    }

                e.target.value = null;

                                                    placeholder={strings.feed_category}

                                                    {strings.add_btn}

                                                <p>它从全球 40+ 个 RSS 新闻源实时抓取新闻，通过 CORS 代理访问，支持中国内地、香港、台湾、日本、韩国、新加坡、欧洲、美国等地区的主流媒体。</p>

                                                <p>All data is stored in browser localStorage. No registration, no tracking, no server side. Can be deployed as a static page on GitHub Pages or Cloudflare Workers.</p>

                                                <p><strong>添加/管理新闻源：</strong>在设置 → 新闻源中添加自定义 RSS 链接，或导入/导出配置。</p>
                                                <p><strong>界面定制：</strong>在设置 → 通用中切换语言、深色模式、桌面通知。</p>

                                        ) : (
                                            <>
                                                <p><strong>Browsing News:</strong> Opening the page automatically fetches all enabled news sources, sorted by time in reverse order.</p>
                                                <p><strong>Category Filter:</strong> Use the top category tabs to filter news by region/category.</p>
                                                <p><strong>Manual Refresh:</strong> Click the refresh button in the top right to update all sources immediately.</p>
                                                <p><strong>Add/Manage Feeds:</strong> In Settings → Feeds, add custom RSS links, or import/export configuration.</p>
                                                <p><strong>UI Customization:</strong> In Settings → General, switch language, dark mode, and desktop notifications.</p>
                                                <p><strong>Desktop Notifications:</strong> When enabled, new articles will trigger browser notifications when the page is in the background.</p>
                                                <p><strong>Update Banner (v1.1):</strong> A blue banner appears at the top during refreshes. If new content arrives while you're on the page, click to expand; if in background, it auto-applies.</p>
                                                <p><strong>New Item Highlight (v1.1):</strong> After expanding new content, new items get a blue highlight animation that fades after 5 seconds.</p>
                                                <p><strong>Breaking News Markers:</strong> Articles with "Breaking", "Urgent", or similar keywords are highlighted in red.</p>
                                                <p><strong>Data Storage:</strong> All configuration and cache are stored in browser localStorage. Clearing browser data resets the app.</p>
                                            </>
                                        )}
                                    </ReadmeSection>

                                    {/* AI Agent Debug Notes */}
                                    <ReadmeSection title={uiLang === 'zh-CN' ? 'AI Agent 调试笔记' : 'AI Agent Debug Notes'}>
                                        {uiLang === 'zh-CN' ? (
                                            <>
                                                <p><strong>v1.1 Agent 笔记：</strong></p>
                                                <p>- 新增 UpdateBanner 组件，4种状态：hidden / updating / available / updated</p>
                                                <p>- fetchData 改为使用 parallelFetch 并发控制（FETCH_CONCURRENCY=6），替代 Promise.all</p>
                                                <p>- 超时从 15s 降至 12s (FETCH_TIMEOUT)</p>
                                                <p>- 初始加载不再检查 news.length === 0，始终触发 fetchData</p>
                                                <p>- 新增 newItemIds Set 跟踪新条目，用于高亮动画</p>
                                                <p>- 新增 desktop notification 增强：后台标签页获取到新内容时发送系统通知</p>
                                                <p>- Settings 新增 Readme 标签页，含 4 个可折叠小节</p>
                                                <p>- 版本号从 v1.0 升级至 v1.1，显示在 header 和 footer</p>
                                                <p>- localStorage keys: theme, ui_lang, news_feeds_config, news_cache_v3 (未变更)</p>
                                                <p>- 注意：Babel in-browser transpilation，async/await 和 for...of 均可使用</p>
                                                <p>- parallelFetch 使用 worker 模式而非 Promise.all，避免同时发出过多请求</p>
                                            </>
                                        ) : (
                                            <>
                                                <p><strong>v1.1 Agent Notes:</strong></p>
                                                <p>- Added UpdateBanner component with 4 states: hidden / updating / available / updated</p>
                                                <p>- fetchData now uses parallelFetch with concurrency control (FETCH_CONCURRENCY=6), replacing Promise.all</p>
                                                <p>- Timeout reduced from 15s to 12s (FETCH_TIMEOUT)</p>
                                                <p>- Initial load no longer checks news.length === 0, always triggers fetchData</p>
                                                <p>- Added newItemIds Set to track new items for highlight animation</p>
                                                <p>- Enhanced desktop notification: sends system notification when new content arrives in background tab</p>
                                                <p>- Settings now has a Readme tab with 4 collapsible subsections</p>
                                                <p>- Version bumped from v1.0 to v1.1, shown in header and footer</p>
                                                <p>- localStorage keys: theme, ui_lang, news_feeds_config, news_cache_v3 (unchanged)</p>
                                                <p>- Note: Babel in-browser transpilation; async/await and for...of are safe to use</p>
                                                <p>- parallelFetch uses worker pattern instead of Promise.all to avoid flooding requests</p>
                                            </>
                                        )}
                                    </ReadmeSection>

                                    {/* Changelog */}
                                    <ReadmeSection title={uiLang === 'zh-CN' ? '更新日志' : 'Changelog'}>
                                        {uiLang === 'zh-CN' ? (
                                            <>
                                                <p><strong>v1.0 (基线版本)</strong></p>
                                                <ul className="list-disc pl-4 space-y-1">
                                                    <li>全球 RSS 新闻聚合器，40+ 新闻源</li>
                                                    <li>双 CORS 代理回退系统</li>
                                                    <li>分类筛选、深色模式、双语界面</li>
                                                    <li>桌面通知（基础版，仅通知最新一条）</li>
                                                    <li>配置导入/导出</li>
                                                    <li>localStorage 缓存</li>
                                                </ul>
                                                <p className="mt-2"><strong>v1.1 (当前版本)</strong></p>
                                                <ul className="list-disc pl-4 space-y-1">
                                                    <li>新增更新横幅系统：刷新时顶部蓝色横幅显示状态</li>
                                                    <li>智能内容更新：前台需手动展开，后台自动应用并发送通知</li>
                                                    <li>并行抓取优化：并发数 6，替代全部同时请求</li>
                                                    <li>超时优化：15s → 12s</li>
                                                    <li>桌面通知增强：后台更新时发送包含数量的系统通知</li>
                                                    <li>新条目高亮：展开更新后新条目蓝色高亮 5 秒</li>
                                                    <li>设置新增说明(Readme)标签页，含产品用途、使用指南、调试笔记、更新日志</li>
                                                    <li>版本号显示在 header 和 footer</li>
                                                    <li>页面加载始终触发抓取，不再仅依赖缓存为空</li>
                                                </ul>
                                            </>
                                        ) : (
                                            <>
                                                <p><strong>v1.0 (Baseline)</strong></p>
                                                <ul className="list-disc pl-4 space-y-1">
                                                    <li>Global RSS news aggregator with 40+ sources</li>
                                                    <li>Dual CORS proxy fallback system</li>
                                                    <li>Category filtering, dark mode, bilingual UI</li>
                                                    <li>Desktop notifications (basic, single latest item)</li>
                                                    <li>Config import/export</li>
                                                    <li>localStorage caching</li>
                                                </ul>
                                                <p className="mt-2"><strong>v1.1 (Current)</strong></p>
                                                <ul className="list-disc pl-4 space-y-1">
                                                    <li>New update banner system: blue banner at top during refreshes</li>
                                                    <li>Smart content updates: manual expand in foreground, auto-apply + notification in background</li>
                                                    <li>Parallel fetch optimization: concurrency of 6, replacing all-at-once requests</li>
                                                    <li>Timeout optimization: 15s → 12s</li>
                                                    <li>Enhanced desktop notifications: system notification with count when updates arrive in background</li>
                                                    <li>New item highlight: blue highlight animation for 5s after expanding updates</li>
                                                    <li>Settings Readme tab with product purpose, usage guide, debug notes, changelog</li>
                                                    <li>Version number displayed in header and footer</li>
                                                    <li>Always fetch on page load, not only when cache is empty</li>
                                                </ul>
                                            </>
                                        )}
                                    </ReadmeSection>
                                </div>
                            )}

                        </div>
                    </div>
                </div>
            );
        };

        const App = () => {
            const [feeds, setFeeds] = useState([]);
            const [news, setNews] = useState([]);
            const [theme, setTheme] = useState('light');
            const [uiLang, setUiLang] = useState('zh-CN');
            const [notifications, setNotifications] = useState(false);
            const [status, setStatus] = useState('idle');
            const [lastUpdated, setLastUpdated] = useState(Date.now());
            const [retryCount, setRetryCount] = useState(0);
            const [isSettingsOpen, setIsSettingsOpen] = useState(false);
            const [fetchStats, setFetchStats] = useState({ total: 0, success: 0 });
            
            // v1.1: Category filter
            const [activeCategory, setActiveCategory] = useState('ALL');
            
            // v1.1: Banner state
            const [bannerState, setBannerState] = useState('hidden'); // 'hidden' | 'updating' | 'available' | 'updated'
            const [updateCount, setUpdateCount] = useState(0);
            
            // v1.1: New item tracking for highlight
            const [newItemIds, setNewItemIds] = useState(new Set());
            const bannerDismissTimerRef = useRef(null);
            
            const prevFeedsStrRef = useRef('');
            const initialFetchDoneRef = useRef(false);

            // Computed categories from current feeds
            const categories = useMemo(() => {
                const cats = new Set(feeds.filter(f => f.enabled).map(f => f.category || 'General'));
                return Array.from(cats).sort();
            }, [feeds]);

            // Filtered news based on active category
            const filteredNews = useMemo(() => {
                if (activeCategory === 'ALL') return news;
                return news.filter(item => item.category === activeCategory);
            }, [news, activeCategory]);

            // Initialize System
            useEffect(() => {
                const systemDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
                const savedTheme = localStorage.getItem('theme');
                setTheme(savedTheme || (systemDark ? 'dark' : 'light'));

                const savedLang = localStorage.getItem('ui_lang');
                if (savedLang) setUiLang(savedLang);

                if (Notification.permission === 'granted') setNotifications(true);

                // Load Feeds Config
                const savedFeeds = localStorage.getItem('news_feeds_config');
                const defaultFeeds = getLazyDefaultFeeds();

                if (savedFeeds) {
                    try {
                        const parsed = JSON.parse(savedFeeds);
                        if (parsed.length < 15) { 
                            setFeeds(defaultFeeds); 
                        } else {
                            setFeeds(parsed);
                        }
                    } catch(e) {
                        setFeeds(defaultFeeds);
                    }
                } else {
                    setFeeds(defaultFeeds);
                }

                // Load News Cache
                const cached = localStorage.getItem('news_cache_v3');
                if (cached) {
                    try {
                        setNews(JSON.parse(cached));
                    } catch(e) { console.error("Cache error"); }
                }
            }, []);

            // v1.1: Always fetch on page load (not just when news.length === 0)
            useEffect(() => {
                if (feeds.length > 0 && !initialFetchDoneRef.current) {
                    initialFetchDoneRef.current = true;
                    fetchData();
                }
                
                const timer = setInterval(fetchData, UPDATE_INTERVAL);
                return () => clearInterval(timer);
            }, [feeds, notifications]); 

            // Save feeds when changed
            useEffect(() => {
                if (feeds.length > 0) {
                    localStorage.setItem('news_feeds_config', JSON.stringify(feeds));
                }
            }, [feeds]);

            // Save UI Lang
            useEffect(() => {
                localStorage.setItem('ui_lang', uiLang);
            }, [uiLang]);

            // Theme Management
            useEffect(() => {
                if (theme === 'dark') document.documentElement.classList.add('dark');
                else document.documentElement.classList.remove('dark');
                localStorage.setItem('theme', theme);
            }, [theme]);

            // Icon Refresh
            useEffect(() => {
                if (window.lucide) window.lucide.createIcons();
            }, [news, theme, status, isSettingsOpen, feeds, bannerState]);

            // v1.1: Clear highlight after 5 seconds
            useEffect(() => {
                if (newItemIds.size > 0) {
                    const timer = setTimeout(() => {
                        setNewItemIds(new Set());
                    }, 5500); // Slightly longer than animation to ensure it completes
                    return () => clearTimeout(timer);
                }
            }, [newItemIds]);

            // v1.1: Handle page visibility changes
            useEffect(() => {
                const handleVisibilityChange = () => {
                    // When page becomes visible and there are pending items already applied in background,
                    // the banner should be hidden since updates were already merged.
                    // If banner was "available" and user left and came back, keep it as is.
                };
                document.addEventListener('visibilitychange', handleVisibilityChange);
                return () => document.removeEventListener('visibilitychange', handleVisibilityChange);
            }, []);

            // v1.1: Enhanced notification sender
            const sendNotification = useCallback((count) => {
                if (!notifications || document.visibilityState === 'visible' || count === 0) return;
                const strings = STRINGS[uiLang];
                try {
                    new Notification(strings.notif_new_updates_title, {
                        body: strings.notif_new_updates_body.replace('{count}', count),
                        icon: 'https://cdn-icons-png.flaticon.com/512/2965/2965879.png'
                    });
                } catch(e) {
                    console.warn('Notification failed:', e);
                }
            }, [notifications, uiLang]);

            // v1.1: Handle banner expand
            const handleBannerExpand = useCallback(() => {
                setBannerState('updated');
                // Auto-hide the "updated" banner after 2 seconds
                if (bannerDismissTimerRef.current) clearTimeout(bannerDismissTimerRef.current);
                bannerDismissTimerRef.current = setTimeout(() => {
                    setBannerState('hidden');
                }, 2000);
            }, []);

            // Main Fetch Logic - v1.1: Uses parallelFetch with concurrency control
            const fetchData = async () => {
                if (feeds.length === 0) return;

                setStatus('fetching');
                setBannerState('updating'); // v1.1: Show updating banner

                const activeFeeds = feeds.filter(f => f.enabled !== false);

                try {
                    const { results: allItems, successCount } = await parallelFetch(activeFeeds, FETCH_CONCURRENCY);
                    
                    setFetchStats({ total: activeFeeds.length, success: successCount });

                    if (allItems.length > 0) {
                        setNews(prevNews => {
                            const currentIds = new Set(prevNews.map(n => n.id));
                            const newUniqueItems = allItems.filter(item => !currentIds.has(item.id));
                            
                            if (newUniqueItems.length > 0) {
                                const combined = [...newUniqueItems, ...prevNews]
                                    .sort((a, b) => b.timestamp - a.timestamp)
                                    .slice(0, MAX_ITEMS);
                                
                                localStorage.setItem('news_cache_v3', JSON.stringify(combined));

                                // v1.1: Smart banner behavior based on tab visibility
                                const isVisible = document.visibilityState === 'visible';
                                if (isVisible) {
                                    // User is viewing the page - show "available" banner
                                    setUpdateCount(newUniqueItems.length);
                                    setBannerState('available');
                                    // Track new item IDs for highlight
                                    const newIds = new Set(newUniqueItems.map(item => item.id));
                                    setNewItemIds(newIds);
                                } else {
                                    // User is NOT viewing the page - auto-apply and send notification
                                    setBannerState('hidden');
                                    sendNotification(newUniqueItems.length);
                                }

                                return combined;
                            }
                            // No new items
                            setBannerState('hidden');
                            return prevNews;
                        });
                        setLastUpdated(Date.now());
                        setStatus('idle');
                        setRetryCount(0);
                    } else {
                        setStatus('idle');
                        setBannerState('hidden');
                        if (news.length === 0 && successCount === 0 && retryCount < 2) {
                             setStatus('error');
                        }
                    }

                } catch (error) {
                    console.error("Fetch Cycle Error:", error);
                    setStatus('error');
                    setBannerState('hidden');
                }
            };
            
            const toggleNotifications = async () => {
                if (!notifications) {
                    const permission = await Notification.requestPermission();
                    if (permission === 'granted') setNotifications(true);
                } else {
                    setNotifications(false);
                }
            };
            
            const toggleTheme = () => {
                setTheme(prev => prev === 'dark' ? 'light' : 'dark');
            };

            const handleOpenSettings = () => {
                prevFeedsStrRef.current = JSON.stringify(feeds);
                setIsSettingsOpen(true);
            };

            const handleCloseSettings = () => {
                setIsSettingsOpen(false);
                const currentFeedsStr = JSON.stringify(feeds);
                if (prevFeedsStrRef.current !== currentFeedsStr) {
                    setNews([]); 
                    localStorage.removeItem('news_cache_v3');
                    setStatus('idle');
                    setActiveCategory('ALL');
                    setNewItemIds(new Set());
                    setTimeout(() => fetchData(), 50);
                }
            };

            const handleManualRefresh = () => {
                fetchData();
            };

            const hasError = status === 'error' || (status === 'idle' && fetchStats.total > 0 && fetchStats.success === 0);

            return (
                <div className="min-h-screen flex flex-col max-w-4xl mx-auto border-x border-gray-200 dark:border-slate-800 bg-white dark:bg-slate-900 shadow-2xl transition-colors duration-300">
                    {/* v1.1: Update Banner */}
                    <UpdateBanner 
                        bannerState={bannerState}
                        updateCount={updateCount}
                        onExpand={handleBannerExpand}
                        uiStrings={STRINGS[uiLang]}
                    />

                    <Header 
                        status={status}
                        onOpenSettings={handleOpenSettings}
                        onRefresh={handleManualRefresh}
                        uiStrings={STRINGS[uiLang]}
                        hasError={hasError}
                    />

                    {/* Category Filter Bar */}
                    <FilterBar 
                        categories={categories}
                        activeCategory={activeCategory}
                        onSelectCategory={setActiveCategory}
                        uiStrings={STRINGS[uiLang]}
                    />

                    <main className="flex-1 relative p-4 sm:p-6 overflow-x-hidden">
                        <div className="timeline-line"></div>

                        {filteredNews.length === 0 && status !== 'fetching' && (
                            <div className="pl-10 pt-10 text-gray-400">
                                <p>{hasError ? STRINGS[uiLang].error_fetch : STRINGS[uiLang].no_items}</p>
                            </div>
                        )}

                        <div className="space-y-0">
                            {filteredNews.map((item) => (
                                <NewsCard 
                                    key={item.id} 
                                    item={item} 
                                    isNew={newItemIds.has(item.id)} 
                                />
                            ))}
                        </div>

                        <div className="relative pl-8 py-12 text-center opacity-60 hover:opacity-100 transition-opacity">
                            <div className="absolute left-[1.25rem] -translate-x-1/2 w-2 h-2 bg-gray-300 dark:bg-slate-700 rounded-full top-1/2"></div>
                            <div className="flex flex-col items-center gap-1">
                                <button 
                                    onClick={handleManualRefresh}
                                    className={`text-xs font-mono transition-colors ${hasError ? 'text-red-500 font-bold' : 'text-gray-400 hover:text-blue-500'}`}
                                >
                                    {status === 'fetching' ? STRINGS[uiLang].updating : 
                                     hasError ? STRINGS[uiLang].error_fetch : 
                                     `${STRINGS[uiLang].last_updated} ${formatTime(lastUpdated)}`}
                                </button>
                                {fetchStats.total > 0 && (
                                    <span className={`text-[10px] font-mono ${fetchStats.success < fetchStats.total ? 'text-yellow-600 dark:text-yellow-500' : 'text-gray-300 dark:text-slate-700'}`}>
                                        {STRINGS[uiLang].success_rate} {fetchStats.success}/{fetchStats.total}
                                    </span>
                                )}
                                <p className="text-[10px] text-gray-300 dark:text-slate-700 mt-1">
                                    {STRINGS[uiLang].sources_via} Global RSS Feeds (Proxy)
                                </p>
                                <p className="text-[10px] text-gray-300 dark:text-slate-700">
                                    Global Wire {APP_VERSION}
                                </p>
                            </div>
                        </div>
                    </main>

                    <SettingsModal 
                        isOpen={isSettingsOpen} 
                        onClose={handleCloseSettings}
                        feeds={feeds}
                        setFeeds={setFeeds}
                        uiLang={uiLang}
                        setUiLang={setUiLang}
                        theme={theme}
                        toggleTheme={toggleTheme}
                        notifications={notifications}
                        toggleNotifications={toggleNotifications}
                    />
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body></html>
