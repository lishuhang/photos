<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=450">
<title>爱优腾哔招聘解读 - AI岗位分析</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4/dist/chart.umd.min.js"></script>
<style>
@font-face { font-family:'AlibabaPuHuiTi'; src:url('./fonts/AlibabaPuHuiTi-3-35-Thin.woff') format('woff'); font-weight:100; }
@font-face { font-family:'AlibabaPuHuiTi'; src:url('./fonts/AlibabaPuHuiTi-3-55-Regular.woff') format('woff'); font-weight:400; }
@font-face { font-family:'AlibabaPuHuiTi'; src:url('./fonts/AlibabaPuHuiTi-3-65-Medium.woff') format('woff'); font-weight:500; }
@font-face { font-family:'AlibabaPuHuiTi'; src:url('./fonts/AlibabaPuHuiTi-3-85-Bold.woff') format('woff'); font-weight:700; }
@font-face { font-family:'AlibabaPuHuiTi'; src:url('./fonts/AlibabaPuHuiTi-3-115-Black.woff') format('woff'); font-weight:900; }

* { margin:0; padding:0; box-sizing:border-box; }

body {
  background: #000;
  display: flex;
  justify-content: center;
  align-items: center;
  min-height: 100vh;
  font-family: 'AlibabaPuHuiTi', sans-serif;
}

.phone {
  width: 450px;
  height: 800px;
  background: #0a0e27;
  position: relative;
  overflow: hidden;
}

.scene {
  position: absolute;
  inset: 0;
  display: flex;
  flex-direction: column;
  opacity: 0;
  transition: opacity 0.8s ease;
  pointer-events: none;
}
.scene.active {
  opacity: 1;
  pointer-events: auto;
}

.scene-header {
  padding: 28px 24px 8px;
  text-align: center;
}

.scene-title {
  font-size: 22px;
  font-weight: 700;
  color: #fff;
  letter-spacing: 1px;
}

.scene-subtitle {
  font-size: 12px;
  color: rgba(255,255,255,0.45);
  margin-top: 4px;
}

.chart-wrap {
  flex: 1;
  display: flex;
  justify-content: center;
  align-items: center;
  padding: 0 16px;
  position: relative;
}

.chart-wrap canvas {
  max-width: 100%;
  max-height: 100%;
}

/* Progress bar */
.progress-bar {
  position: absolute;
  bottom: 0;
  left: 0;
  height: 3px;
  background: linear-gradient(90deg, #00D4AA, #FF6B6B, #FFA940, #7B68EE);
  transition: width 0.3s linear;
  border-radius: 0 2px 2px 0;
  z-index: 30;
}

/* Scene indicator */
.scene-indicator {
  position: absolute;
  top: 12px;
  right: 16px;
  font-size: 11px;
  color: rgba(255,255,255,0.35);
  font-weight: 500;
}

/* Final frame styles */
.final-frame {
  position: absolute;
  inset: 0;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  opacity: 0;
  transition: opacity 1s ease;
  pointer-events: none;
  z-index: 20;
  background: #0a0e27;
}
.final-frame.active {
  opacity: 1;
  pointer-events: auto;
}

.floating-circle {
  position: absolute;
  border-radius: 50%;
  opacity: 0.12;
  animation: floatUp linear infinite;
}

@keyframes floatUp {
  0% { transform: translateY(0) scale(1); opacity: 0.12; }
  50% { opacity: 0.18; }
  100% { transform: translateY(-800px) scale(0.5); opacity: 0; }
}

.final-title {
  font-size: 28px;
  font-weight: 900;
  color: #fff;
  letter-spacing: 4px;
  z-index: 1;
}

.final-pct {
  font-size: 96px;
  font-weight: 900;
  background: linear-gradient(135deg, #00D4AA, #FF6B6B);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  z-index: 1;
  margin: 16px 0 8px;
}

.final-desc {
  font-size: 16px;
  color: rgba(255,255,255,0.5);
  font-weight: 400;
  z-index: 1;
}

.final-sub {
  font-size: 13px;
  color: rgba(255,255,255,0.3);
  margin-top: 24px;
  z-index: 1;
}
</style>
</head>
<body>

<div class="phone" id="phone">

  <!-- Scene 1: Bar chart -->
  <div class="scene" id="scene1">
    <div class="scene-indicator">1 / 6</div>
    <div class="scene-header">
      <div class="scene-title">各渠道AI岗位占比</div>
      <div class="scene-subtitle">柱状图 · 社招 / 校招 / 实习</div>
    </div>
    <div class="chart-wrap">
      <canvas id="chart1"></canvas>
    </div>
  </div>

  <!-- Scene 2: Doughnut chart -->
  <div class="scene" id="scene2">
    <div class="scene-indicator">2 / 6</div>
    <div class="scene-header">
      <div class="scene-title">AI岗位总占比</div>
      <div class="scene-subtitle">环形图 · AI vs 非AI</div>
    </div>
    <div class="chart-wrap">
      <canvas id="chart2"></canvas>
    </div>
  </div>

  <!-- Scene 3: Line chart -->
  <div class="scene" id="scene3">
    <div class="scene-indicator">3 / 6</div>
    <div class="scene-header">
      <div class="scene-title">爱奇艺AI岗位占比变化</div>
      <div class="scene-subtitle">折线图 · 9.4% → 37.6%</div>
    </div>
    <div class="chart-wrap">
      <canvas id="chart3"></canvas>
    </div>
  </div>

  <!-- Scene 4: Radar chart -->
  <div class="scene" id="scene4">
    <div class="scene-indicator">4 / 6</div>
    <div class="scene-header">
      <div class="scene-title">四平台AI战略维度</div>
      <div class="scene-subtitle">雷达图 · 多维对比</div>
    </div>
    <div class="chart-wrap">
      <canvas id="chart4"></canvas>
    </div>
  </div>

  <!-- Scene 5: Grouped bar chart -->
  <div class="scene" id="scene5">
    <div class="scene-indicator">5 / 6</div>
    <div class="scene-header">
      <div class="scene-title">各公司AI岗位类型分布</div>
      <div class="scene-subtitle">分组柱状图 · 五大类型</div>
    </div>
    <div class="chart-wrap">
      <canvas id="chart5"></canvas>
    </div>
  </div>

  <!-- Scene 6: Bubble chart -->
  <div class="scene" id="scene6">
    <div class="scene-indicator">6 / 6</div>
    <div class="scene-header">
      <div class="scene-title">平台战略定位</div>
      <div class="scene-subtitle">气泡图 · 技术研发 vs 商业化</div>
    </div>
    <div class="chart-wrap">
      <canvas id="chart6"></canvas>
    </div>
  </div>

  <!-- Final Frame -->
  <div class="final-frame" id="finalFrame">
    <div id="floatingCircles"></div>
    <div class="final-title">爱优腾哔招聘解读</div>
    <div class="final-pct" id="finalPct">0%</div>
    <div class="final-desc">AI岗位综合占比</div>
    <div class="final-sub">数据来源：2025年公开招聘信息</div>
  </div>

  <!-- Progress bar -->
  <div class="progress-bar" id="progressBar" style="width:0%"></div>
</div>

<script>
// ============ DATA ============
const DATA = {
  hiring: { cats:['社招','校招','实习'], total:[635,525,713], ai:[167,188,113], aiPct:[26.3,35.8,15.9], totalAi:468, totalAll:1873 },
  radar: { dims:['技术研发','商业化','社区生态','内容实战','出海能力','人才培养'], tencent:[9,4,3,6,2,8], iqiyi:[5,9,2,5,8,5], bilibili:[6,4,9,4,5,7], youku:[4,5,3,9,3,6] },
  iqiyi: { period:['2025暑期','2026春季'], pct:[9.4,37.6] },
  jobs: { types:['模型/算法','内容创作','产品/运营','销售/商务','设计/美术'], tencent:[8,5,3,1,2], iqiyi:[3,4,5,6,2], bilibili:[5,3,6,1,1], youku:[2,7,3,1,6] }
};

const COLORS = {
  tencent: '#00D4AA',
  iqiyi: '#FF6B6B',
  bilibili: '#FFA940',
  youku: '#7B68EE'
};

// ============ CHART.JS DEFAULTS ============
Chart.defaults.font.family = "'AlibabaPuHuiTi', sans-serif";
Chart.defaults.color = 'rgba(255,255,255,0.7)';

let currentChart = null;
let currentScene = 0;
const SCENE_DURATION = 5000;
const TOTAL_SCENES = 6;

// ============ UTILITY ============
function destroyChart() {
  if (currentChart) {
    currentChart.destroy();
    currentChart = null;
  }
}

function showScene(n) {
  document.querySelectorAll('.scene').forEach((s, i) => {
    s.classList.toggle('active', i === n);
  });
}

function updateProgress(n) {
  const pct = ((n + 1) / TOTAL_SCENES) * 100;
  document.getElementById('progressBar').style.width = pct + '%';
}

// ============ SCENE 1: Bar Chart - 各渠道AI岗位占比 ============
function createScene1() {
  destroyChart();
  const ctx = document.getElementById('chart1').getContext('2d');

  currentChart = new Chart(ctx, {
    type: 'bar',
    data: {
      labels: DATA.hiring.cats,
      datasets: [{
        label: 'AI岗位占比 (%)',
        data: DATA.hiring.aiPct,
        backgroundColor: [
          'rgba(0,212,170,0.75)',
          'rgba(255,107,107,0.75)',
          'rgba(255,169,64,0.75)'
        ],
        borderColor: [
          '#00D4AA',
          '#FF6B6B',
          '#FFA940'
        ],
        borderWidth: 2,
        borderRadius: 8,
        barPercentage: 0.55
      }]
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      animation: {
        duration: 1500,
        delay: (ctx) => ctx.dataIndex * 400,
        easing: 'easeOutQuart'
      },
      plugins: {
        legend: { display: false },
        tooltip: {
          backgroundColor: 'rgba(10,14,39,0.92)',
          borderColor: 'rgba(255,255,255,0.1)',
          borderWidth: 1,
          titleFont: { family: "'AlibabaPuHuiTi'" },
          bodyFont: { family: "'AlibabaPuHuiTi'" },
          callbacks: {
            label: (ctx) => 'AI占比: ' + ctx.parsed.y + '%'
          }
        }
      },
      scales: {
        x: {
          grid: { display: false },
          ticks: { font: { size: 14, weight: 500 }, color: 'rgba(255,255,255,0.65)' }
        },
        y: {
          beginAtZero: true,
          max: 45,
          grid: { color: 'rgba(255,255,255,0.06)' },
          ticks: {
            callback: function(v) { return v + '%'; },
            font: { size: 11 },
            color: 'rgba(255,255,255,0.4)'
          }
        }
      }
    },
    plugins: [{
      id: 'barLabels',
      afterDraw: function(chart) {
        var c = chart.ctx;
        var data = chart.data;
        var xScale = chart.scales.x;
        var yScale = chart.scales.y;
        data.datasets[0].data.forEach(function(val, i) {
          var xPos = xScale.getPixelForValue(i);
          var yPos = yScale.getPixelForValue(val);
          c.save();
          c.font = "bold 16px 'AlibabaPuHuiTi'";
          c.fillStyle = '#fff';
          c.textAlign = 'center';
          c.fillText(val + '%', xPos, yPos - 12);
          c.restore();
        });
      }
    }]
  });
}

// ============ SCENE 2: Doughnut Chart - AI岗位总占比 ============
function createScene2() {
  destroyChart();
  const ctx = document.getElementById('chart2').getContext('2d');

  currentChart = new Chart(ctx, {
    type: 'doughnut',
    data: {
      labels: ['AI岗位', '非AI岗位'],
      datasets: [{
        data: [DATA.hiring.totalAi, DATA.hiring.totalAll - DATA.hiring.totalAi],
        backgroundColor: [
          'rgba(0,212,170,0.85)',
          'rgba(255,255,255,0.08)'
        ],
        borderColor: [
          '#00D4AA',
          'rgba(255,255,255,0.15)'
        ],
        borderWidth: 2,
        hoverOffset: 12
      }]
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      cutout: '68%',
      animation: {
        animateRotate: true,
        animateScale: true,
        duration: 1800,
        easing: 'easeOutQuart'
      },
      plugins: {
        legend: {
          position: 'bottom',
          labels: {
            font: { size: 13, weight: 500, family: "'AlibabaPuHuiTi'" },
            color: 'rgba(255,255,255,0.6)',
            padding: 20,
            usePointStyle: true,
            pointStyleWidth: 12
          }
        },
        tooltip: {
          backgroundColor: 'rgba(10,14,39,0.92)',
          borderColor: 'rgba(255,255,255,0.1)',
          borderWidth: 1,
          titleFont: { family: "'AlibabaPuHuiTi'" },
          bodyFont: { family: "'AlibabaPuHuiTi'" },
          callbacks: {
            label: function(ctx) { return ctx.label + ': ' + ctx.parsed + ' 个岗位'; }
          }
        }
      }
    },
    plugins: [{
      id: 'doughnutCenter',
      afterDraw: function(chart) {
        var c = chart.ctx;
        var area = chart.chartArea;
        var cx = area.left + area.width / 2;
        var cy = area.top + area.height / 2;
        c.save();
        c.font = "900 48px 'AlibabaPuHuiTi'";
        c.fillStyle = '#fff';
        c.textAlign = 'center';
        c.textBaseline = 'middle';
        c.fillText('25%', cx, cy - 8);
        c.font = "400 13px 'AlibabaPuHuiTi'";
        c.fillStyle = 'rgba(255,255,255,0.45)';
        c.fillText('AI岗位占比', cx, cy + 24);
        c.restore();
      }
    }]
  });
}

// ============ SCENE 3: Line Chart - 爱奇艺AI岗位占比变化 ============
function createScene3() {
  destroyChart();
  const ctx = document.getElementById('chart3').getContext('2d');

  var gradient = ctx.createLinearGradient(0, 0, 0, 450);
  gradient.addColorStop(0, 'rgba(255,107,107,0.35)');
  gradient.addColorStop(1, 'rgba(255,107,107,0.02)');

  currentChart = new Chart(ctx, {
    type: 'line',
    data: {
      labels: DATA.iqiyi.period,
      datasets: [{
        label: '爱奇艺AI岗位占比',
        data: DATA.iqiyi.pct,
        borderColor: '#FF6B6B',
        backgroundColor: gradient,
        fill: true,
        tension: 0.4,
        pointRadius: 8,
        pointBackgroundColor: '#FF6B6B',
        pointBorderColor: '#fff',
        pointBorderWidth: 3,
        pointHoverRadius: 12,
        borderWidth: 3
      }]
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      animation: {
        duration: 2000,
        easing: 'easeOutQuart'
      },
      plugins: {
        legend: { display: false },
        tooltip: {
          backgroundColor: 'rgba(10,14,39,0.92)',
          borderColor: 'rgba(255,255,255,0.1)',
          borderWidth: 1,
          titleFont: { family: "'AlibabaPuHuiTi'" },
          bodyFont: { family: "'AlibabaPuHuiTi'" },
          callbacks: {
            label: function(ctx) { return 'AI占比: ' + ctx.parsed.y + '%'; }
          }
        }
      },
      scales: {
        x: {
          grid: { display: false },
          ticks: { font: { size: 14, weight: 500 }, color: 'rgba(255,255,255,0.65)' }
        },
        y: {
          beginAtZero: true,
          max: 50,
          grid: { color: 'rgba(255,255,255,0.06)' },
          ticks: {
            callback: function(v) { return v + '%'; },
            font: { size: 11 },
            color: 'rgba(255,255,255,0.4)'
          }
        }
      }
    },
    plugins: [{
      id: 'lineHighlight',
      afterDraw: function(chart) {
        var c = chart.ctx;
        var xScale = chart.scales.x;
        var yScale = chart.scales.y;
        var data = chart.data.datasets[0].data;
        var lastIdx = data.length - 1;
        var xEnd = xScale.getPixelForValue(lastIdx);
        var yEnd = yScale.getPixelForValue(data[lastIdx]);

        c.save();
        c.font = "bold 14px 'AlibabaPuHuiTi'";
        var text = '+28.2%';
        var tw = c.measureText(text).width;
        var bx = xEnd - tw / 2 - 10;
        var by = yEnd - 42;

        c.fillStyle = 'rgba(255,107,107,0.18)';
        c.beginPath();
        c.roundRect(bx, by, tw + 20, 26, 13);
        c.fill();

        c.fillStyle = '#FF6B6B';
        c.textAlign = 'center';
        c.textBaseline = 'middle';
        c.fillText(text, xEnd, by + 13);
        c.restore();
      }
    }]
  });
}

// ============ SCENE 4: Radar Chart - 四平台AI战略维度 ============
function createScene4() {
  destroyChart();
  const ctx = document.getElementById('chart4').getContext('2d');

  function hexToRgba(hex, alpha) {
    var r = parseInt(hex.slice(1,3), 16);
    var g = parseInt(hex.slice(3,5), 16);
    var b = parseInt(hex.slice(5,7), 16);
    return 'rgba(' + r + ',' + g + ',' + b + ',' + alpha + ')';
  }

  function makeDataset(label, data, color) {
    return {
      label: label,
      data: data,
      borderColor: color,
      backgroundColor: hexToRgba(color, 0.12),
      pointBackgroundColor: color,
      pointBorderColor: '#fff',
      pointBorderWidth: 1,
      pointRadius: 4,
      pointHoverRadius: 7,
      borderWidth: 2
    };
  }

  currentChart = new Chart(ctx, {
    type: 'radar',
    data: {
      labels: DATA.radar.dims,
      datasets: [
        makeDataset('腾讯', DATA.radar.tencent, COLORS.tencent),
        makeDataset('爱奇艺', DATA.radar.iqiyi, COLORS.iqiyi),
        makeDataset('B站', DATA.radar.bilibili, COLORS.bilibili),
        makeDataset('优酷', DATA.radar.youku, COLORS.youku)
      ]
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      animation: {
        duration: 1600,
        easing: 'easeOutQuart'
      },
      plugins: {
        legend: {
          position: 'bottom',
          labels: {
            font: { size: 12, weight: 500, family: "'AlibabaPuHuiTi'" },
            color: 'rgba(255,255,255,0.6)',
            padding: 14,
            usePointStyle: true,
            pointStyleWidth: 10
          }
        },
        tooltip: {
          backgroundColor: 'rgba(10,14,39,0.92)',
          borderColor: 'rgba(255,255,255,0.1)',
          borderWidth: 1,
          titleFont: { family: "'AlibabaPuHuiTi'" },
          bodyFont: { family: "'AlibabaPuHuiTi'" }
        }
      },
      scales: {
        r: {
          beginAtZero: true,
          max: 10,
          ticks: {
            stepSize: 2,
            display: false
          },
          grid: {
            color: 'rgba(255,255,255,0.08)'
          },
          angleLines: {
            color: 'rgba(255,255,255,0.08)'
          },
          pointLabels: {
            font: { size: 11, weight: 500, family: "'AlibabaPuHuiTi'" },
            color: 'rgba(255,255,255,0.55)'
          }
        }
      }
    }
  });
}

// ============ SCENE 5: Grouped Bar Chart - 各公司AI岗位类型分布 ============
function createScene5() {
  destroyChart();
  const ctx = document.getElementById('chart5').getContext('2d');

  function hexToRgba(hex, alpha) {
    var r = parseInt(hex.slice(1,3), 16);
    var g = parseInt(hex.slice(3,5), 16);
    var b = parseInt(hex.slice(5,7), 16);
    return 'rgba(' + r + ',' + g + ',' + b + ',' + alpha + ')';
  }

  var companies = [
    { label: '腾讯', data: DATA.jobs.tencent, color: COLORS.tencent },
    { label: '爱奇艺', data: DATA.jobs.iqiyi, color: COLORS.iqiyi },
    { label: 'B站', data: DATA.jobs.bilibili, color: COLORS.bilibili },
    { label: '优酷', data: DATA.jobs.youku, color: COLORS.youku }
  ];

  var datasets = companies.map(function(d) {
    return {
      label: d.label,
      data: d.data,
      backgroundColor: hexToRgba(d.color, 0.7),
      borderColor: d.color,
      borderWidth: 1.5,
      borderRadius: 4,
      barPercentage: 0.82,
      categoryPercentage: 0.72
    };
  });

  currentChart = new Chart(ctx, {
    type: 'bar',
    data: {
      labels: DATA.jobs.types,
      datasets: datasets
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      animation: {
        duration: 1400,
        delay: function(ctx) { return ctx.datasetIndex * 200 + ctx.dataIndex * 80; },
        easing: 'easeOutQuart'
      },
      plugins: {
        legend: {
          position: 'bottom',
          labels: {
            font: { size: 11, weight: 500, family: "'AlibabaPuHuiTi'" },
            color: 'rgba(255,255,255,0.55)',
            padding: 10,
            usePointStyle: true,
            pointStyleWidth: 10
          }
        },
        tooltip: {
          backgroundColor: 'rgba(10,14,39,0.92)',
          borderColor: 'rgba(255,255,255,0.1)',
          borderWidth: 1,
          titleFont: { family: "'AlibabaPuHuiTi'" },
          bodyFont: { family: "'AlibabaPuHuiTi'" }
        }
      },
      scales: {
        x: {
          grid: { display: false },
          ticks: { font: { size: 10, weight: 400 }, color: 'rgba(255,255,255,0.5)', maxRotation: 25 }
        },
        y: {
          beginAtZero: true,
          grid: { color: 'rgba(255,255,255,0.06)' },
          ticks: {
            stepSize: 2,
            font: { size: 10 },
            color: 'rgba(255,255,255,0.35)'
          }
        }
      }
    }
  });
}

// ============ SCENE 6: Bubble Chart - 平台战略定位 ============
function createScene6() {
  destroyChart();
  const ctx = document.getElementById('chart6').getContext('2d');

  function hexToRgba(hex, alpha) {
    var r = parseInt(hex.slice(1,3), 16);
    var g = parseInt(hex.slice(3,5), 16);
    var b = parseInt(hex.slice(5,7), 16);
    return 'rgba(' + r + ',' + g + ',' + b + ',' + alpha + ')';
  }

  var companyData = [
    { label: '腾讯', x: DATA.radar.tencent[0], y: DATA.radar.tencent[1], r: 18, color: COLORS.tencent },
    { label: '爱奇艺', x: DATA.radar.iqiyi[0], y: DATA.radar.iqiyi[1], r: 14, color: COLORS.iqiyi },
    { label: 'B站', x: DATA.radar.bilibili[0], y: DATA.radar.bilibili[1], r: 12, color: COLORS.bilibili },
    { label: '优酷', x: DATA.radar.youku[0], y: DATA.radar.youku[1], r: 10, color: COLORS.youku }
  ];

  var bubbleDatasets = companyData.map(function(d) {
    return {
      label: d.label,
      data: [{ x: d.x, y: d.y, r: d.r }],
      backgroundColor: hexToRgba(d.color, 0.55),
      borderColor: d.color,
      borderWidth: 2,
      hoverBackgroundColor: hexToRgba(d.color, 0.75)
    };
  });

  currentChart = new Chart(ctx, {
    type: 'bubble',
    data: {
      datasets: bubbleDatasets
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      animation: {
        duration: 1800,
        easing: 'easeOutQuart'
      },
      plugins: {
        legend: {
          position: 'bottom',
          labels: {
            font: { size: 12, weight: 500, family: "'AlibabaPuHuiTi'" },
            color: 'rgba(255,255,255,0.6)',
            padding: 14,
            usePointStyle: true,
            pointStyleWidth: 10
          }
        },
        tooltip: {
          backgroundColor: 'rgba(10,14,39,0.92)',
          borderColor: 'rgba(255,255,255,0.1)',
          borderWidth: 1,
          titleFont: { family: "'AlibabaPuHuiTi'" },
          bodyFont: { family: "'AlibabaPuHuiTi'" },
          callbacks: {
            label: function(ctx) {
              var d = ctx.raw;
              return ctx.dataset.label + ': 技术' + d.x + ' / 商业化' + d.y;
            }
          }
        }
      },
      scales: {
        x: {
          title: {
            display: true,
            text: '技术研发',
            font: { size: 13, weight: 500, family: "'AlibabaPuHuiTi'" },
            color: 'rgba(255,255,255,0.5)'
          },
          min: 0,
          max: 11,
          grid: { color: 'rgba(255,255,255,0.06)' },
          ticks: { stepSize: 2, font: { size: 10 }, color: 'rgba(255,255,255,0.35)' }
        },
        y: {
          title: {
            display: true,
            text: '商业化',
            font: { size: 13, weight: 500, family: "'AlibabaPuHuiTi'" },
            color: 'rgba(255,255,255,0.5)'
          },
          min: 0,
          max: 11,
          grid: { color: 'rgba(255,255,255,0.06)' },
          ticks: { stepSize: 2, font: { size: 10 }, color: 'rgba(255,255,255,0.35)' }
        }
      }
    },
    plugins: [{
      id: 'bubbleLabels',
      afterDraw: function(chart) {
        var c = chart.ctx;
        chart.data.datasets.forEach(function(ds, i) {
          var meta = chart.getDatasetMeta(i);
          if (meta.data.length > 0) {
            var el = meta.data[0];
            c.save();
            c.font = "bold 11px 'AlibabaPuHuiTi'";
            c.fillStyle = '#fff';
            c.textAlign = 'center';
            c.textBaseline = 'middle';
            c.fillText(ds.label, el.x, el.y);
            c.restore();
          }
        });
      }
    }]
  });
}

// ============ SCENE CREATORS ============
var sceneCreators = [
  createScene1,
  createScene2,
  createScene3,
  createScene4,
  createScene5,
  createScene6
];

// ============ FINAL FRAME ============
function showFinalFrame() {
  showScene(-1);
  document.getElementById('progressBar').style.width = '100%';
  var ff = document.getElementById('finalFrame');
  ff.classList.add('active');

  // Create floating circles
  var container = document.getElementById('floatingCircles');
  container.innerHTML = '';
  var circleColors = [COLORS.tencent, COLORS.iqiyi, COLORS.bilibili, COLORS.youku];
  for (var i = 0; i < 12; i++) {
    var circle = document.createElement('div');
    circle.className = 'floating-circle';
    var size = 20 + Math.random() * 60;
    var color = circleColors[i % 4];
    circle.style.cssText =
      'width:' + size + 'px;' +
      'height:' + size + 'px;' +
      'left:' + (Math.random() * 400) + 'px;' +
      'bottom:' + (-size - Math.random() * 200) + 'px;' +
      'background:' + color + ';' +
      'animation-duration:' + (6 + Math.random() * 8) + 's;' +
      'animation-delay:' + (Math.random() * 4) + 's;';
    container.appendChild(circle);
  }

  // Countup animation
  var el = document.getElementById('finalPct');
  var target = 25;
  var duration = 1500;
  var start = performance.now();

  function tick(now) {
    var elapsed = now - start;
    var progress = Math.min(elapsed / duration, 1);
    var eased = 1 - Math.pow(1 - progress, 4);
    var current = Math.round(eased * target);
    el.textContent = current + '%';
    if (progress < 1) requestAnimationFrame(tick);
  }
  requestAnimationFrame(tick);
}

// ============ AUTO-PLAY ============
var sceneTimer = null;

function advanceScene() {
  currentScene++;
  if (currentScene < TOTAL_SCENES) {
    showScene(currentScene);
    updateProgress(currentScene);
    sceneCreators[currentScene]();
    sceneTimer = setTimeout(advanceScene, SCENE_DURATION);
  } else {
    showFinalFrame();
  }
}

function startPresentation() {
  currentScene = 0;
  showScene(0);
  updateProgress(0);
  sceneCreators[0]();
  sceneTimer = setTimeout(advanceScene, SCENE_DURATION);
}

// Start when ready
startPresentation();
</script>
