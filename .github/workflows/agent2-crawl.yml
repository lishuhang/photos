name: Agent-2 Crawl WeChat Articles

on:
  workflow_dispatch:
    inputs:
      max_seconds:
        description: 'Max runtime in seconds (default 21000 = ~5.8h)'
        required: false
        default: '21000'

jobs:
  crawl:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    timeout-minutes: 360
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install patchright beautifulsoup4 markdownify
          python3 -m patchright install chromium

      - name: Run crawler
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          BRANCH: main
          AGENT_ID: "2"
          TARGET_DIR: yz_archive/1-3694
          WORK_DIR: /tmp/agent2_work
          CSV_PATH: /tmp/agent2_work/agent_2_tasks_0621.csv
          MAX_SECONDS: ${{ github.event.inputs.max_seconds || '21000' }}
        run: |
          python3 _tools/crawl_gh.py

      - name: Upload logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: agent2-logs
          path: /tmp/agent2_work/
          retention-days: 7
