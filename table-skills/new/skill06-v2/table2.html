<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI招聘动机分类</title>
<style>
@font-face { font-family:'AlibabaPuHuiTi'; src:url('../assets/AlibabaPuHuiTi-3-35-Thin.woff') format('woff'); font-weight:100; }
@font-face { font-family:'AlibabaPuHuiTi'; src:url('../assets/AlibabaPuHuiTi-3-55-Regular.woff') format('woff'); font-weight:400; }
@font-face { font-family:'AlibabaPuHuiTi'; src:url('../assets/AlibabaPuHuiTi-3-65-Medium.woff') format('woff'); font-weight:500; }
@font-face { font-family:'AlibabaPuHuiTi'; src:url('../assets/AlibabaPuHuiTi-3-85-Bold.woff') format('woff'); font-weight:700; }
@font-face { font-family:'AlibabaPuHuiTi'; src:url('../assets/AlibabaPuHuiTi-3-115-Black.woff') format('woff'); font-weight:900; }

* { margin:0; padding:0; box-sizing:border-box; }

body {
  background: #050816;
  display: flex;
  justify-content: center;
  align-items: center;
  min-height: 100vh;
  font-family: 'AlibabaPuHuiTi', sans-serif;
}

.canvas-wrap {
  position: relative;
  width: 450px;
  height: 800px;
  background: #0a0e27;
  overflow: hidden;
  margin: auto;
}

.content {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  width: 400px;
  height: 520px;
}

.title {
  font-size: 20px;
  font-weight: 700;
  color: #fff;
  text-align: center;
  margin-bottom: 6px;
  letter-spacing: 1px;
}
.subtitle {
  font-size: 12px;
  font-weight: 400;
  color: rgba(255,255,255,0.5);
  text-align: center;
  margin-bottom: 16px;
}

.cards-container {
  display: flex;
  flex-direction: column;
  gap: 10px;
}

/* FIX 2: card starts invisible, slideUp animates it in */
.card {
  display: flex;
  background: rgba(255,255,255,0.04);
  border-radius: 10px;
  overflow: hidden;
  opacity: 0;
  animation: slideUp 0.6s ease-out forwards;
  border: 1px solid rgba(255,255,255,0.06);
  transition: transform 0.2s, box-shadow 0.2s;
}
.card:hover {
  transform: translateY(-2px);
  box-shadow: 0 6px 20px rgba(0,0,0,0.3);
}

.card-border {
  width: 4px;
  flex-shrink: 0;
  border-radius: 4px 0 0 4px;
}

.card-text {
  flex: 1;
  padding: 10px 12px;
  min-width: 0;
}

.card-type {
  font-size: 14px;
  font-weight: 700;
  color: #fff;
  margin-bottom: 4px;
}

.card-detail {
  font-size: 10px;
  color: rgba(255,255,255,0.55);
  line-height: 1.5;
}

.card-tags {
  flex-shrink: 0;
  margin-left: 8px;
  padding: 10px 10px 10px 0;
  display: flex;
  flex-direction: column;
  justify-content: center;
  gap: 4px;
  min-width: 80px;
}

.tag {
  font-size: 9px;
  padding: 2px 6px;
  border-radius: 4px;
  white-space: nowrap;
  opacity: 0;
  animation: popIn 0.35s ease forwards;
  text-align: center;
}

@keyframes slideUp {
  from { opacity: 0; transform: translateY(20px); }
  to { opacity: 1; transform: translateY(0); }
}

@keyframes popIn {
  from { opacity: 0; transform: scale(0.7); }
  to { opacity: 1; transform: scale(1); }
}

/* Card colors */
.card1 .card-border { background: #FF6B6B; }
.card1 .card-type { color: #FF6B6B; }
.card1 .tag { background: rgba(255,107,107,0.15); color: #FF8E8E; border: 1px solid rgba(255,107,107,0.25); }

.card2 .card-border { background: #FFB347; }
.card2 .card-type { color: #FFB347; }
.card2 .tag { background: rgba(255,179,71,0.15); color: #FFCC73; border: 1px solid rgba(255,179,71,0.25); }

.card3 .card-border { background: #4ECDC4; }
.card3 .card-type { color: #4ECDC4; }
.card3 .tag { background: rgba(78,205,196,0.15); color: #6EDDD6; border: 1px solid rgba(78,205,196,0.25); }

.card4 .card-border { background: #45B7D1; }
.card4 .card-type { color: #45B7D1; }
.card4 .tag { background: rgba(69,183,209,0.15); color: #6CC8E0; border: 1px solid rgba(69,183,209,0.25); }

.card5 .card-border { background: #7B68EE; }
.card5 .card-type { color: #7B68EE; }
.card5 .tag { background: rgba(123,104,238,0.15); color: #9B8AFF; border: 1px solid rgba(123,104,238,0.25); }

.footer {
  position: absolute;
  bottom: 16px;
  left: 0;
  right: 0;
  text-align: center;
  font-size: 10px;
  color: rgba(255,255,255,0.3);
  font-weight: 400;
}

#loopBtn {
  position: absolute;
  top: 50%;
  right: -90px;
  transform: translateY(-50%);
  padding: 10px 18px;
  background: rgba(255,255,255,0.1);
  border: 1px solid rgba(255,255,255,0.2);
  border-radius: 8px;
  color: #fff;
  font-family: 'AlibabaPuHuiTi';
  cursor: pointer;
  font-size: 14px;
  transition: all 0.3s;
  display: none;
}
#loopBtn:hover { background: rgba(255,255,255,0.2); }
#loopBtn.active { background: rgba(0,212,170,0.2); border-color: rgba(0,212,170,0.4); color: #00D4AA; }

@media (max-width: 500px) {
  .canvas-wrap { width: 100vw; height: 177.78vw; }
  .content { width: 88vw; height: 120vw; }
  #loopBtn { right: 10px; top: auto; bottom: 10px; transform: none; }
}
</style>
</head>
<body>
<div class="canvas-wrap">
  <div class="content" id="content">
    <div class="title">AI招聘动机分类</div>
    <div class="subtitle">影视公司引入AI人才的核心驱动因素</div>

    <div class="cards-container">
      <!-- Card 1: 降本增效 -->
      <div class="card card1" style="animation-delay:0.3s;">
        <div class="card-border"></div>
        <div class="card-text">
          <div class="card-type">降本增效</div>
          <div class="card-detail">压力：后期制作成本高<br>重点：自动化剪辑/渲染</div>
        </div>
        <div class="card-tags">
          <div class="tag" style="animation-delay:1.0s;">华策影视</div>
          <div class="tag" style="animation-delay:1.1s;">柠萌影视</div>
        </div>
      </div>

      <!-- Card 2: 技术驱动 -->
      <div class="card card2" style="animation-delay:0.5s;">
        <div class="card-border"></div>
        <div class="card-text">
          <div class="card-type">技术驱动</div>
          <div class="card-detail">压力：IP开发效率低<br>重点：AIGC内容生成</div>
        </div>
        <div class="card-tags">
          <div class="tag" style="animation-delay:1.2s;">恒星引力</div>
          <div class="tag" style="animation-delay:1.3s;">正午阳光</div>
        </div>
      </div>

      <!-- Card 3: 人才储备 -->
      <div class="card card3" style="animation-delay:0.7s;">
        <div class="card-border"></div>
        <div class="card-text">
          <div class="card-type">人才储备</div>
          <div class="card-detail">压力：行业人才断层<br>重点：AI+创意复合人才</div>
        </div>
        <div class="card-tags">
          <div class="tag" style="animation-delay:1.4s;">博纳影业</div>
          <div class="tag" style="animation-delay:1.5s;">耀客文化</div>
        </div>
      </div>

      <!-- Card 4: 业务转型 -->
      <div class="card card4" style="animation-delay:0.9s;">
        <div class="card-border"></div>
        <div class="card-text">
          <div class="card-type">业务转型</div>
          <div class="card-detail">压力：传统业务萎缩<br>重点：虚拟人/互动内容</div>
        </div>
        <div class="card-tags">
          <div class="tag" style="animation-delay:1.6s;">欢娱影视</div>
        </div>
      </div>

      <!-- Card 5: 跟风布局 -->
      <div class="card card5" style="animation-delay:1.1s;">
        <div class="card-border"></div>
        <div class="card-text">
          <div class="card-type">跟风布局</div>
          <div class="card-detail">压力：同业竞争焦虑<br>重点：AI标签/概念营销</div>
        </div>
        <div class="card-tags">
          <div class="tag" style="animation-delay:1.8s;">多家中小公司</div>
        </div>
      </div>
    </div>
  </div>

  <div class="footer">数据来源：娱乐资本论统计</div>

  <button id="loopBtn" onclick="toggleLoop()">🔄 Loop</button>
</div>

<script>
let looping = false;
let loopTimer = null;
const ANIM_DURATION = 2300;

function showLoopBtn() {
  document.getElementById('loopBtn').style.display = 'block';
}

function toggleLoop() {
  looping = !looping;
  const btn = document.getElementById('loopBtn');
  btn.classList.toggle('active', looping);
  if (looping) {
    startLoop();
  } else {
    clearTimeout(loopTimer);
  }
}

function startLoop() {
  if (!looping) return;
  const content = document.getElementById('content');
  content.style.transition = 'opacity 0.8s';
  content.style.opacity = '0';
  loopTimer = setTimeout(() => {
    resetAnimations();
    content.style.opacity = '1';
    loopTimer = setTimeout(() => {
      if (looping) startLoop();
    }, ANIM_DURATION + 3000);
  }, 1300);
}

function resetAnimations() {
  const content = document.getElementById('content');
  const cards = content.querySelectorAll('.card');
  const tags = content.querySelectorAll('.tag');
  cards.forEach(c => {
    c.style.animation = 'none';
    c.offsetHeight;
    c.style.animation = '';
  });
  tags.forEach(t => {
    t.style.animation = 'none';
    t.offsetHeight;
    t.style.animation = '';
  });
}

setTimeout(showLoopBtn, ANIM_DURATION);
</script>
</body>
</html>
