<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI招聘动机分类</title>
<style>
@font-face { font-family:'AlibabaPuHuiTi'; src:url('../assets/AlibabaPuHuiTi-3-35-Thin.woff') format('woff'); font-weight:100; }
@font-face { font-family:'AlibabaPuHuiTi'; src:url('../assets/AlibabaPuHuiTi-3-55-Regular.woff') format('woff'); font-weight:400; }
@font-face { font-family:'AlibabaPuHuiTi'; src:url('../assets/AlibabaPuHuiTi-3-65-Medium.woff') format('woff'); font-weight:500; }
@font-face { font-family:'AlibabaPuHuiTi'; src:url('../assets/AlibabaPuHuiTi-3-85-Bold.woff') format('woff'); font-weight:700; }
@font-face { font-family:'AlibabaPuHuiTi'; src:url('../assets/AlibabaPuHuiTi-3-115-Black.woff') format('woff'); font-weight:900; }
* { margin:0; padding:0; box-sizing:border-box; }
body { background:#0a0e27; display:flex; justify-content:center; align-items:center; min-height:100vh; font-family:'AlibabaPuHuiTi',sans-serif; }
.portrait-wrapper { position:relative; width:450px; height:800px; background:#0a0e27; overflow:hidden; }
.content-area { position:absolute; top:40px; left:30px; right:30px; bottom:60px; display:flex; flex-direction:column; }
.title { color:#fff; font-size:20px; font-weight:700; text-align:center; margin-bottom:18px; opacity:0; }
.cards-area { flex:1; display:flex; flex-direction:column; gap:10px; overflow:hidden; }
.category-card {
  background:rgba(255,255,255,0.04);
  border-radius:10px;
  padding:12px 14px;
  border-left:4px solid;
  opacity:0;
  transform:translateY(30px);
  flex-shrink:0;
}
.cat-type { font-size:15px; font-weight:700; color:#fff; margin-bottom:4px; }
.cat-pressure { font-size:11px; color:rgba(255,255,255,0.5); margin-bottom:6px; line-height:1.4; }
.cat-focus { font-size:11px; color:rgba(255,255,255,0.7); margin-bottom:8px; line-height:1.4; }
.cat-focus span { color:rgba(255,255,255,0.4); }
.company-tags { display:flex; flex-wrap:wrap; gap:6px; }
.company-tag {
  font-size:11px;
  padding:2px 10px;
  border-radius:20px;
  color:#fff;
  font-weight:500;
  transform:scale(0);
  display:inline-block;
}
.footer { position:absolute; bottom:15px; left:0; right:0; text-align:center; color:rgba(255,255,255,0.35); font-size:11px; }
#replayBtn { display:none; position:absolute; bottom:20px; right:-80px; padding:10px 20px; background:rgba(255,255,255,0.1); border:1px solid rgba(255,255,255,0.2); border-radius:8px; color:#fff; font-family:'AlibabaPuHuiTi'; cursor:pointer; font-size:14px; transition:all 0.3s; }
#replayBtn:hover { background:rgba(255,255,255,0.2); }
@media (max-width:500px) { #replayBtn { right:20px; bottom:20px; } }
</style>
</head>
<body>
<div class="portrait-wrapper">
  <div class="content-area">
    <div class="title" id="title">AI招聘动机分类</div>
    <div class="cards-area" id="cards"></div>
  </div>
  <div class="footer">数据来源：娱乐资本论统计</div>
  <button id="replayBtn" onclick="replay()">▶ Replay</button>
</div>
<script src="https://cdn.jsdelivr.net/npm/d3@7/dist/d3.min.js"></script>
<script>
const data = [
  {type:'降本型影视公司', pressure:'制作周期长、成本高、爆款不确定', aiFocus:'分镜、概念设计、AIGC物料、AI漫剧', companies:['华策','正午阳光','启蒙影业'], color:'#FF6B6B'},
  {type:'增效型影视公司', pressure:'需要寻找新内容增量', aiFocus:'AI产品、AI漫剧、虚拟偶像', companies:['博纳','恒星引力','欢娱','耀客'], color:'#FFA940'},
  {type:'出海型影视公司', pressure:'海外本地化和社媒运营成本高', aiFocus:'多语种物料、短视频切条、海外AIGC运营', companies:['柠萌'], color:'#00D4AA'},
  {type:'经纪公司', pressure:'真人艺人成本和风险高、粉丝内容供给压力大', aiFocus:'AI艺人、虚拟偶像、AI粉丝运营', companies:['乐华','哇唧唧哇'], color:'#7B68EE'},
  {type:'MCN/直播电商', pressure:'人力密集、ROI压力强', aiFocus:'场控、客服、审核、运营、短剧生产', companies:['无忧','遥望'], color:'#E040FB'}
];

let animTimer = null;

function run() {
  document.getElementById('replayBtn').style.display = 'none';
  const cards = document.getElementById('cards');
  cards.innerHTML = '';
  const title = document.getElementById('title');
  title.style.opacity = '0';

  d3.select(title).transition().duration(800).style('opacity', 1);

  data.forEach((d, i) => {
    const card = document.createElement('div');
    card.className = 'category-card';
    card.style.borderLeftColor = d.color;

    let tagsHtml = d.companies.map((c, ci) =>
      `<span class="company-tag" id="tag-${i}-${ci}" style="background:${d.color}30;border:1px solid ${d.color}60">${c}</span>`
    ).join('');

    card.innerHTML = `
      <div class="cat-type" style="color:${d.color}">${d.type}</div>
      <div class="cat-pressure">${d.pressure}</div>
      <div class="cat-focus"><span>AI聚焦：</span>${d.aiFocus}</div>
      <div class="company-tags">${tagsHtml}</div>
    `;
    cards.appendChild(card);

    // Slide in from bottom
    d3.select(card)
      .transition()
      .delay(i * 200 + 300)
      .duration(600)
      .ease(d3.easeCubicOut)
      .style('opacity', 1)
      .style('transform', 'translateY(0px)')
      .on('end', function() {
        // Pop in company tags
        d.companies.forEach((c, ci) => {
          d3.select(`#tag-${i}-${ci}`)
            .transition()
            .delay(ci * 100)
            .duration(400)
            .ease(d3.easeBackOut.overshoot(1.5))
            .style('transform', 'scale(1)');
        });
      });
  });

  const totalTime = data.length * 200 + 1200;
  animTimer = setTimeout(() => {
    document.getElementById('replayBtn').style.display = 'block';
  }, totalTime);
}

function replay() {
  if (animTimer) clearTimeout(animTimer);
  // Reset all transitions
  d3.selectAll('.category-card').interrupt();
  d3.selectAll('.company-tag').interrupt();
  run();
}

run();
</script>
</body>
</html>
