<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>传统影视公司AI路径对比</title>
<style>
@font-face { font-family:'AlibabaPuHuiTi'; src:url('../assets/AlibabaPuHuiTi-3-35-Thin.woff') format('woff'); font-weight:100; }
@font-face { font-family:'AlibabaPuHuiTi'; src:url('../assets/AlibabaPuHuiTi-3-55-Regular.woff') format('woff'); font-weight:400; }
@font-face { font-family:'AlibabaPuHuiTi'; src:url('../assets/AlibabaPuHuiTi-3-65-Medium.woff') format('woff'); font-weight:500; }
@font-face { font-family:'AlibabaPuHuiTi'; src:url('../assets/AlibabaPuHuiTi-3-85-Bold.woff') format('woff'); font-weight:700; }
@font-face { font-family:'AlibabaPuHuiTi'; src:url('../assets/AlibabaPuHuiTi-3-115-Black.woff') format('woff'); font-weight:900; }

* { margin:0; padding:0; box-sizing:border-box; }
body {
  background:#0a0e27;
  display:flex; justify-content:center; align-items:center;
  min-height:100vh;
  font-family:'AlibabaPuHuiTi',sans-serif;
  color:#fff;
  overflow:hidden;
}
.canvas-wrap {
  position:relative;
  width:450px; height:800px;
  background:#0a0e27;
  overflow:hidden;
}
.content {
  position:absolute;
  top:50%; left:50%; transform:translate(-50%,-50%);
  width:390px; height:600px;
}
.title {
  font-size:22px; font-weight:700;
  text-align:center;
  margin-bottom:16px;
  opacity:0; transform:translateY(-20px);
  transition: opacity 0.8s ease, transform 0.8s ease;
}
.title.show { opacity:1; transform:translateY(0); }
.title span {
  background:linear-gradient(90deg,#FF6B6B,#00D4AA);
  -webkit-background-clip:text; -webkit-text-fill-color:transparent;
  background-clip:text;
}

.legend {
  display:flex; justify-content:center; gap:20px;
  margin-bottom:20px;
  opacity:0; transition:opacity 0.6s ease;
}
.legend.show { opacity:1; }
.legend-item {
  display:flex; align-items:center; gap:6px;
  font-size:12px; font-weight:500;
}
.legend-dot {
  width:10px; height:10px; border-radius:3px;
}

.chart-container {
  position:relative;
  width:100%; height:420px;
}
.y-axis {
  position:absolute; left:0; top:0; bottom:30px;
  width:30px;
  display:flex; flex-direction:column-reverse;
  justify-content:space-between;
  align-items:flex-end;
  padding-right:8px;
}
.y-label { font-size:10px; color:rgba(255,255,255,0.4); font-weight:400; }

.grid-lines {
  position:absolute; left:30px; right:0; top:0; bottom:30px;
}
.grid-line {
  position:absolute; left:0; right:0;
  height:1px;
  background:rgba(255,255,255,0.06);
}

.bars-area {
  position:absolute; left:38px; right:8px; top:0; bottom:30px;
  display:flex; align-items:flex-end;
  justify-content:space-around;
}
.group {
  display:flex; flex-direction:column; align-items:center;
  flex:1;
}
.group-bars {
  display:flex; align-items:flex-end; gap:3px;
  height:360px; position:relative;
}
.bar {
  width:18px;
  border-radius:4px 4px 0 0;
  height:0;
  transition: height 1s cubic-bezier(0.22,1,0.36,1);
  position:relative;
}
.bar-val {
  position:absolute; top:-18px; left:50%; transform:translateX(-50%);
  font-size:10px; font-weight:700;
  opacity:0; transition:opacity 0.4s ease;
}
.bar-val.show { opacity:1; }

.group-label {
  margin-top:8px;
  font-size:10px; font-weight:400;
  color:rgba(255,255,255,0.6);
  text-align:center;
  max-width:58px;
  line-height:1.3;
  writing-mode:vertical-rl;
  text-orientation:mixed;
  height:70px;
  display:flex; align-items:center;
}

.footer {
  position:absolute;
  bottom:20px; left:0; right:0;
  text-align:center;
  font-size:11px; color:rgba(255,255,255,0.35);
  font-weight:100;
}

#replayBtn {
  display:none; position:absolute; bottom:20px; right:-80px;
  padding:10px 20px; background:rgba(255,255,255,0.1);
  border:1px solid rgba(255,255,255,0.2); border-radius:8px;
  color:#fff; font-family:'AlibabaPuHuiTi'; cursor:pointer;
  font-size:14px; transition:all 0.3s;
}
#replayBtn:hover { background:rgba(255,255,255,0.2); }
@media (max-width:500px) {
  #replayBtn { right:20px; bottom:20px; }
}
</style>
</head>
<body>
<div class="canvas-wrap">
  <div class="content">
    <div class="title" id="title"><span>传统影视公司AI路径对比</span></div>
    <div class="legend" id="legend">
      <div class="legend-item"><div class="legend-dot" style="background:#FF6B6B"></div>降本型</div>
      <div class="legend-item"><div class="legend-dot" style="background:#FFA940"></div>增效型</div>
      <div class="legend-item"><div class="legend-dot" style="background:#00D4AA"></div>出海型</div>
    </div>
    <div class="chart-container" id="chart"></div>
  </div>
  <div class="footer">数据来源：娱乐资本论统计</div>
  <button id="replayBtn" onclick="replay()">▶ Replay</button>
</div>

<script>
const dims = ['分镜/概念设计','AI漫剧/虚拟偶像','多语种/海外运营','技术产品研发','内容创作工具化'];
const costReduce = [9,5,2,3,8];
const efficiency = [4,9,3,8,5];
const overseas = [3,2,9,2,4];
const colors = ['#FF6B6B','#FFA940','#00D4AA'];
const maxVal = 10;

let animTimers = [];

function buildChart() {
  const chart = document.getElementById('chart');
  chart.innerHTML = '';
  animTimers.forEach(t => clearTimeout(t));
  animTimers = [];

  // Y axis
  const yAxis = document.createElement('div');
  yAxis.className = 'y-axis';
  for (let i = 0; i <= maxVal; i += 2) {
    const lbl = document.createElement('div');
    lbl.className = 'y-label';
    lbl.textContent = i;
    yAxis.appendChild(lbl);
  }
  chart.appendChild(yAxis);

  // Grid
  const grid = document.createElement('div');
  grid.className = 'grid-lines';
  for (let i = 0; i <= maxVal; i += 2) {
    const line = document.createElement('div');
    line.className = 'grid-line';
    line.style.bottom = (i / maxVal * 100) + '%';
    grid.appendChild(line);
  }
  chart.appendChild(grid);

  // Bars
  const area = document.createElement('div');
  area.className = 'bars-area';

  dims.forEach((dim, gi) => {
    const group = document.createElement('div');
    group.className = 'group';

    const barsWrap = document.createElement('div');
    barsWrap.className = 'group-bars';

    const sets = [costReduce[gi], efficiency[gi], overseas[gi]];
    sets.forEach((val, bi) => {
      const bar = document.createElement('div');
      bar.className = 'bar';
      bar.style.background = `linear-gradient(180deg, ${colors[bi]}, ${colors[bi]}88)`;
      bar.style.boxShadow = `0 0 12px ${colors[bi]}44`;
      bar.style.transitionDelay = `${gi * 200 + bi * 80}ms`;
      bar.dataset.target = (val / maxVal * 360);

      const valEl = document.createElement('div');
      valEl.className = 'bar-val';
      valEl.style.color = colors[bi];
      valEl.textContent = val;
      valEl.dataset.gi = gi;
      valEl.dataset.bi = bi;
      bar.appendChild(valEl);

      barsWrap.appendChild(bar);
    });

    const label = document.createElement('div');
    label.className = 'group-label';
    label.textContent = dim;

    group.appendChild(barsWrap);
    group.appendChild(label);
    area.appendChild(group);
  });

  chart.appendChild(area);

  // Animations
  animTimers.push(setTimeout(() => {
    document.getElementById('title').classList.add('show');
  }, 200));

  animTimers.push(setTimeout(() => {
    document.getElementById('legend').classList.add('show');
  }, 500));

  animTimers.push(setTimeout(() => {
    document.querySelectorAll('.bar').forEach(bar => {
      bar.style.height = bar.dataset.target + 'px';
    });
  }, 800));

  animTimers.push(setTimeout(() => {
    document.querySelectorAll('.bar-val').forEach(v => {
      const gi = parseInt(v.dataset.gi);
      const bi = parseInt(v.dataset.bi);
      const delay = gi * 200 + bi * 80 + 800;
      setTimeout(() => v.classList.add('show'), delay);
    });
  }, 1600));

  animTimers.push(setTimeout(() => {
    document.getElementById('replayBtn').style.display = 'block';
  }, 4500));
}

function replay() {
  document.getElementById('replayBtn').style.display = 'none';
  document.getElementById('title').classList.remove('show');
  document.getElementById('legend').classList.remove('show');
  animTimers.forEach(t => clearTimeout(t));
  setTimeout(buildChart, 300);
}

window.addEventListener('DOMContentLoaded', buildChart);
</script>
</body>
</html>
