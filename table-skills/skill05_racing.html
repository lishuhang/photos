<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI招聘增长 - 竞速条形图</title>
<style>
@font-face { font-family:'AlibabaPuHuiTi'; src:url('./fonts/AlibabaPuHuiTi-3-35-Thin.woff') format('woff'); font-weight:100; }
@font-face { font-family:'AlibabaPuHuiTi'; src:url('./fonts/AlibabaPuHuiTi-3-55-Regular.woff') format('woff'); font-weight:400; }
@font-face { font-family:'AlibabaPuHuiTi'; src:url('./fonts/AlibabaPuHuiTi-3-65-Medium.woff') format('woff'); font-weight:500; }
@font-face { font-family:'AlibabaPuHuiTi'; src:url('./fonts/AlibabaPuHuiTi-3-85-Bold.woff') format('woff'); font-weight:700; }
@font-face { font-family:'AlibabaPuHuiTi'; src:url('./fonts/AlibabaPuHuiTi-3-115-Black.woff') format('woff'); font-weight:900; }

* { margin:0; padding:0; box-sizing:border-box; }

body {
  background: #000;
  display: flex;
  justify-content: center;
  align-items: center;
  min-height: 100vh;
  font-family: 'AlibabaPuHuiTi', sans-serif;
  overflow: hidden;
}

#viewport {
  width: 450px;
  height: 800px;
  background: #0a0e27;
  position: relative;
  overflow: hidden;
  border-radius: 12px;
  box-shadow: 0 0 60px rgba(0,212,170,0.1);
}

/* ===== PROGRESS BAR ===== */
#progress-wrap {
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 3px;
  background: rgba(255,255,255,0.08);
  z-index: 100;
}
#progress-bar {
  height: 100%;
  width: 0%;
  background: linear-gradient(90deg, #00D4AA, #FFA940, #FF6B6B);
  transition: width 0.3s linear;
  border-radius: 0 2px 2px 0;
}

/* ===== PHASE CONTAINERS ===== */
.phase { position: absolute; inset: 0; opacity: 0; pointer-events: none; transition: opacity 0.8s ease; }
.phase.active { opacity: 1; pointer-events: auto; }

/* ===== RACING PHASE ===== */
#racing-phase { display: flex; flex-direction: column; padding: 40px 24px 20px; }

.racing-header {
  text-align: center;
  margin-bottom: 16px;
}
.racing-subtitle {
  font-size: 13px;
  font-weight: 400;
  color: rgba(255,255,255,0.5);
  letter-spacing: 2px;
  text-transform: uppercase;
  margin-bottom: 6px;
}
.racing-time {
  font-size: 42px;
  font-weight: 900;
  color: #fff;
  text-shadow: 0 0 30px rgba(0,212,170,0.4);
  line-height: 1.1;
}
.racing-year {
  font-size: 14px;
  font-weight: 400;
  color: rgba(255,255,255,0.35);
  margin-top: 4px;
}

.racing-chart {
  flex: 1;
  position: relative;
  margin-top: 12px;
}

.bar-row {
  position: absolute;
  left: 0; right: 0;
  height: 64px;
  display: flex;
  align-items: center;
  transition: top 0.6s cubic-bezier(0.25,1,0.5,1);
}
.bar-label {
  width: 72px;
  font-size: 15px;
  font-weight: 700;
  color: #fff;
  text-align: right;
  padding-right: 12px;
  flex-shrink: 0;
  white-space: nowrap;
}
.bar-track {
  flex: 1;
  height: 36px;
  position: relative;
}
.bar-fill {
  height: 100%;
  border-radius: 6px;
  transition: width 0.5s cubic-bezier(0.25,1,0.5,1);
  position: relative;
  min-width: 4px;
  display: flex;
  align-items: center;
  justify-content: flex-end;
}
.bar-fill::after {
  content: '';
  position: absolute;
  right: 0; top: 0; bottom: 0;
  width: 40%;
  background: linear-gradient(90deg, transparent, rgba(255,255,255,0.12));
  border-radius: 0 6px 6px 0;
}
.bar-value {
  position: absolute;
  right: -8px;
  transform: translateX(100%);
  font-size: 18px;
  font-weight: 700;
  color: #fff;
  white-space: nowrap;
  text-shadow: 0 1px 4px rgba(0,0,0,0.5);
}
.bar-rank {
  width: 28px;
  font-size: 14px;
  font-weight: 500;
  color: rgba(255,255,255,0.3);
  text-align: center;
  flex-shrink: 0;
}

/* Bar glow */
.bar-fill.tencent { background: linear-gradient(90deg, #00D4AA, #00e6bb); box-shadow: 0 0 20px rgba(0,212,170,0.3); }
.bar-fill.iqiyi { background: linear-gradient(90deg, #FF6B6B, #ff8585); box-shadow: 0 0 20px rgba(255,107,107,0.3); }
.bar-fill.bilibili { background: linear-gradient(90deg, #FFA940, #ffba5c); box-shadow: 0 0 20px rgba(255,169,64,0.3); }
.bar-fill.youku { background: linear-gradient(90deg, #7B68EE, #9580f0); box-shadow: 0 0 20px rgba(123,104,238,0.3); }

/* ===== SUMMARY PHASE ===== */
#summary-phase { display: flex; flex-direction: column; padding: 36px 24px 20px; }

.summary-title {
  text-align: center;
  font-size: 22px;
  font-weight: 700;
  color: #fff;
  margin-bottom: 20px;
  text-shadow: 0 0 20px rgba(0,212,170,0.3);
}

.summary-section {
  margin-bottom: 18px;
}
.summary-section-title {
  font-size: 12px;
  font-weight: 500;
  color: rgba(255,255,255,0.45);
  letter-spacing: 1px;
  margin-bottom: 10px;
  padding-left: 2px;
}

/* Final ranking */
.final-rank-row {
  display: flex;
  align-items: center;
  margin-bottom: 8px;
  font-size: 14px;
  color: #fff;
}
.final-rank-num {
  width: 22px;
  font-weight: 900;
  font-size: 16px;
  color: rgba(255,255,255,0.25);
}
.final-rank-name {
  width: 60px;
  font-weight: 500;
}
.final-rank-bar-bg {
  flex: 1;
  height: 20px;
  background: rgba(255,255,255,0.06);
  border-radius: 4px;
  overflow: hidden;
  margin: 0 8px;
}
.final-rank-bar {
  height: 100%;
  border-radius: 4px;
  transition: width 1s ease;
}
.final-rank-val {
  font-weight: 700;
  font-size: 15px;
  width: 36px;
  text-align: right;
}

/* Horizontal bars: 社招/校招/实习 */
.hbar-row {
  display: flex;
  align-items: center;
  margin-bottom: 8px;
}
.hbar-label {
  width: 48px;
  font-size: 13px;
  font-weight: 500;
  color: rgba(255,255,255,0.7);
  text-align: right;
  padding-right: 10px;
}
.hbar-track {
  flex: 1;
  height: 26px;
  background: rgba(255,255,255,0.05);
  border-radius: 5px;
  overflow: hidden;
  position: relative;
}
.hbar-fill {
  height: 100%;
  border-radius: 5px;
  background: linear-gradient(90deg, #00D4AA, #00e6bb);
  transition: width 1.2s ease;
  display: flex;
  align-items: center;
  padding-left: 8px;
}
.hbar-fill.campus { background: linear-gradient(90deg, #FFA940, #ffba5c); }
.hbar-fill.intern { background: linear-gradient(90deg, #7B68EE, #9580f0); }
.hbar-pct {
  font-size: 12px;
  font-weight: 700;
  color: #fff;
  white-space: nowrap;
  margin-left: auto;
  padding-right: 8px;
}

/* Charts row */
.charts-row {
  display: flex;
  gap: 12px;
  margin-top: 4px;
}
.chart-card {
  flex: 1;
  background: rgba(255,255,255,0.04);
  border: 1px solid rgba(255,255,255,0.06);
  border-radius: 12px;
  padding: 12px;
  display: flex;
  flex-direction: column;
  align-items: center;
}
.chart-card-title {
  font-size: 11px;
  font-weight: 500;
  color: rgba(255,255,255,0.4);
  margin-bottom: 8px;
}
.chart-card svg { width: 100%; }

/* Donut center */
.donut-center {
  font-family: 'AlibabaPuHuiTi', sans-serif;
  font-weight: 900;
}

/* ===== FINAL FRAME ===== */
#final-phase {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  text-align: center;
  position: relative;
}

#particles-canvas {
  position: absolute;
  inset: 0;
  width: 100%;
  height: 100%;
  z-index: 0;
}

.final-content {
  position: relative;
  z-index: 1;
}
.final-tag {
  display: inline-block;
  padding: 6px 18px;
  background: rgba(0,212,170,0.15);
  border: 1px solid rgba(0,212,170,0.3);
  border-radius: 20px;
  font-size: 12px;
  font-weight: 500;
  color: #00D4AA;
  letter-spacing: 1px;
  margin-bottom: 24px;
}
.final-title {
  font-size: 28px;
  font-weight: 900;
  color: #fff;
  line-height: 1.4;
  margin-bottom: 32px;
  text-shadow: 0 0 40px rgba(0,212,170,0.3);
}
.final-big-num {
  font-size: 72px;
  font-weight: 900;
  background: linear-gradient(135deg, #00D4AA, #FFA940);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  line-height: 1;
  margin-bottom: 8px;
}
.final-big-label {
  font-size: 18px;
  font-weight: 500;
  color: rgba(255,255,255,0.6);
  margin-bottom: 40px;
}
.final-companies {
  display: flex;
  gap: 16px;
  justify-content: center;
}
.final-company-dot {
  display: flex;
  align-items: center;
  gap: 6px;
  font-size: 12px;
  color: rgba(255,255,255,0.5);
}
.final-company-dot span {
  width: 8px; height: 8px;
  border-radius: 50%;
  display: inline-block;
}

/* Animations */
@keyframes fadeInUp {
  from { opacity:0; transform:translateY(20px); }
  to { opacity:1; transform:translateY(0); }
}
@keyframes pulse-glow {
  0%, 100% { filter: drop-shadow(0 0 8px rgba(0,212,170,0.3)); }
  50% { filter: drop-shadow(0 0 20px rgba(0,212,170,0.6)); }
}
.animate-in {
  animation: fadeInUp 0.6s ease forwards;
}
</style>
</head>
<body>

<div id="viewport">
  <!-- Progress Bar -->
  <div id="progress-wrap"><div id="progress-bar"></div></div>

  <!-- Phase 1: Racing -->
  <div id="racing-phase" class="phase active">
    <div class="racing-header">
      <div class="racing-subtitle">AI岗位数量变化趋势</div>
      <div class="racing-time" id="racing-time">2023 Q1</div>
      <div class="racing-year" id="racing-year">爱优腾哔 · 招聘数据</div>
    </div>
    <div class="racing-chart" id="racing-chart"></div>
  </div>

  <!-- Phase 2: Summary -->
  <div id="summary-phase" class="phase">
    <div class="summary-title">2026 Q1 终局排名</div>

    <div class="summary-section">
      <div class="summary-section-title">最终排名</div>
      <div id="final-ranking"></div>
    </div>

    <div class="summary-section">
      <div class="summary-section-title">招聘渠道分布</div>
      <div id="hbar-chart"></div>
    </div>

    <div class="charts-row">
      <div class="chart-card">
        <div class="chart-card-title">AI岗位占比</div>
        <svg id="donut-svg" viewBox="0 0 160 160"></svg>
      </div>
      <div class="chart-card">
        <div class="chart-card-title">能力雷达图</div>
        <svg id="radar-svg" viewBox="0 0 160 160"></svg>
      </div>
    </div>
  </div>

  <!-- Phase 3: Final -->
  <div id="final-phase" class="phase">
    <canvas id="particles-canvas"></canvas>
    <div class="final-content">
      <div class="final-tag">2023-2026 招聘趋势</div>
      <div class="final-title">爱优腾哔<br>招聘解读</div>
      <div class="final-big-num">25%</div>
      <div class="final-big-label">AI岗位占比</div>
      <div class="final-companies">
        <div class="final-company-dot"><span style="background:#00D4AA"></span>腾讯</div>
        <div class="final-company-dot"><span style="background:#FF6B6B"></span>爱奇艺</div>
        <div class="final-company-dot"><span style="background:#FFA940"></span>B站</div>
        <div class="final-company-dot"><span style="background:#7B68EE"></span>优酷</div>
      </div>
    </div>
  </div>
</div>

<script>
// ===== DATA =====
const raceData = {
  timeline: ['2023Q1','2023Q2','2023Q3','2023Q4','2024Q1','2024Q2','2024Q3','2024Q4','2025Q1','2025Q2','2025Q3','2025Q4','2026Q1'],
  companies: {
    '腾讯视频': [15,20,28,35,45,55,68,82,95,110,130,155,188],
    '爱奇艺':   [12,16,22,28,38,48,58,72,85,100,120,145,167],
    'B站':     [8,12,18,24,32,40,50,62,75,88,105,128,155],
    '优酷':    [5,8,12,18,25,32,40,50,60,72,85,100,118]
  }
};

const companyColors = {
  '腾讯视频': '#00D4AA',
  '爱奇艺':   '#FF6B6B',
  'B站':     '#FFA940',
  '优酷':    '#7B68EE'
};
const companyClass = {
  '腾讯视频': 'tencent',
  '爱奇艺':   'iqiyi',
  'B站':     'bilibili',
  '优酷':    'youku'
};

// ===== RACING PHASE =====
const chart = document.getElementById('racing-chart');
const timeEl = document.getElementById('racing-time');
const yearEl = document.getElementById('racing-year');
const progressBar = document.getElementById('progress-bar');

const companyNames = Object.keys(raceData.companies);
const barHeight = 64;
const barGap = 12;

// Create bar elements
const bars = {};
companyNames.forEach((name, i) => {
  const row = document.createElement('div');
  row.className = 'bar-row';
  row.style.top = i * (barHeight + barGap) + 'px';

  const label = document.createElement('div');
  label.className = 'bar-label';
  label.style.color = companyColors[name];
  label.textContent = name;

  const track = document.createElement('div');
  track.className = 'bar-track';

  const fill = document.createElement('div');
  fill.className = 'bar-fill ' + companyClass[name];

  const value = document.createElement('div');
  value.className = 'bar-value';
  value.textContent = '0';

  fill.appendChild(value);
  track.appendChild(fill);

  const rank = document.createElement('div');
  rank.className = 'bar-rank';

  row.appendChild(label);
  row.appendChild(track);
  row.appendChild(rank);

  chart.appendChild(row);
  bars[name] = { row, fill, value, rank };
});

const totalTime = 20000; // 20s for racing
const quarterTime = totalTime / (raceData.timeline.length - 1);
let racingStart = null;
let currentStep = 0;

function getMaxValue(step) {
  let max = 0;
  companyNames.forEach(name => {
    const v = raceData.companies[name][step];
    if (v > max) max = v;
  });
  return max;
}

function getSortedCompanies(step) {
  return companyNames.slice().sort((a, b) => raceData.companies[b][step] - raceData.companies[a][step]);
}

function interpolateValue(name, fromStep, toStep, progress) {
  const from = raceData.companies[name][fromStep];
  const to = raceData.companies[name][toStep];
  return from + (to - from) * progress;
}

function updateRacing(step, subProgress) {
  // Clamp
  const fromStep = Math.min(step, raceData.timeline.length - 2);
  const toStep = fromStep + 1;
  subProgress = subProgress || 0;

  // Time display
  const period = raceData.timeline[fromStep];
  const year = period.substring(0, 4);
  const q = period.substring(4);
  timeEl.textContent = year + ' ' + q;

  // Get interpolated values and sort
  const values = {};
  companyNames.forEach(name => {
    values[name] = interpolateValue(name, fromStep, toStep, subProgress);
  });

  const maxVal = Math.max(...Object.values(values));
  const sorted = companyNames.slice().sort((a, b) => values[b] - values[a]);

  const chartWidth = chart.offsetWidth - 72 - 28 - 60; // label + rank + value space

  sorted.forEach((name, rankIdx) => {
    const bar = bars[name];
    const val = values[name];
    const pct = (val / maxVal) * 100;

    bar.row.style.top = rankIdx * (barHeight + barGap) + 'px';
    bar.fill.style.width = pct + '%';
    bar.value.textContent = Math.round(val);
    bar.rank.textContent = '#' + (rankIdx + 1);
  });
}

function racingLoop(timestamp) {
  if (!racingStart) racingStart = timestamp;
  const elapsed = timestamp - racingStart;

  // Progress
  const totalAnimTime = 28000; // total animation time
  const racingPct = Math.min(elapsed / totalTime, 1);
  progressBar.style.width = (racingPct * 70) + '%'; // racing = 70% of progress

  if (elapsed >= totalTime) {
    // Final state
    updateRacing(raceData.timeline.length - 2, 1);
    setTimeout(startSummaryPhase, 800);
    return;
  }

  const stepFloat = elapsed / quarterTime;
  const step = Math.floor(stepFloat);
  const subProgress = stepFloat - step;

  updateRacing(step, subProgress);
  requestAnimationFrame(racingLoop);
}

// ===== SUMMARY PHASE =====
function startSummaryPhase() {
  document.getElementById('racing-phase').classList.remove('active');
  document.getElementById('summary-phase').classList.add('active');
  progressBar.style.width = '70%';

  buildFinalRanking();
  buildHBars();
  buildDonut();
  buildRadar();

  // Animate progress
  let summaryStart = performance.now();
  function summaryProgress(ts) {
    const elapsed = ts - summaryStart;
    const pct = Math.min(elapsed / 8000, 1);
    progressBar.style.width = (70 + pct * 20) + '%';
    if (pct < 1) requestAnimationFrame(summaryProgress);
  }
  requestAnimationFrame(summaryProgress);

  setTimeout(startFinalPhase, 8000);
}

function buildFinalRanking() {
  const container = document.getElementById('final-ranking');
  const lastIdx = raceData.timeline.length - 1;
  const sorted = companyNames.slice().sort((a, b) => raceData.companies[b][lastIdx] - raceData.companies[a][lastIdx]);
  const maxVal = raceData.companies[sorted[0]][lastIdx];

  sorted.forEach((name, i) => {
    const val = raceData.companies[name][lastIdx];
    const pct = (val / maxVal) * 100;
    const row = document.createElement('div');
    row.className = 'final-rank-row animate-in';
    row.style.animationDelay = (i * 0.15) + 's';
    row.style.opacity = '0';
    row.innerHTML = `
      <div class="final-rank-num">${i+1}</div>
      <div class="final-rank-name" style="color:${companyColors[name]}">${name}</div>
      <div class="final-rank-bar-bg"><div class="final-rank-bar" style="width:0%;background:${companyColors[name]}"></div></div>
      <div class="final-rank-val">${val}</div>
    `;
    container.appendChild(row);
    // Animate bar width
    setTimeout(() => {
      row.querySelector('.final-rank-bar').style.width = pct + '%';
    }, 100 + i * 150);
  });
}

function buildHBars() {
  const container = document.getElementById('hbar-chart');
  const data = [
    { label: '社招', pct: 26.3, cls: '' },
    { label: '校招', pct: 35.8, cls: 'campus' },
    { label: '实习', pct: 15.9, cls: 'intern' }
  ];
  data.forEach((d, i) => {
    const row = document.createElement('div');
    row.className = 'hbar-row animate-in';
    row.style.animationDelay = (0.3 + i * 0.15) + 's';
    row.style.opacity = '0';
    row.innerHTML = `
      <div class="hbar-label">${d.label}</div>
      <div class="hbar-track"><div class="hbar-fill ${d.cls}" style="width:0%"><span class="hbar-pct">${d.pct}%</span></div></div>
    `;
    container.appendChild(row);
    setTimeout(() => {
      row.querySelector('.hbar-fill').style.width = (d.pct / 40 * 100) + '%';
    }, 400 + i * 150);
  });
}

function buildDonut() {
  const svg = document.getElementById('donut-svg');
  const cx = 80, cy = 80, r = 55, innerR = 38;
  const data = [
    { label: 'AI', value: 468, pct: 25, color: '#00D4AA' },
    { label: '非AI', value: 1405, pct: 75, color: 'rgba(255,255,255,0.1)' }
  ];

  // Background circle
  const bgCircle = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
  bgCircle.setAttribute('cx', cx);
  bgCircle.setAttribute('cy', cy);
  bgCircle.setAttribute('r', r);
  bgCircle.setAttribute('fill', 'none');
  bgCircle.setAttribute('stroke', 'rgba(255,255,255,0.06)');
  bgCircle.setAttribute('stroke-width', r - innerR);
  svg.appendChild(bgCircle);

  // AI arc
  const circumference = 2 * Math.PI * ((r + innerR) / 2);
  const aiArc = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
  aiArc.setAttribute('cx', cx);
  aiArc.setAttribute('cy', cy);
  aiArc.setAttribute('r', (r + innerR) / 2);
  aiArc.setAttribute('fill', 'none');
  aiArc.setAttribute('stroke', '#00D4AA');
  aiArc.setAttribute('stroke-width', r - innerR);
  aiArc.setAttribute('stroke-dasharray', circumference);
  aiArc.setAttribute('stroke-dashoffset', circumference);
  aiArc.setAttribute('stroke-linecap', 'round');
  aiArc.setAttribute('transform', `rotate(-90 ${cx} ${cy})`);
  aiArc.style.transition = 'stroke-dashoffset 1.5s ease';
  aiArc.style.filter = 'drop-shadow(0 0 8px rgba(0,212,170,0.5))';
  svg.appendChild(aiArc);

  setTimeout(() => {
    aiArc.setAttribute('stroke-dashoffset', circumference * (1 - 0.25));
  }, 300);

  // Center text
  const text1 = document.createElementNS('http://www.w3.org/2000/svg', 'text');
  text1.setAttribute('x', cx);
  text1.setAttribute('y', cy - 4);
  text1.setAttribute('text-anchor', 'middle');
  text1.setAttribute('fill', '#fff');
  text1.setAttribute('font-size', '20');
  text1.setAttribute('font-weight', '900');
  text1.setAttribute('font-family', 'AlibabaPuHuiTi, sans-serif');
  text1.textContent = '468';
  svg.appendChild(text1);

  const text2 = document.createElementNS('http://www.w3.org/2000/svg', 'text');
  text2.setAttribute('x', cx);
  text2.setAttribute('y', cy + 14);
  text2.setAttribute('text-anchor', 'middle');
  text2.setAttribute('fill', 'rgba(255,255,255,0.4)');
  text2.setAttribute('font-size', '10');
  text2.setAttribute('font-weight', '400');
  text2.setAttribute('font-family', 'AlibabaPuHuiTi, sans-serif');
  text2.textContent = '25% AI岗位';
  svg.appendChild(text2);

  // Labels
  const labelAi = document.createElementNS('http://www.w3.org/2000/svg', 'text');
  labelAi.setAttribute('x', cx);
  labelAi.setAttribute('y', cy + r + 16);
  labelAi.setAttribute('text-anchor', 'middle');
  labelAi.setAttribute('fill', '#00D4AA');
  labelAi.setAttribute('font-size', '9');
  labelAi.setAttribute('font-family', 'AlibabaPuHuiTi, sans-serif');
  labelAi.textContent = 'AI 468 | 非AI 1405';
  svg.appendChild(labelAi);
}

function buildRadar() {
  const svg = document.getElementById('radar-svg');
  const cx = 80, cy = 78, maxR = 58;
  const dimensions = ['技术研发','商业化','社区生态','内容实战','出海能力','人才培养'];
  const companies = [
    { name: '腾讯视频', values: [9,4,3,6,2,8], color: '#00D4AA' },
    { name: '爱奇艺', values: [5,9,2,5,8,5], color: '#FF6B6B' },
    { name: 'B站', values: [6,4,9,4,5,7], color: '#FFA940' },
    { name: '优酷', values: [4,5,3,9,3,6], color: '#7B68EE' }
  ];
  const n = dimensions.length;
  const angleStep = (2 * Math.PI) / n;

  // Grid
  for (let ring = 1; ring <= 3; ring++) {
    const rr = maxR * ring / 3;
    const points = [];
    for (let i = 0; i < n; i++) {
      const angle = -Math.PI / 2 + i * angleStep;
      points.push(`${cx + rr * Math.cos(angle)},${cy + rr * Math.sin(angle)}`);
    }
    const poly = document.createElementNS('http://www.w3.org/2000/svg', 'polygon');
    poly.setAttribute('points', points.join(' '));
    poly.setAttribute('fill', 'none');
    poly.setAttribute('stroke', 'rgba(255,255,255,0.08)');
    poly.setAttribute('stroke-width', '1');
    svg.appendChild(poly);
  }

  // Axis lines + labels
  dimensions.forEach((dim, i) => {
    const angle = -Math.PI / 2 + i * angleStep;
    const ex = cx + maxR * Math.cos(angle);
    const ey = cy + maxR * Math.sin(angle);
    const line = document.createElementNS('http://www.w3.org/2000/svg', 'line');
    line.setAttribute('x1', cx);
    line.setAttribute('y1', cy);
    line.setAttribute('x2', ex);
    line.setAttribute('y2', ey);
    line.setAttribute('stroke', 'rgba(255,255,255,0.06)');
    line.setAttribute('stroke-width', '1');
    svg.appendChild(line);

    const lx = cx + (maxR + 12) * Math.cos(angle);
    const ly = cy + (maxR + 12) * Math.sin(angle);
    const label = document.createElementNS('http://www.w3.org/2000/svg', 'text');
    label.setAttribute('x', lx);
    label.setAttribute('y', ly + 3);
    label.setAttribute('text-anchor', 'middle');
    label.setAttribute('fill', 'rgba(255,255,255,0.35)');
    label.setAttribute('font-size', '7');
    label.setAttribute('font-family', 'AlibabaPuHuiTi, sans-serif');
    label.textContent = dim;
    svg.appendChild(label);
  });

  // Company shapes
  companies.forEach((comp, ci) => {
    const points = [];
    comp.values.forEach((v, i) => {
      const angle = -Math.PI / 2 + i * angleStep;
      const r = maxR * v / 10;
      points.push(`${cx + r * Math.cos(angle)},${cy + r * Math.sin(angle)}`);
    });

    // Filled polygon
    const poly = document.createElementNS('http://www.w3.org/2000/svg', 'polygon');
    poly.setAttribute('points', points.join(' '));
    poly.setAttribute('fill', comp.color);
    poly.setAttribute('fill-opacity', '0.1');
    poly.setAttribute('stroke', comp.color);
    poly.setAttribute('stroke-width', '1.5');
    poly.setAttribute('stroke-opacity', '0.7');
    svg.appendChild(poly);

    // Dots
    comp.values.forEach((v, i) => {
      const angle = -Math.PI / 2 + i * angleStep;
      const r = maxR * v / 10;
      const dot = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
      dot.setAttribute('cx', cx + r * Math.cos(angle));
      dot.setAttribute('cy', cy + r * Math.sin(angle));
      dot.setAttribute('r', '2.5');
      dot.setAttribute('fill', comp.color);
      dot.setAttribute('stroke', '#0a0e27');
      dot.setAttribute('stroke-width', '1');
      svg.appendChild(dot);
    });
  });
}

// ===== FINAL PHASE =====
function startFinalPhase() {
  document.getElementById('summary-phase').classList.remove('active');
  document.getElementById('final-phase').classList.add('active');
  progressBar.style.width = '100%';

  initParticles();
}

function initParticles() {
  const canvas = document.getElementById('particles-canvas');
  const ctx = canvas.getContext('2d');
  canvas.width = 450;
  canvas.height = 800;

  const particles = [];
  const colors = ['#00D4AA', '#FF6B6B', '#FFA940', '#7B68EE', 'rgba(255,255,255,0.3)'];

  for (let i = 0; i < 50; i++) {
    particles.push({
      x: Math.random() * 450,
      y: Math.random() * 800,
      vx: (Math.random() - 0.5) * 0.5,
      vy: -Math.random() * 0.8 - 0.2,
      size: Math.random() * 3 + 1,
      color: colors[Math.floor(Math.random() * colors.length)],
      alpha: Math.random() * 0.5 + 0.2
    });
  }

  function animate() {
    ctx.clearRect(0, 0, 450, 800);

    particles.forEach(p => {
      p.x += p.vx;
      p.y += p.vy;
      p.alpha += (Math.random() - 0.5) * 0.01;
      p.alpha = Math.max(0.1, Math.min(0.6, p.alpha));

      if (p.y < -10) { p.y = 810; p.x = Math.random() * 450; }
      if (p.x < -10) p.x = 460;
      if (p.x > 460) p.x = -10;

      ctx.beginPath();
      ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
      ctx.fillStyle = p.color;
      ctx.globalAlpha = p.alpha;
      ctx.fill();
      ctx.globalAlpha = 1;
    });

    // Glow circles
    const t = Date.now() / 2000;
    ctx.beginPath();
    ctx.arc(225 + Math.sin(t) * 30, 400 + Math.cos(t) * 20, 120, 0, Math.PI * 2);
    ctx.fillStyle = 'rgba(0,212,170,0.03)';
    ctx.fill();

    ctx.beginPath();
    ctx.arc(180 + Math.cos(t * 0.7) * 40, 350 + Math.sin(t * 0.7) * 30, 80, 0, Math.PI * 2);
    ctx.fillStyle = 'rgba(255,169,64,0.02)';
    ctx.fill();

    requestAnimationFrame(animate);
  }
  animate();
}

// ===== START =====
// Initial render
updateRacing(0, 0);

// Small delay then start
setTimeout(() => {
  requestAnimationFrame(racingLoop);
}, 500);
