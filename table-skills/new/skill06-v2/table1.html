<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>传统影视公司AI岗位占比</title>
<style>
@font-face { font-family:'AlibabaPuHuiTi'; src:url('../assets/AlibabaPuHuiTi-3-35-Thin.woff') format('woff'); font-weight:100; }
@font-face { font-family:'AlibabaPuHuiTi'; src:url('../assets/AlibabaPuHuiTi-3-55-Regular.woff') format('woff'); font-weight:400; }
@font-face { font-family:'AlibabaPuHuiTi'; src:url('../assets/AlibabaPuHuiTi-3-65-Medium.woff') format('woff'); font-weight:500; }
@font-face { font-family:'AlibabaPuHuiTi'; src:url('../assets/AlibabaPuHuiTi-3-85-Bold.woff') format('woff'); font-weight:700; }
@font-face { font-family:'AlibabaPuHuiTi'; src:url('../assets/AlibabaPuHuiTi-3-115-Black.woff') format('woff'); font-weight:900; }

* { margin:0; padding:0; box-sizing:border-box; }

body {
  background: #050816;
  display: flex;
  justify-content: center;
  align-items: center;
  min-height: 100vh;
  font-family: 'AlibabaPuHuiTi', sans-serif;
}

.canvas-wrap {
  position: relative;
  width: 450px;
  height: 800px;
  background: #0a0e27;
  overflow: hidden;
  margin: auto;
}

.content {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  width: 400px;
  height: 400px;
}

.title {
  font-size: 20px;
  font-weight: 700;
  color: #fff;
  text-align: center;
  margin-bottom: 8px;
  letter-spacing: 1px;
}
.subtitle {
  font-size: 12px;
  font-weight: 400;
  color: rgba(255,255,255,0.5);
  text-align: center;
  margin-bottom: 18px;
}

.bar-group {
  display: flex;
  align-items: center;
  margin-bottom: 8px;
  /* NO animation on bar-group - FIX 2 */
}

.bar-label {
  width: 64px;
  font-size: 11px;
  font-weight: 500;
  color: rgba(255,255,255,0.85);
  text-align: right;
  padding-right: 10px;
  flex-shrink: 0;
  white-space: nowrap;
}

.bar-track {
  flex: 1;
  height: 22px;
  background: rgba(255,255,255,0.06);
  border-radius: 4px;
  overflow: hidden;
  position: relative;
}

.bar-fill {
  height: 100%;
  border-radius: 4px;
  transform-origin: left;
  animation: barGrow 1s ease-out forwards;
  transform: scaleX(0);
}

/* FIX 1: bar-info is SIBLING of bar-track, NOT inside it */
.bar-info {
  display: flex;
  flex-direction: column;
  align-items: flex-start;
  padding-left: 8px;
  flex-shrink: 0;
  width: 70px;
  opacity: 0;
  animation: fadeIn 0.5s ease forwards;
}

.bar-pct {
  font-size: 13px;
  font-weight: 700;
  color: #fff;
  line-height: 1.2;
}

.bar-frac {
  font-size: 9px;
  font-weight: 400;
  color: rgba(255,255,255,0.5);
  line-height: 1.2;
}

/* Color scale: warm → cool */
.bar1 { background: linear-gradient(90deg, #FF6B6B, #FF8E8E); }
.bar2 { background: linear-gradient(90deg, #FF8C5A, #FFA97A); }
.bar3 { background: linear-gradient(90deg, #FFB347, #FFCC73); }
.bar4 { background: linear-gradient(90deg, #4ECDC4, #6EDDD6); }
.bar5 { background: linear-gradient(90deg, #45B7D1, #6CC8E0); }
.bar6 { background: linear-gradient(90deg, #96ADED, #B3C5F5); }
.bar7 { background: linear-gradient(90deg, #7B68EE, #9B8AFF); }

@keyframes barGrow {
  from { transform: scaleX(0); }
  to { transform: scaleX(1); }
}

@keyframes fadeIn {
  from { opacity: 0; transform: translateX(-4px); }
  to { opacity: 1; transform: translateX(0); }
}

.footer {
  position: absolute;
  bottom: 16px;
  left: 0;
  right: 0;
  text-align: center;
  font-size: 10px;
  color: rgba(255,255,255,0.3);
  font-weight: 400;
}

#loopBtn {
  position: absolute;
  top: 50%;
  right: -90px;
  transform: translateY(-50%);
  padding: 10px 18px;
  background: rgba(255,255,255,0.1);
  border: 1px solid rgba(255,255,255,0.2);
  border-radius: 8px;
  color: #fff;
  font-family: 'AlibabaPuHuiTi';
  cursor: pointer;
  font-size: 14px;
  transition: all 0.3s;
  display: none;
}
#loopBtn:hover { background: rgba(255,255,255,0.2); }
#loopBtn.active { background: rgba(0,212,170,0.2); border-color: rgba(0,212,170,0.4); color: #00D4AA; }

@media (max-width: 500px) {
  .canvas-wrap { width: 100vw; height: 177.78vw; }
  .content { width: 88vw; height: 88vw; }
  #loopBtn { right: 10px; top: auto; bottom: 10px; transform: none; }
}
</style>
</head>
<body>
<div class="canvas-wrap">
  <div class="content" id="content">
    <div class="title">传统影视公司AI岗位占比</div>
    <div class="subtitle">AI相关岗位 / 全部招聘岗位</div>

    <div class="bar-group">
      <div class="bar-label">博纳影业</div>
      <div class="bar-track"><div class="bar-fill bar1" style="width:71.43%;animation-delay:0.2s;"></div></div>
      <div class="bar-info" style="animation-delay:1.2s;"><span class="bar-pct">71.43%</span><span class="bar-frac">5/7</span></div>
    </div>
    <div class="bar-group">
      <div class="bar-label">恒星引力</div>
      <div class="bar-track"><div class="bar-fill bar2" style="width:57.14%;animation-delay:0.35s;"></div></div>
      <div class="bar-info" style="animation-delay:1.35s;"><span class="bar-pct">57.14%</span><span class="bar-frac">4/7</span></div>
    </div>
    <div class="bar-group">
      <div class="bar-label">欢娱影视</div>
      <div class="bar-track"><div class="bar-fill bar3" style="width:37.50%;animation-delay:0.5s;"></div></div>
      <div class="bar-info" style="animation-delay:1.5s;"><span class="bar-pct">37.50%</span><span class="bar-frac">3/8</span></div>
    </div>
    <div class="bar-group">
      <div class="bar-label">正午阳光</div>
      <div class="bar-track"><div class="bar-fill bar4" style="width:28.57%;animation-delay:0.65s;"></div></div>
      <div class="bar-info" style="animation-delay:1.65s;"><span class="bar-pct">28.57%</span><span class="bar-frac">4/14</span></div>
    </div>
    <div class="bar-group">
      <div class="bar-label">耀客文化</div>
      <div class="bar-track"><div class="bar-fill bar5" style="width:21.05%;animation-delay:0.8s;"></div></div>
      <div class="bar-info" style="animation-delay:1.8s;"><span class="bar-pct">21.05%</span><span class="bar-frac">4/19</span></div>
    </div>
    <div class="bar-group">
      <div class="bar-label">柠萌影视</div>
      <div class="bar-track"><div class="bar-fill bar6" style="width:16.67%;animation-delay:0.95s;"></div></div>
      <div class="bar-info" style="animation-delay:1.95s;"><span class="bar-pct">16.67%</span><span class="bar-frac">1/6</span></div>
    </div>
    <div class="bar-group">
      <div class="bar-label">华策影视</div>
      <div class="bar-track"><div class="bar-fill bar7" style="width:12.82%;animation-delay:1.1s;"></div></div>
      <div class="bar-info" style="animation-delay:2.1s;"><span class="bar-pct">12.82%</span><span class="bar-frac">5/39</span></div>
    </div>
  </div>

  <div class="footer">数据来源：娱乐资本论统计</div>

  <button id="loopBtn" onclick="toggleLoop()">🔄 Loop</button>
</div>

<script>
let looping = false;
let loopTimer = null;
const ANIM_DURATION = 3100;

function showLoopBtn() {
  document.getElementById('loopBtn').style.display = 'block';
}

function toggleLoop() {
  looping = !looping;
  const btn = document.getElementById('loopBtn');
  btn.classList.toggle('active', looping);
  if (looping) {
    startLoop();
  } else {
    clearTimeout(loopTimer);
  }
}

function startLoop() {
  if (!looping) return;
  const content = document.getElementById('content');
  content.style.transition = 'opacity 0.8s';
  content.style.opacity = '0';
  loopTimer = setTimeout(() => {
    resetAnimations();
    content.style.opacity = '1';
    loopTimer = setTimeout(() => {
      if (looping) startLoop();
    }, ANIM_DURATION + 3000);
  }, 1300);
}

function resetAnimations() {
  const content = document.getElementById('content');
  const fills = content.querySelectorAll('.bar-fill');
  const infos = content.querySelectorAll('.bar-info');
  fills.forEach(f => {
    f.style.animation = 'none';
    f.offsetHeight;
    f.style.animation = '';
  });
  infos.forEach(i => {
    i.style.animation = 'none';
    i.offsetHeight;
    i.style.animation = '';
  });
}

setTimeout(showLoopBtn, ANIM_DURATION);
</script>
</body>
</html>
